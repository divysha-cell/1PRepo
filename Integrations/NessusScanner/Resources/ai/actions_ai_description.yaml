Get Scan Templates:
  ai_description: "### General Description\nThe **Get Scan Templates** action retrieves\
    \ a comprehensive list of all available scan templates from the Nessus Scanner\
    \ server. This action is primarily used for discovery, allowing users to identify\
    \ the specific policies and templates (such as 'WannaCry Ransomware' or 'Advanced\
    \ Scan') available on the Nessus instance. The retrieved information includes\
    \ template titles, names, and unique identifiers (UUIDs), which are often required\
    \ as inputs for creating or launching new scans.\n\n### Parameters\nThis action\
    \ does not require any input parameters.\n\n### Flow Description\n1. **Authentication**:\
    \ The action establishes a session with the Nessus Scanner API using the Access\
    \ Key, Secret Key, and API Root defined in the integration settings.\n2. **Data\
    \ Retrieval**: It executes a GET request to the Nessus endpoint `/editor/policy/templates`\
    \ to fetch the complete list of scan templates.\n3. **Data Formatting**: The action\
    \ processes the raw API response into two formats:\n    * A structured JSON object\
    \ containing the full template details.\n    * A CSV-formatted list containing\
    \ the Title, Name, and UUID for each template.\n4. **Output Generation**: \n \
    \   * If templates are found, a data table titled 'Nessus Scan Templates' is added\
    \ to the action output for visibility in the Google SecOps UI.\n    * The action\
    \ returns a success status and populates the JSON result with the template data."
