Create Scan:
  ai_description: >-
    Creates a new vulnerability scan in Nessus using a specified template and target
    entities (IP Addresses and Hostnames). This action automates the setup of scans
    by resolving template titles to UUIDs and submitting the scan configuration to
    the Nessus API.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Scan Name | String | Yes | The display name for the new scan in Nessus. |

    | Scan Template Title | String | Yes | The title of the scan template to use (e.g.,
    'Basic Network Scan'). |

    | Description | String | No | A description for the scan. Defaults to 'Created
    by Rest API'. |


    ### Flow Description

    1. **Initialization**: Connects to the Nessus API using provided credentials.

    2. **Target Identification**: Collects all IP Address and Hostname entities from
    the current context to serve as scan targets.

    3. **Template Resolution**: Queries Nessus to find the unique identifier (UUID)
    associated with the provided 'Scan Template Title'.

    4. **Scan Creation**: Sends a POST request to the Nessus `/scans` endpoint with
    the scan name, targets, description, and template UUID.

    5. **Result Handling**: Returns the details of the newly created scan as a JSON
    result.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates a new scan configuration in the Nessus Scanner via a POST request to
      the /scans endpoint.
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
