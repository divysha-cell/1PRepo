Launch Scan:
  ai_description: >-
    ### General Description

    The **Launch Scan** action triggers a pre-configured vulnerability scan on a Nessus
    server. It identifies the target scan by its display name, retrieves the internal
    scan ID, and initiates the execution. This action is primarily used to automate
    the start of security assessments within a SOAR workflow.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Scan Name** | String | Yes | The display name of the scan as configured in
    the Nessus console. This is used to look up the internal scan ID required for
    the launch command. |


    ### Flow Description

    1. **Authentication**: Connects to the Nessus API using the provided Access Key,
    Secret Key, and API Root.

    2. **Scan Lookup**: Queries the Nessus server to find the scan matching the provided
    **Scan Name** and retrieves its unique `object_id`.

    3. **Execution**: Sends a POST request to the Nessus `/launch` endpoint using
    the identified scan ID.

    4. **Verification**: Retrieves the updated scan details to identify the targets
    associated with the scan and confirms whether the initiation was successful.

    5. **Reporting**: Returns a success message containing the scan name and targets,
    or a failure message if the scan could not be started.


    ### Additional Notes

    * This action does not create new scans; it only launches existing ones already
    defined in the Nessus environment.

    * The action does not wait for the scan to complete; it only confirms that the
    launch command was accepted.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Initiates a vulnerability scan on the Nessus server, which changes the state
      of the external system from idle to scanning.
