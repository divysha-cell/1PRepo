Get Scan Report:
  ai_description: "### General Description\nRetrieves a comprehensive scan report\
    \ from Nessus Scanner for a specified scan name. This action checks the current\
    \ status of a scan and, if finished, triggers the generation of an HTML report,\
    \ downloads it, and attaches it to the case. If the scan is still running, the\
    \ action remains in an 'In Progress' state to allow for asynchronous polling.\n\
    \n### Parameters\n| Parameter | Type | Mandatory | Description |\n| :--- | :---\
    \ | :--- | :--- |\n| Scan Name | String | Yes | The display name of the scan in\
    \ Nessus for which the report should be retrieved. |\n\n### Flow Description\n\
    1. **Authentication**: Initializes the Nessus client using the provided API keys\
    \ and root URL.\n2. **Scan Identification**: Retrieves the list of all scans to\
    \ find the unique identifier (ID) associated with the provided 'Scan Name'.\n\
    3. **Status Verification**: Fetches the specific details of the scan to check\
    \ its status. \n    * If the status is **'completed'**, the flow continues to\
    \ report generation.\n    * If the status is not 'completed', the action returns\
    \ an 'In Progress' state for later re-execution.\n4. **Report Export**: Sends\
    \ a request to Nessus to export the scan results into an HTML format.\n5. **Polling**:\
    \ Monitors the export status until the file is marked as 'ready'.\n6. **Download\
    \ and Attachment**: Downloads the generated HTML file, encodes it, and attaches\
    \ it to the Google SecOps case as 'ScanReport.html'.\n\n### Additional Notes\n\
    This action is marked as asynchronous (`IsAsync: true`). It will continue to poll\
    \ the Nessus API until the scan is completed or an error occurs. Note that the\
    \ export process itself involves a POST request to the external system to create\
    \ the report file."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Triggers a report export process on the Nessus server which creates a new temporary
      file resource for download.
    fetches_data: true
    internal_data_mutation_explanation: null
