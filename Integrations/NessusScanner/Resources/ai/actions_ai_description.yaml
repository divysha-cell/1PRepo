Get Scans:
  ai_description: >-
    ### General Description

    The **Get Scans** action retrieves a comprehensive list of all existing scans
    from a Nessus Scanner instance. It provides high-level visibility into the scanning
    environment by fetching details such as scan names, unique identifiers (UUIDs),
    and current execution statuses (e.g., completed, running, or pending).


    ### Parameters

    This action does not have any input parameters.


    ### Flow Description

    1. **Authentication**: The action connects to the Nessus Scanner API using the
    Access Key, Secret Key, and API Root defined in the integration configuration.

    2. **Data Retrieval**: It executes a GET request to the Nessus `/scans` endpoint
    to retrieve the full list of available scans.

    3. **Data Processing**: The action processes the raw scan data to extract names
    and statuses for reporting.

    4. **Output Generation**:
        *   **Data Table**: A table named "Nessus Scans" is created and attached to
    the action results, displaying the name and status of each scan.
        *   **JSON Result**: The full list of scan objects is returned as a JSON payload
    for use in subsequent playbook tasks.
        *   **Completion**: The action ends with a success status if scans are found,
    or a failure status if no scans are returned from the API.

    ### Additional Notes

    * This action is a global query and does not target or filter by specific entities
    (such as IPs or Hostnames).
