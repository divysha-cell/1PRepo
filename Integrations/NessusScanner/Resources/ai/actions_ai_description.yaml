Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic tool designed to verify the connectivity between
    Google SecOps and the Nessus Scanner instance. It validates that the integration's
    configuration parameters, such as the Access Key, Secret Key, and API Root, are
    correct and that the Nessus server is operational and reachable.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | None | N/A | N/A | This action does not require any input parameters as it uses
    the global integration configuration. |


    ### Additional Notes

    - This action is typically used during the initial setup of the Nessus Scanner
    integration or for troubleshooting communication issues.

    - It specifically checks for a 'ready' status from the Nessus server's status
    endpoint.


    ### Flow Description

    1. **Configuration Retrieval**: The action fetches the 'Access Key', 'Secret Key',
    and 'Api Root' from the NessusScanner integration settings.

    2. **Manager Initialization**: It initializes the NessusScanner manager using
    the retrieved credentials.

    3. **Connectivity Test**: The action calls the `test_connectivity` method, which
    performs a GET request to the `/server/status` endpoint of the Nessus API.

    4. **Status Verification**: It evaluates the response to determine if the server
    status is 'ready'.

    5. **Action Conclusion**: The action ends with a success message ('Connection
    Established') and a result value of 'true' if the connection is successful, or
    a failure message ('Connection Failed') and 'false' otherwise.
