Get Malware Details:
  ai_description: >-
    ### General Description

    Enriches File Hash entities by querying the ReversingLabs TitaniumCloud API for
    comprehensive malware analysis details. This action retrieves threat intelligence
    such as malware status (Malicious, Suspicious, Known, Unknown), threat levels,
    trust factors, and first/last seen timestamps. The retrieved data is used to populate
    entity properties and provide a detailed breakdown in the case wall.


    ### Parameters Description

    There are no parameters configured for this action.


    ### Additional Notes

    * The action automatically detects the hash type (MD5, SHA1, SHA256, or SHA512)
    before querying the API.

    * It converts hashes to lowercase to ensure compatibility with the ReversingLabs
    database.


    ### Flow Description

    1. **Identify Hash Type:** For each File Hash entity, the action identifies the
    specific hash algorithm (e.g., MD5, SHA256).

    2. **Query API:** Performs a single query to the ReversingLabs TitaniumCloud 'malware_presence'
    endpoint with the 'extended' flag enabled to get full report details.

    3. **Process Results:** If data is found, it flattens the JSON report and maps
    it to the entity's additional properties.

    4. **UI Enrichment:** Generates a CSV table containing the malware status and
    scanner details, which is attached to the entity in the Google SecOps UI.

    5. **Update Entity:** Marks the entity as 'enriched' and updates the entity state
    within the platform.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity additional properties with malware analysis data and sets the
      'is_enriched' flag to true.
  categories:
    enrichment: true
  entity_usage:
