Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic tool used to verify the connectivity between
    Google SecOps and the ReversingLabs TitaniumCloud API. Its primary purpose is
    to ensure that the integration's configuration (API Root, Username, and Password)
    is valid and that the environment can successfully communicate with the ReversingLabs
    service.


    ### Parameters Description

    This action does not require any input parameters. It utilizes the global configuration
    settings provided during the integration setup:

    * **Api Root**: The base URL for the ReversingLabs TitaniumCloud API.

    * **Username**: The username for authentication.

    * **Password**: The password for authentication.


    ### Flow Description

    1. **Configuration Retrieval**: The action retrieves the connection details (API
    Root, Username, and Password) from the ReversingLabs TitaniumCloud integration
    settings.

    2. **Client Initialization**: It initializes the `TitaniumCloudClient` using the
    retrieved credentials.

    3. **Connectivity Verification**: The action executes a test query by performing
    a single hash lookup (using a hardcoded MD5 hash) against the ReversingLabs `malware_presence`
    endpoint.

    4. **Final Status**: If the API call returns a successful response, the action
    reports a successful connection. If the call fails or the credentials are invalid,
    an exception is raised, indicating a connectivity error.
