Update Ticket:
  ai_description: "### General Description\nUpdates the details of an existing ticket\
    \ in ConnectWise. This action allows for modifying various ticket attributes such\
    \ as the summary, status, priority, owner, and categorization (Type, SubType,\
    \ Item). It interacts with the ConnectWise Manage API to apply these changes via\
    \ PATCH requests.\n\n### Parameters Description\n| Parameter | Type | Mandatory\
    \ | Description |\n| :--- | :--- | :--- | :--- |\n| Ticket Id | String | Yes |\
    \ The unique identifier of the ticket to be updated (e.g., 609620). |\n| Summary\
    \ | String | No | The new summary for the ticket. Note: If the summary exceeds\
    \ 100 characters, it will be automatically truncated by the script. |\n| Type\
    \ Name | String | No | The category type for the ticket (e.g., Application). |\n\
    | SubType Name | String | No | The sub-category for the ticket (e.g., Adobe).\
    \ |\n| Item Name | String | No | The specific item name for the ticket (e.g.,\
    \ Development). |\n| Owner Name | String | No | The ConnectWise member name to\
    \ assign the ticket to (e.g., connectwise_user_1). |\n| Board | String | No |\
    \ The name of the service board the ticket belongs to. |\n| Priority | String\
    \ | No | The priority level to set (e.g., Priority 3 - Normal Response). |\n|\
    \ Status | String | No | The new status for the ticket (e.g., In Progress). |\n\
    | Email Note CC | String | No | A comma-separated list of email addresses to be\
    \ CC'd on ticket notes. |\n\n### Additional Notes\n- The action logic distinguishes\
    \ between a status-only update and a multi-field update. If only the `Status`\
    \ is provided (without Summary, Type, SubType, Owner, Board, Priority, or Item),\
    \ it uses a specialized status update flow.\n- Human-readable names for Board,\
    \ Owner, Priority, and Status are automatically resolved to their respective internal\
    \ ConnectWise IDs before the update is performed.\n\n### Flow Description\n1.\
    \ **Initialization**: The action initializes the `ConnectWiseManager` using the\
    \ integration's configuration (API Root, Company Name, Keys, and Client ID).\n\
    2. **Parameter Parsing**: It retrieves the `Ticket Id` and all optional update\
    \ parameters from the input.\n3. **Summary Truncation**: If a `Summary` is provided\
    \ and exceeds 100 characters, the script truncates it to 98 characters and appends\
    \ \"..\" to comply with API limits.\n4. **Update Execution**: \n    - If only\
    \ the `Status` parameter is provided among the updateable fields, the script calls\
    \ `update_ticket_status`.\n    - If any other fields (Summary, Type, etc.) are\
    \ provided, it calls the comprehensive `update_ticket` method.\n5. **ID Resolution**:\
    \ During the update process, the manager makes internal API calls to resolve names\
    \ (like `Owner Name` or `Board`) into the IDs required by the ConnectWise PATCH\
    \ operations.\n6. **API Request**: A PATCH request is sent to the ConnectWise\
    \ service to update the ticket record.\n7. **Completion**: The action returns\
    \ a success message and the Ticket ID if the operation succeeds, or an error message\
    \ if it fails."
