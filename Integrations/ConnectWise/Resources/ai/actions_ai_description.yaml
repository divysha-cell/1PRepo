Delete Ticket:
  ai_description: >-
    ### General Description

    Deletes a specific ticket in ConnectWise Manage using its unique Ticket ID. This
    action is used to remove ticket records from the external system when they are
    no longer needed or were created in error.


    ### Parameters Description

    | Parameter | Description | Type | Mandatory |

    | :--- | :--- | :--- | :--- |

    | Ticket Id | The unique identifier of the ConnectWise ticket to be deleted (e.g.,
    607167). | String | Yes |


    ### Flow Description

    1. **Initialization**: The action initializes the ConnectWise manager using the
    provided API configuration (Root URL, Company Name, Keys, and Client ID).

    2. **Parameter Retrieval**: It retrieves the mandatory `Ticket Id` from the action
    input.

    3. **Execution**: It sends a DELETE request to the ConnectWise API endpoint corresponding
    to the provided Ticket ID.

    4. **Validation**: The action validates the HTTP response. If the deletion is
    successful, it returns the Ticket ID as the result value.

    5. **Completion**: If the ticket is successfully deleted, a success message is
    logged; otherwise, an error message is generated and the action ends with a failure
    status.


    ### Additional Notes

    This action does not process or interact with Google SecOps entities; it operates
    solely based on the provided Ticket ID parameter.
