Add Attachment To Ticket:
  ai_description: >-
    ### General Description

    This action allows users to upload and attach a file to a specific ticket within
    the ConnectWise platform. It is primarily used for documentation, evidence sharing,
    or providing additional context to support tickets. The action handles base64-encoded
    file content, decodes it, and transmits it to the ConnectWise API.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Ticket ID | String | Yes | The unique identifier of the ConnectWise ticket where
    the attachment will be added. |

    | Base64 Encoded File | String | Yes | The content of the file to be uploaded,
    encoded in Base64 format. |

    | Filename | String | Yes | The name of the file, including its extension (e.g.,
    'evidence.png'). The action validates that an extension is present. |

    | Display In Customer Portal | Boolean | No | If set to true, the attachment will
    be visible to the customer via the ConnectWise portal. Defaults to true. |

    | Allow Only Owner Update | Boolean | No | If set to true, only the ticket owner
    will have permissions to update or modify this attachment. Defaults to true. |


    ### Additional Notes

    - The `Filename` parameter must include a file extension (e.g., .txt, .pdf, .jpg);
    otherwise, the action will fail during the validation stage.

    - The action uses the `system/documents` endpoint in the ConnectWise API to perform
    the upload.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the API configuration and the
    user-provided parameters (Ticket ID, File content, Filename, and flags).

    2. **Filename Validation:** It checks if the provided filename contains a period
    followed by an extension.

    3. **Manager Initialization:** It initializes the `ConnectWiseManager` using the
    provided API Root, Company Name, and credentials.

    4. **File Processing:** The base64 string is decoded into binary data.

    5. **API Interaction:** The manager sends a POST request to the ConnectWise API,
    uploading the file and associating it with the specified `Ticket ID` while applying
    the visibility and permission flags.

    6. **Result Handling:** Upon success, the action returns the metadata of the created
    attachment in JSON format and completes the execution.
