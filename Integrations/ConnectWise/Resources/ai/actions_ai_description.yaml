Create Ticket:
  ai_description: >-
    ### General Description

    The **Create Ticket** action enables the programmatic creation of service tickets
    within the ConnectWise platform. It is designed to facilitate incident management
    by allowing SOC analysts to automate the opening of tickets with specific metadata
    such as board assignment, status, and priority. The action handles the resolution
    of human-readable names into internal ConnectWise identifiers and ensures that
    input data, like the ticket summary, adheres to API character limits.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Company** | String | Yes | The unique identifier for the company associated
    with the ticket. |

    | **Board** | String | Yes | The name of the service board where the ticket will
    be placed. |

    | **Summary** | String | Yes | A brief summary of the ticket. Note: If the summary
    exceeds 100 characters, it will be automatically truncated to fit API constraints.
    |

    | **Status** | String | Yes | The initial status to assign to the ticket (e.g.,
    'Unassigned'). |

    | **Priority** | String | Yes | The priority level for the ticket (e.g., 'Priority
    3 - Normal Response'). |

    | **Owner Name** | String | No | The ConnectWise member name to whom the ticket
    should be assigned. |

    | **Email Note CC** | String | No | A comma-separated list of email addresses
    to be CC'd on ticket notes. |


    ### Additional Notes

    - The action performs internal lookups to resolve the IDs for the Board, Status,
    Priority, and Owner before submitting the creation request.

    - If the `Summary` is truncated, a notification is added to the action's output
    message.


    ### Flow Description

    1. **Initialization**: Connects to the ConnectWise API using the integration's
    configuration settings (API Root, Keys, Client ID).

    2. **Input Processing**: Retrieves action parameters and parses the `Email Note
    CC` list.

    3. **Summary Truncation**: Checks if the `Summary` exceeds 100 characters; if
    so, it truncates the string and appends a warning to the output message.

    4. **ID Resolution**: Calls the ConnectWise API to find the internal unique identifiers
    for the provided **Status**, **Priority**, and (if provided) **Owner Name** based
    on their human-readable names.

    5. **Ticket Creation**: Sends a POST request to the ConnectWise `service/tickets`
    endpoint with the compiled payload.

    6. **Result Handling**: Returns the newly created Ticket ID as the action's result
    value and provides a success or failure message.
