Create Alerts Ticket:
  ai_description: >-
    ### General Description

    This action creates a new service ticket in ConnectWise Manage for each alert in the current scope. It supports both Alert and Case execution scopes. It allows for the mapping of alert details to specific ConnectWise boards, statuses, and priorities, and automatically associates the created ticket ID back to the SecOps alert for tracking purposes.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Company | String | Yes | The unique identifier for the company in ConnectWise
    associated with the ticket. |

    | Owner Name | String | No | The ConnectWise member name (e.g., connectwise_user_1)
    to whom the ticket should be assigned. |

    | Board | String | Yes | The name of the service board where the ticket will be
    created. |

    | Status | String | Yes | The initial status to set for the ticket (e.g., 'Unassigned').
    |

    | Priority | String | Yes | The priority level to assign to the ticket (e.g.,
    'Priority 3 - Normal Response'). |

    | Initial Description | String | Yes | The content for the first comment or note
    added to the ticket upon creation. |


    ### Additional Notes

    - The action automatically uses the SecOps Alert External ID as the summary for
    the ConnectWise ticket.

    - Upon successful creation, the ConnectWise Ticket ID is stored in the alert's
    'Additional Data' field.

    - For Case scope, the action returns a comma-separated list of created ticket IDs in the result value.


    ### Flow Description

    1. **Initialization**: The action initializes the ConnectWise manager using integration
    configuration settings (API Root, Credentials, Client ID).

    2. **ID Resolution**: It performs lookups to resolve the provided human-readable
    names for 'Board', 'Status', 'Priority', and 'Owner Name' into their respective
    internal ConnectWise IDs.

    3. **Ticket Creation**: A POST request is sent to ConnectWise to create the ticket
    with the specified parameters.

    4. **Comment Addition**: If the ticket is created successfully, the 'Initial Description'
    is posted as a new note/comment to that ticket.

    5. **Internal Update**: The action updates the Google SecOps alert metadata by
    adding the new ConnectWise ticket ID to the alert's additional data.

    6. **Completion**: The action returns the ticket ID or a comma-separated list of ticket IDs as the result value.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: true
    can_mutate_external_data: true
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates a new service ticket and an associated note/comment in the ConnectWise
      Manage platform.
    fetches_data: true
