Ping:
  ai_description: "### General Description\nThe **Ping** action is a diagnostic tool\
    \ used to verify the connectivity between Google SecOps and the ConnectWise instance.\
    \ It ensures that the integration's configuration parameters\u2014such as the\
    \ API Root, Company Name, Public Key, Private Key, and Client ID\u2014are correct\
    \ and that the ConnectWise API is reachable and responding to requests.\n\n###\
    \ Parameters Description\n| Parameter | Description | Type | Mandatory |\n| :---\
    \ | :--- | :--- | :--- |\n| None | This action does not require any input parameters\
    \ as it uses the global integration configuration. | N/A | N/A |\n\n### Additional\
    \ Notes\nThis action is primarily used during the initial setup of the integration\
    \ or for troubleshooting communication issues. It does not interact with any entities\
    \ or modify any data within ConnectWise or Google SecOps.\n\n### Flow Description\n\
    1. **Configuration Retrieval**: The action retrieves the necessary API credentials\
    \ (API Root, Company Name, Public Key, Private Key, and Client ID) from the ConnectWise\
    \ integration settings.\n2. **Manager Initialization**: It initializes the `ConnectWiseManager`\
    \ using the retrieved credentials, which sets up the authentication headers (Basic\
    \ Auth and ClientId).\n3. **Connectivity Test**: The action calls the `test_connectivity`\
    \ method, which performs a `GET` request to the `service/boards/count` endpoint\
    \ of the ConnectWise API.\n4. **Response Validation**: The manager validates the\
    \ HTTP response. If the request is successful (status code 200), the connection\
    \ is considered established.\n5. **Final Output**: The action ends by providing\
    \ a success message (\"Connection Established.\") and a boolean result (`True`)\
    \ if successful, or a failure message and `False` otherwise."
