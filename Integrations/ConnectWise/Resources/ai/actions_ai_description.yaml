Add Comment To Ticket:
  ai_description: >-
    ### General Description

    Adds a new comment or internal note to a specific ticket in the ConnectWise platform.
    This action allows users to update existing tickets with additional information
    or internal analysis directly from Google SecOps.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Ticket Id | String | Yes | The unique identifier of the ConnectWise ticket to
    which the comment will be added (e.g., 608718). |

    | Comment | String | Yes | The actual text content of the comment or note to be
    attached to the ticket. |

    | Internal | Boolean | No | If set to 'True', the comment will be placed in the
    internal analysis section of the ticket. If 'False' (default), it is added to
    the standard discussion/detail section. |


    ### Flow Description

    1. **Initialization**: The action initializes the ConnectWise manager using the
    provided API configuration (URL, Company Name, Keys, and Client ID).

    2. **Parameter Retrieval**: It retrieves the target Ticket ID, the comment text,
    and the visibility flag (Internal) from the action parameters.

    3. **API Interaction**: The action sends a POST request to the ConnectWise API
    endpoint `service/tickets/{ticket_id}/notes` with the comment details.

    4. **Logic Handling**: If the 'Internal' flag is enabled, the logic adjusts the
    payload to ensure the note is categorized as internal analysis rather than a general
    detail description.

    5. **Completion**: The action returns the ID of the newly created comment upon
    success or reports a failure if the ticket could not be updated.


    ### Additional Notes

    This action does not run on entities; it requires a specific Ticket ID to be provided
    manually or via a previous playbook step.
