    \ specifying a particular status name (e.g., 'Completed' or 'Resolved').\n\n###\
    \ Parameters\n| Parameter | Type | Mandatory | Description |\n| :--- | :--- |\
    \ :--- | :--- |\n| Ticket Id | String | Yes | The unique identifier of the ConnectWise\
    \ ticket to be closed. |\n| Custom Close Status | String | No | A specific status\
    \ name used by the ConnectWise board to represent a closed state. If provided,\
    \ the action will update the ticket to this status instead of just setting the\
    \ closed flag. |\n\n### Flow Description\n1. **Initialization**: The action initializes\
    \ the ConnectWise manager using the integration configuration.\n2. **Data Retrieval**:\
    \ It fetches the current ticket details from ConnectWise to identify the board\
    \ the ticket belongs to (required for status lookups).\n3. **Status Update**:\
    \ \n    * If a **Custom Close Status** is provided, the action retrieves the corresponding\
