"Remove Senders from Exchange-Siemplify Inbox Rules":
  ai_description: >-
    Removes specific sender email addresses or domains from existing Exchange inbox
    rules. This action is designed to manage rules typically created for security
    automation (e.g., moving malicious senders to junk). It can target a specific
    rule or all available Siemplify-managed rules across one or multiple mailboxes.
    The action supports batch processing and runs asynchronously to handle large environments
    without timing out.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Senders | String | No | A comma-separated list of email addresses to remove
    from the rule. If not provided, the action will use the identifiers of User entities
    in the case. |

    | Rule to remove Senders from | String | Yes | The specific inbox rule name to
    modify. Options include 'Siemplify - Senders List - Move To Junk', 'Siemplify
    - Senders List - Delete', or 'Siemplify - Senders List - Permanently Delete'.
    |

    | Remove Senders from all available Rules | Boolean | No | If true, the action
    will attempt to remove the senders from all predefined Siemplify sender rules
    instead of just the one specified. |

    | Should remove senders' domains from the corresponding Domains List rule as well?
    | Boolean | No | If true, the action extracts domains from the email addresses
    and removes them from the corresponding domain-based inbox rules. |

    | Perform action in all mailboxes | Boolean | No | If true, the action will be
    performed across all mailboxes accessible via the current impersonation/delegation
    settings. |

    | How many mailboxes to process in a single batch | Integer | No | Controls the
    number of mailboxes processed in a single execution cycle (default is 50). |


    ### Additional Notes

    - This action requires EDiscovery Group and Author permissions to modify inbox
    rules via EWS.

    - The action is asynchronous; ensure the script timeout in the IDE is adjusted
    if processing a very large number of mailboxes.


    ### Flow Description

    1. **Initialization**: Initializes the Exchange manager using the integration's
    configuration (Server Address, Credentials, etc.).

    2. **Sender Identification**: Retrieves the list of email addresses to remove
    from the 'Senders' parameter. If empty, it extracts identifiers from all 'USER'
    entities associated with the alert.

    3. **Rule Selection**: Determines which inbox rules to target based on the 'Rule
    to remove Senders from' and 'Remove Senders from all available Rules' parameters.
    If domain removal is enabled, it also identifies the corresponding domain rules.

    4. **Mailbox Discovery**: Identifies the target mailboxes. If 'Perform action
    in all mailboxes' is selected, it fetches all searchable mailboxes from the server.

    5. **Batch Processing**: Iterates through the mailboxes in batches. For each mailbox,
    it retrieves the current rules and removes the specified senders or domains from
    the rule conditions.

    6. **Rule Update**: Updates the rule on the Exchange server. If a rule becomes
    empty after removal, it is deleted.

    7. **State Management**: Saves the progress (processed vs. remaining mailboxes)
    and continues execution until all mailboxes are updated.
