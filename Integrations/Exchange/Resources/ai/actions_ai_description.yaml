Get Account Out Of Facility Settings:
  ai_description: >-
    Retrieves 'Out of Facility' (OOF) or 'Out of Office' settings for Microsoft Exchange
    user accounts. This action is used to determine if a user is currently away, the
    scheduled duration of their absence, and the specific internal/external reply
    messages configured.


    ### Parameters

    This action does not require any additional input parameters beyond the target
    entities.


    ### Flow Description

    1. **Entity Filtering**: Identifies all User entities within the current context.

    2. **Email Resolution**: For each User entity, the action attempts to resolve
    a valid email address. It first checks the entity identifier; if the identifier
    is not a valid email (e.g., a username), it looks for the `AD_mail_1` property
    in the entity's additional properties (typically populated by a preceding Active
    Directory enrichment action).

    3. **Exchange Interaction**: Connects to the Microsoft Exchange server using configured
    credentials (supporting both Basic and OAuth2 authentication via delegation or
    impersonation). It fetches the OOF settings for the resolved email address.

    4. **Data Processing**: Extracts the OOF state (Enabled/Disabled), start and end
    timestamps, and the text of internal and external automatic replies.

    5. **Enrichment and Reporting**: Updates the User entity's additional properties
    with the retrieved OOF data, marks the entity as enriched, and attaches a detailed
    data table to the case for visibility.


    ### Additional Notes

    * **Prerequisites**: If target entities are usernames rather than email addresses,
    ensure an Active Directory enrichment action has run previously to provide the
    necessary email metadata.

    * **Permissions**: The integration user must have sufficient permissions (Impersonation
    or Delegation) to access the target mailbox settings.
