Search Mails:
  ai_description: >-
    Searches for specific emails within Microsoft Exchange mailboxes based on a variety
    of configurable criteria. This action is designed to perform broad or targeted
    searches across one or many mailboxes, retrieving email metadata and body content.
    It operates asynchronously to handle large-scale searches across multiple mailboxes
    without exceeding script timeouts.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Folder Name | String | No | Specifies the email folder(s) to search (e.g., 'Inbox').
    Supports comma-separated lists and subfolders using the '/' separator (e.g., 'Inbox/Subfolder').
    Default is 'Inbox'. |

    | Message IDs | String | No | A comma-separated list of specific Message IDs to
    search for. This filter has priority over other criteria. |

    | Subject Filter | String | No | Filters emails by a specific subject string.
    |

    | Sender Filter | String | No | Filters emails by the sender's email address.
    |

    | Recipient Filter | String | No | Filters emails by the recipient's email address.
    |

    | Time Frame (minutes) | String | No | The lookback window in minutes for the
    search. |

    | Only Unread | Boolean | No | If set to true, the search will only return unread
    emails. |

    | Max Emails To Return | String | No | Limits the total number of emails returned
    by the action. Default is 100. |

    | Search in all mailboxes | Boolean | No | If enabled, the action searches all
    mailboxes accessible via the configured impersonation settings. |

    | How many mailboxes to process in a single batch | String | No | Controls the
    number of mailboxes processed in a single asynchronous execution cycle. Default
    is 25. |

    | Mailboxes | String | No | A comma-separated list of specific mailbox addresses
    to search. This parameter takes priority over 'Search in all mailboxes'. |

    | Start Time | String | No | The start time for the search range in ISO 8601 format.
    Takes priority over 'Time Frame (minutes)'. |

    | End Time | String | No | The end time for the search range in ISO 8601 format.
    Defaults to the current time if 'Start Time' is provided. |

    | Body Regex Filter | String | No | A regular expression pattern to search for
    within the body of the emails. |


    ### Additional Notes

    - **Permissions:** To search across all mailboxes, the integration must be configured
    with appropriate impersonation or delegated access permissions in Exchange.

    - **Async Execution:** The action runs asynchronously. If searching many mailboxes,
    it will process them in batches and resume until completion.

    - **Priority:** 'Message IDs' and 'Mailboxes' parameters override broader search
    settings.


    ### Flow Description

    1. **Initialization:** The action initializes the Exchange manager using the integration's
    configuration (Server Address, Credentials, etc.).

    2. **Target Identification:** It identifies which mailboxes to search based on
    the 'Mailboxes' list or by fetching all searchable mailboxes if 'Search in all
    mailboxes' is selected.

    3. **Time Filtering:** It establishes the search time window using 'Start Time'/'End
    Time' or the 'Time Frame' lookback.

    4. **Batch Processing:** The action processes mailboxes in batches. For each mailbox
    in the current batch, it searches the specified folders.

    5. **Criteria Application:** It applies filters for Message IDs, Subject, Sender,
    Recipient, and Body Regex. It also respects the 'Only Unread' and 'Max Emails'
    constraints.

    6. **Data Collection:** Matching emails are retrieved, and their details (Subject,
    Author, Body, etc.) are collected.

    7. **State Management:** If more mailboxes remain after a batch, the action saves
    its progress and enters an 'In Progress' state for the next async cycle.

    8. **Completion:** Once all mailboxes are processed, it generates a data table
    of matching emails and returns the full results in JSON format.
