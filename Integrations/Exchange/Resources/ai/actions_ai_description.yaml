Generate Token:
  ai_description: >-
    ### General Description

    This action is a critical component of the OAuth 2.0 authentication flow for the
    Microsoft Exchange integration. Its primary purpose is to exchange an authorization
    code (obtained from a browser-based authorization step) for a long-lived refresh
    token. This refresh token is then used by the integration to maintain persistent
    access to the Exchange environment without requiring manual re-authentication.
    The action is typically run once during the initial setup or when a token needs
    manual renewal.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Authorization URL | String | Yes | The full URL received after completing the
    'Get Authorization URL' step. This URL must contain the `code` query parameter
    generated by Microsoft's identity platform. |


    ### Additional Notes

    - This action requires the integration's **Client ID**, **Client Secret**, and
    **Tenant (Directory) ID** to be pre-configured in the integration settings.

    - The generated refresh token is valid for 90 days. Users must copy the resulting
    token from the action output and paste it into the 'Refresh Token' field of the
    Exchange integration configuration.

    - The action writes a timestamp to a local file (`token_timestamp.json`) to track
    when the token was last updated.


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the OAuth configuration (Client
    ID, Secret, Tenant ID, Redirect URL) from the integration settings and the `Authorization
    URL` from the action input.

    2. **URL Parsing**: It parses the provided `Authorization URL` to extract the
    `code` parameter from the query string.

    3. **Token Exchange**: Using the extracted code and the integration's credentials,
    it makes a POST request to the Microsoft OAuth2 token endpoint (`https://login.microsoftonline.com/{tenant}/oauth2/v2.0/token`).

    4. **Internal Logging**: Upon a successful exchange, it records the current timestamp
    in a local file named `token_timestamp.json` within the SOAR environment.

    5. **Output**: The action returns the refresh token in the output message, instructing
    the user to update their integration configuration.
