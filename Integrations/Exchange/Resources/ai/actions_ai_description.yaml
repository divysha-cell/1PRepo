    \ message. Default is 'Inbox'. |\n| Content | String | Yes | The HTML content\
    \ of the reply message. |\n| Attachments Paths | String | No | A comma-separated\
    \ list of local file paths on the server to be attached to the reply. |\n| Reply\
    \ All | Boolean | Yes | If true, the reply is sent to the sender and all recipients\
    \ (To and CC) of the original email. This takes priority over the 'Reply To' parameter.\
    \ |\n| Reply To | String | No | A comma-separated list of specific email addresses\
    \ to receive the reply. This is used only if 'Reply All' is disabled. If both\
