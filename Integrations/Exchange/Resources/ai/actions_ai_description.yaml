Block Sender by Message ID:
  ai_description: >-
    ### General Description

    The **Block Sender by Message ID** action allows security analysts to programmatically
    block email senders and manage malicious emails within a Microsoft Exchange environment.
    By providing specific Message IDs or using filters (Subject, Sender, Recipient,
    and Time Frame), the action identifies target emails and marks them as junk. This
    operation has two primary effects in Exchange: it adds the sender's email address
    to the user's 'Blocked Senders List' and moves the email to the 'Junk' folder.
    This action is particularly useful for automated phishing response and containment.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Move item to Junk folder?** | Boolean | Yes | If set to `true`, the action
    will move the identified emails to the Junk folder in addition to blocking the
    sender. |

    | **Message IDs** | String | No | A comma-separated list of specific Exchange
    Message IDs to target. If provided, other filters (Subject, Sender, Recipient)
    are ignored. |

    | **Mailboxes list to perform on** | String | No | A comma-separated list of specific
    mailbox addresses to search. If provided, the 'Perform action in all mailboxes'
    parameter is ignored. |

    | **Folder Name** | String | No | The folder(s) to search for the emails (e.g.,
    'Inbox'). Supports comma-separated lists and subfolders using the '/' separator.
    Default is 'Inbox'. |

    | **Subject Filter** | String | No | Filter condition to find emails with a specific
    subject line. |

    | **Sender Filter** | String | No | Filter condition to find emails from a specific
    sender address. |

    | **Recipient Filter** | String | No | Filter condition to find emails sent to
    a specific recipient. |

    | **Mark All Matching Emails** | Boolean | No | If `true`, the action processes
    all emails matching the criteria. If `false`, only the first match is processed.
    |

    | **Perform action in all mailboxes** | Boolean | No | If `true`, the action attempts
    to perform the operation across all mailboxes accessible via the configured impersonation/delegation
    settings. |

    | **How many mailboxes to process in a single batch** | Integer | No | Controls
    the number of mailboxes processed per async iteration to prevent timeouts. Default
    is 25. |

    | **Time Frame (minutes)** | Integer | No | Limits the search to emails received
    within the specified number of minutes relative to the current time. |


    ### Additional Notes

    - **Async Execution:** This action runs asynchronously. It processes mailboxes
    in batches to handle large environments without timing out. Ensure the script
    timeout in the IDE is adjusted if processing a very large number of mailboxes.

    - **Exchange Version:** This action requires Microsoft Exchange Server 2013 or
    newer.

    - **Permissions:** To perform actions across multiple mailboxes, the integration
    must be configured with appropriate Impersonation or Delegated permissions.


    ### Flow Description

    1. **Initialization:** The action initializes the Exchange manager and validates
    that the server version is 2013 or higher.

    2. **Mailbox Discovery:** It determines the target mailboxes based on the provided
    list or by fetching all searchable mailboxes from the server.

    3. **Search Logic:** In a batched process, the action searches the specified folders
    for emails matching the Message IDs or the provided Subject, Sender, and Recipient
    filters within the defined time frame.

    4. **Junk Operation:** For each matching email found, the action invokes the Exchange
    `mark_as_junk` method. This adds the sender to the 'Blocked Senders List' and
    moves the email to the 'Junk' folder (if enabled).

    5. **State Management:** Because the action is async, it saves its progress (successful
    messages and remaining mailboxes) and continues in subsequent iterations until
    all mailboxes are processed.

    6. **Completion:** Once all mailboxes are processed, it returns a summary of the
    number of emails successfully marked as junk and lists any mailboxes that could
    not be accessed.
