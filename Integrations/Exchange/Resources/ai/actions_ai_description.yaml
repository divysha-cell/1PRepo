Download Attachments:
  ai_description: >-
    ### General Description

    Downloads email attachments from Microsoft Exchange mailboxes to a specified local
    directory on the Google SecOps server. This action is designed to facilitate the
    retrieval of files for further analysis (e.g., sandboxing or static analysis)
    by searching through one or more mailboxes based on various filters such as Subject,
    Sender, or specific Message IDs. It supports S/MIME decrypted/verified emails
    if the integration is configured with the necessary certificates. The action operates
    asynchronously and processes mailboxes in batches to handle large-scale environments
    efficiently.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Folder Name | String | Yes | The email folder(s) to search (e.g., 'Inbox').
    Supports comma-separated lists and subfolders using '/' (e.g., 'Inbox/Subfolder').
    Default is 'Inbox'. |

    | Download Path | String | Yes | The local directory on the Google SecOps server
    where attachments will be saved. Can be an absolute path or relative to the action's
    run folder. |

    | Message IDs | String | No | Comma-separated list of specific Exchange Message
    IDs to target. If provided, the 'Subject Filter' is ignored. |

    | Subject Filter | String | No | Case-insensitive search string to filter emails
    by their subject line. |

    | Sender Filter | String | No | Case-insensitive search string to filter emails
    by the sender's email address. |

    | Only Unread | Boolean | No | If true, the action only processes emails marked
    as unread. Default is false. |

    | Download Attachments from EML | Boolean | No | If true, the action recursively
    extracts and downloads attachments found within attached .eml files. Default is
    false. |

    | Download Attachments to unique path? | Boolean | No | If true, appends a unique
    timestamp to filenames to prevent overwriting existing files in the download directory.
    |

    | Search in all mailboxes | Boolean | No | If true, searches all mailboxes accessible
    via the configured impersonation settings. |

    | How many mailboxes to process in a single batch | Integer | No | Controls the
    number of mailboxes processed in a single execution cycle. Default is 25. |

    | Mailboxes | String | No | A comma-separated list of specific mailbox addresses
    to search. This parameter takes priority over 'Search in all mailboxes'. |


    ### Additional Notes

    - **Priority Logic:** If 'Message IDs' are provided, the 'Subject Filter' is ignored.
    The 'Mailboxes' parameter takes precedence over the 'Search in all mailboxes'
    flag.

    - **Filename Sanitization:** Any '/' or '\' characters in attachment names are
    automatically replaced with underscores ('_') to ensure filesystem compatibility.

    - **Async Execution:** This action runs asynchronously. If multiple mailboxes
    or large batches are processed, the action will enter an 'In Progress' state and
    continue in subsequent cycles until all targets are processed.


    ### Flow Description

    1. **Initialization:** Connects to the Exchange server using the configured credentials
    (Basic or OAuth2) and initializes the Exchange Manager.

    2. **Target Identification:** Determines the list of mailboxes to search based
    on the 'Mailboxes' parameter or by querying searchable mailboxes if 'Search in
    all mailboxes' is enabled.

    3. **Path Preparation:** Resolves the 'Download Path' and creates the directory
    on the server if it does not already exist.

    4. **Batch Processing:** Selects a batch of mailboxes to process in the current
    execution cycle.

    5. **Email Search:** For each mailbox in the batch, searches the specified folders
    for emails matching the provided filters (Message IDs, Subject, Sender, Unread
    status).

    6. **Attachment Extraction:** Iterates through found emails, handles S/MIME decryption/verification
    if applicable, and extracts attachments (including those inside nested EMLs if
    configured).

    7. **File Saving:** Saves the attachments to the local disk, applying unique naming
    or sanitization as required.

    8. **State Management:** Updates the action's internal state with progress. If
    more mailboxes remain, it sets the status to 'In Progress'; otherwise, it completes
    and returns the list of downloaded file paths.
