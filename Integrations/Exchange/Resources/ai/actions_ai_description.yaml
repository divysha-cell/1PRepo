Send Email And Wait:
  ai_description: >-
    Sends an email via Microsoft Exchange and waits asynchronously for a reply from
    the recipients. This action is designed for interactive workflows where a response
    from a user or external party is required to proceed. It tracks the email thread
    using a unique identifier (either via the 'In-Reply-To' header or by appending
    a UUID to the subject line if the server does not support writable message IDs).
    Once a reply is detected in the specified mailbox folders, the action retrieves
    the reply content and can optionally upload any attachments from the response
    directly to the SOAR case.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Subject | String | Yes | The subject of the email. If the Exchange server doesn't
    support writable IDs, a unique UUID will be appended to this subject to track
    the thread. |

    | Send to | String | Yes | Comma-separated list of recipient email addresses.
    |

    | CC | String | No | Comma-separated list of CC email addresses. |

    | BCC | String | No | Comma-separated list of BCC email addresses. |

    | Mail content | String | Yes | The body of the email. Supports HTML. If Right-to-Left
    (RTL) characters are detected, the content is automatically wrapped in appropriate
    HTML divs. |

    | Fetch Response Attachments | Boolean | No | If set to true, the action will
    download and attach any files found in the reply email to the SOAR case. |

    | Folder to Check for Reply | String | No | Comma-separated list of mailbox folders
    (e.g., 'Inbox', 'Inbox/Subfolder') to monitor for the user's response. Default
    is 'Inbox'. |


    ### Additional Notes

    - This is an **asynchronous** action. It will remain in an 'In Progress' state
    until a reply is received or the action times out.

    - The sender's display name is typically determined by the account settings configured
    in the Exchange integration.


    ### Flow Description

    1. **Initialization**: The action extracts the email details and initializes the
    Exchange manager.

    2. **Email Dispatch (First Run)**: A unique tracking ID is generated. The action
    sends the email to the specified recipients. If the Exchange server supports writable
    message IDs, it uses the ID for tracking; otherwise, it appends the ID to the
    subject line.

    3. **Asynchronous Wait**: The action returns an 'In Progress' status to the SOAR
    platform.

    4. **Reply Monitoring (Status Query)**: In subsequent execution cycles, the action
    searches the specified Exchange folders for a reply that references the unique
    tracking ID.

    5. **Data Retrieval**: When a valid reply is found from one of the recipients,
    the action extracts the message body.

    6. **Attachment Processing**: If 'Fetch Response Attachments' is enabled, any
    attachments in the reply are uploaded to the SOAR case wall.

    7. **Completion**: The action completes, providing the reply content as the result.
