    mailboxes to process. |

    | Folder Name | String | No | The folder(s) to search for emails (default: 'Junk
    Email'). Supports subfolders using '/' separator. |

    | Subject Filter | String | No | Filter emails by subject. |

    | Sender Filter | String | No | Filter emails by sender address. |

    | Recipient Filter | String | No | Filter emails by recipient address. |

    | Unmark All Matching Emails | Boolean | No | If true, processes all matching
    emails; otherwise, only the first match. |

    | Perform action in all mailboxes | Boolean | No | If true, searches all accessible
    mailboxes (requires impersonation permissions). |

    | How many mailboxes to process in a single batch | Integer | No | Number of mailboxes
    to process per async iteration (default: 25). |

    | Time Frame (minutes) | Integer | No | Lookback period for searching emails.
    |


    ### Additional Notes

    - This action requires Exchange Server version 2013 or newer.

    - To perform actions across all mailboxes, impersonation permissions must be configured
    in Exchange.


    ### Flow Description

    1. **Initialization**: Connects to the Exchange server and validates that the
    server version is 2013 or newer.

    2. **Mailbox Discovery**: Identifies the target mailboxes based on the 'Mailboxes
    list' or 'Perform action in all mailboxes' parameters.

    3. **Search**: Searches the specified folders (e.g., Junk Email) for emails matching
    the provided Message IDs or the Subject/Sender/Recipient filters within the defined
    time frame.

    4. **Remediation**: For each matching email found, it executes the Exchange 'Mark
    as Not Junk' operation, which removes the sender's address from the 'Blocked Senders
    List'.

    5. **Relocation**: If the 'Move items back to Inbox?' parameter is enabled, the
    action moves the processed emails to the Inbox folder.

    6. **Async Batching**: Processes mailboxes in batches to manage resource usage
    and prevent script timeouts, maintaining state across iterations until all mailboxes
    are processed.
