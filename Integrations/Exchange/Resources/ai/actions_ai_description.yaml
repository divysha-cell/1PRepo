Delete Mail:
  ai_description: >-
    Deletes one or multiple emails from Microsoft Exchange mailboxes based on specific
    search criteria. This action is useful for remediation tasks such as removing
    phishing emails or malicious attachments from user mailboxes. It supports searching
    by Message IDs, Subject, Sender, and Recipient across one or multiple folders.
    It can be configured to delete only the first matching email or all matching emails.
    For large-scale operations, it supports searching across all accessible mailboxes
    (requires impersonation permissions) and processes them in batches to manage performance
    and avoid timeouts.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Folder Name | String | No | The email folder(s) to search (e.g., 'Inbox', 'SentItems').
    Supports comma-separated lists and subfolders using '/' (e.g., 'Inbox/Subfolder').
    Default is 'Inbox'. |

    | Message IDs | String | No | Comma-separated list of specific Message IDs to
    delete. If provided, Subject, Sender, and Recipient filters are ignored. |

    | Mailboxes | String | No | Comma-separated list of specific mailbox addresses
    to search. This takes priority over 'Delete from all mailboxes'. |

    | Subject Filter | String | No | Filter emails by subject line (case-insensitive
    search). |

    | Sender Filter | String | No | Filter emails by the sender's email address. |

    | Recipient Filter | String | No | Filter emails by the recipient's email address.
    |

    | Delete All Matching Emails | Boolean | No | If true, deletes all emails matching
    the criteria. If false, deletes only the first match. Default is false. |

    | Delete from all mailboxes | Boolean | No | If true, searches all mailboxes accessible
    via current impersonation settings. Requires appropriate Exchange permissions.
    |

    | How many mailboxes to process in a single batch | Integer | No | Controls the
    number of mailboxes processed per connection batch during async execution. Default
    is 25. |

    | Time Frame (minutes) | Integer | No | Limits the search to emails received within
    the last X minutes. |


    ### Additional Notes

    - **Permissions:** To delete emails across all mailboxes, the integration must
    be configured with Impersonation permissions.

    - **Async Execution:** This action runs asynchronously. If processing many mailboxes,
    ensure the script timeout in the Google SecOps IDE is adjusted accordingly.

    - **Filter Priority:** Providing 'Message IDs' will cause the action to ignore
    Subject, Sender, and Recipient filters.


    ### Flow Description

    1. **Initialization:** Connects to the Microsoft Exchange server using the provided
    integration credentials.

    2. **Mailbox Identification:** Determines the target mailboxes based on the 'Mailboxes'
    parameter or by fetching all searchable mailboxes if 'Delete from all mailboxes'
    is enabled.

    3. **Batch Processing:** Groups mailboxes into batches based on the 'batch_size'
    to manage resource usage.

    4. **Search:** For each mailbox in the batch, it searches the specified folders
    for emails matching the provided filters (Message ID, Subject, Sender, Recipient,
    and Time Frame).

    5. **Deletion:** Deletes the identified emails from the mailbox. Depending on
    the configuration, it removes either the first match or all matches.

    6. **State Management:** If more mailboxes remain, it saves the current progress
    and continues in the next execution cycle (async).

    7. **Completion:** Once all mailboxes are processed, it returns a summary of deleted
    emails and a JSON result containing metadata for each deleted item.
