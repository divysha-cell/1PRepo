List Exchange-Siemplify Inbox Rules:
  ai_description: >-
    ### General Description

    Lists specific or categorized Exchange-Siemplify Inbox rules from one or more
    Microsoft Exchange mailboxes. This action is designed to provide visibility into
    existing mail flow rules created via the Exchange integration, allowing users
    to verify configurations for sender or domain-based filtering. It supports asynchronous
    execution to handle large-scale environments with many mailboxes.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Rule Name To List | String | Yes | The name of the specific rule to retrieve.
    It also accepts predefined categories: 'All available Exchange-Siemplify Senders
    Rules', 'All available Exchange-Siemplify Domains Rules', or 'All available Exchange-Siemplify
    Rules'. |

    | Mailboxes list to perform on | String | No | A comma-separated list of specific
    mailbox email addresses to query. If provided, the 'Perform action in all mailboxes'
    parameter is ignored. |

    | Perform action in all mailboxes | Boolean | No | If set to true, the action
    attempts to list rules from all mailboxes accessible via the current integration
    credentials (requires appropriate permissions). |

    | How many mailboxes to process in a single batch | Integer | No | Defines the
    number of mailboxes processed in a single execution cycle. Default is 50. This
    is used to manage performance and avoid timeouts in large environments. |


    ### Additional Notes

    - **Permissions:** To perform this operation, the configured Exchange account
    must have EDiscovery Group and Author permissions.

    - **Async Execution:** This action runs asynchronously. If the number of mailboxes
    exceeds the batch size or the script approaches its timeout, it will save its
    state and continue in a subsequent run.

    - **Scope:** If neither a mailbox list is provided nor 'Perform action in all
    mailboxes' is checked, the action defaults to the mailbox of the logged-in user.


    ### Flow Description

    1. **Initialization:** The action parses input parameters and initializes the
    Exchange connection manager.

    2. **Rule Identification:** It determines the set of rule names to search for
    based on the 'Rule Name To List' parameter.

    3. **Mailbox Discovery:** It identifies the target mailboxes by checking the provided
    list, querying for all searchable mailboxes (if enabled), or defaulting to the
    primary account.

    4. **Batch Processing:** The action processes the mailboxes in batches. For each
    mailbox in the current batch, it queries the Exchange server for the specified
    inbox rules.

    5. **Data Aggregation:** Successful rule retrievals are collected, and any mailbox-specific
    failures are logged.

    6. **Completion/Continuation:** If more mailboxes remain, the action saves its
    progress and enters an 'In Progress' state. Once all mailboxes are processed,
    it returns the aggregated rule data as a JSON result.
