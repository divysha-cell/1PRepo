Wait for Vote Mail Results:
  ai_description: "The 'Wait for Vote Mail Results' action is a specialized utility\
    \ for the Microsoft Exchange integration designed to track and retrieve responses\
    \ to voting emails. It is typically used in conjunction with the 'Send Vote Mail'\
    \ action to automate approval workflows or surveys. The action operates asynchronously,\
    \ polling specified mailbox folders over a defined period to collect 'votes' (replies)\
    \ from a list of recipients. It correlates replies using the original Message\
    \ ID and Conversation ID to ensure accuracy. The action can be configured to wait\
    \ for all recipients to respond or proceed as soon as the first response is received.\
    \ If the specified timeout is reached before the conditions are met, the action\
    \ concludes with the results collected up to that point.\n\n### Parameters Description\n\
    \n| Parameter | Type | Mandatory | Description |\n| :--- | :--- | :--- | :---\
    \ |\n| Vote Mail message_id | String | Yes | The unique identifier of the original\
    \ vote email. This is used to locate the sent message and its associated conversation.\
    \ |\n| Mail Recipients | String | Yes | A comma-separated list of email addresses\
    \ from whom responses are expected. |\n| Folder to Check for Reply | String |\
    \ Yes | The mailbox folder(s) (e.g., 'Inbox') to monitor for incoming replies.\
    \ Supports subfolders using '/' and comma-separated lists. |\n| Folder to check\
    \ for Sent Mail | String | Yes | The mailbox folder(s) (e.g., 'Sent Items') where\
    \ the original vote email is stored. |\n| How long to wait for recipient reply\
    \ (minutes) | Integer | Yes | The maximum duration the action will wait for responses\
    \ before timing out. |\n| Wait for All Recipients to Reply? | Boolean | No | If\
    \ true, the action waits for every recipient to respond. If false, it completes\
    \ after the first valid response. Default is true. |\n\n### Additional Notes\n\
    - This action is **Async**, meaning it will run in multiple iterations until the\
    \ completion condition or timeout is met.\n- It relies on the `message_id` provided\
    \ by the 'Send Vote Mail' action to correctly identify the email thread.\n\n###\
    \ Flow Description\n1. **Initialization**: The action extracts the provided message\
    \ ID, recipient list, and folder configurations.\n2. **Sent Mail Retrieval**:\
    \ It searches the 'Sent Mail' folders to find the original email and extract its\
    \ `conversation_id`.\n3. **Reply Polling**: It searches the 'Reply' folders for\
    \ any messages belonging to the same conversation ID, excluding the original message.\n\
    4. **Recipient Matching**: For each found reply, it verifies if the sender is\
    \ in the expected recipients list and extracts the 'vote' (response text).\n5.\
    \ **Condition Evaluation**: \n    - If the stopping condition is met (all replied\
    \ or first reply received), the action completes.\n    - If the timeout is reached,\
    \ it completes with a 'Timeout' status for missing responses.\n    - Otherwise,\
    \ it enters an 'In Progress' state to wait for the next polling iteration.\n6.\
    \ **Result Generation**: The action outputs a JSON object containing the recipients\
    \ and their respective votes."
