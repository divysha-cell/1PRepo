Save Mail Attachments To The Case:
  ai_description: >-
    ### General Description

    The **Save Mail Attachments To The Case** action retrieves email attachments from
    a specific message in a Microsoft Exchange mailbox and uploads them to the Google
    SecOps case wall. This action is primarily used for evidence collection and forensic
    analysis, allowing analysts to centralize files associated with a suspicious email
    within the SOAR platform.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Folder Name** | String | Yes | Specifies the mailbox folder(s) to search for
    the email. Supports a comma-separated list of folders (e.g., 'Inbox, Sent Items').
    Use the '/' separator for subfolders (e.g., 'Inbox/Subfolder'). |

    | **Message ID** | String | Yes | The unique identifier of the email from which
    attachments should be retrieved. |

    | **Attachment To Save** | String | No | If specified, only the attachment matching
    this filename will be saved. If left empty, all attachments found in the email
    will be uploaded to the case. |


    ### Flow Description

    1. **Connection**: The action initializes a connection to the Microsoft Exchange
    server using the integration's configuration.

    2. **Search**: It iterates through the provided **Folder Name**(s) to locate the
    email matching the specified **Message ID**.

    3. **Extraction**: Upon finding the email, the action extracts the list of attachments.
    If the **Attachment To Save** parameter is provided, it filters the list to include
    only the matching file.

    4. **Internal Mutation**: The action iterates through the identified attachments
    and uses the `add_attachment` method to upload the file content directly to the
    Google SecOps case wall.

    5. **Completion**: It records the email metadata in the action's JSON results
    and provides a summary message of the successfully saved attachments.


    ### Additional Notes

    - This action is read-only regarding the external Exchange system; it does not
    delete, move, or mark emails as read.

    - If no email is found with the provided ID in the specified folders, the action
    will report a failure.
