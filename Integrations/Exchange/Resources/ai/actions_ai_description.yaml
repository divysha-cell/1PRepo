    \ logic (Reply All or specific recipients), and sends the reply while maintaining\
    \ the email thread headers (In-Reply-To and References).\n\n### Parameters\n|\
    \ Parameter | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n\
    | Message ID | String | Yes | The unique identifier of the email message to which\
