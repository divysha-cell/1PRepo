    \ from the rule conditions. Note: While marked optional in configuration, the\
    \ action will fail if no domains are provided. |\n| Rule to remove Domains from\
    \ | String | Yes | The specific rule name to target. Options include 'Siemplify\
    \ - Domains List - Move To Junk', 'Siemplify - Domains List - Delete', and 'Siemplify\
    \ - Domains List - Permanently Delete'. |\n| Remove Domains from all available\
    \ Rules | Boolean | No | If enabled, the action will attempt to remove the domains\
    \ from all three standard Siemplify domain rules, ignoring the specific rule selected\
    \ in the previous parameter. |\n| Perform action in all mailboxes | Boolean |\
    \ No | If enabled, the action iterates through all mailboxes accessible via the\
    \ configured impersonation or delegation settings. |\n| How many mailboxes to\
    \ process in a single batch | Integer | No | Defines the number of mailboxes to\
    \ process in a single execution cycle. This is used for async processing to prevent\
    \ timeouts. Default is 50. |\n\n### Additional Notes\n- **Async Execution:** This\
    \ action runs asynchronously. If processing a large number of mailboxes, it will\
    \ yield and resume until all mailboxes are processed.\n- **Rule Deletion:** If\
    \ removing the domains results in a rule having no remaining conditions, the action\
    \ will delete the rule entirely from the mailbox.\n- **Permissions:** Requires\
    \ EDiscovery Group and Author permissions for the service account.\n\n### Flow\
    \ Description\n1. **Initialization:** The action initializes the Exchange manager\
    \ and extracts user-provided parameters, including the list of domains and target\
    \ rules.\n2. **Mailbox Discovery:** If 'Perform action in all mailboxes' is selected,\
