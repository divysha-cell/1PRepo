  ai_description: "Removes specified domains from existing Microsoft Exchange inbox\
    \ rules. This action is primarily used to manage and clean up automated mail handling\
    \ rules (such as blocklists or 'Move to Junk' rules) created within the Exchange\
    \ environment. It interacts with the Exchange server using EWS (Exchange Web Services)\
    \ and supports processing across multiple mailboxes.\n\n### Parameters Description\n\
    \n| Parameter | Type | Mandatory | Description |\n| :--- | :--- | :--- | :---\
