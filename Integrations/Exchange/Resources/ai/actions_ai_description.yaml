Delete Exchange-Siemplify Inbox Rules:
  ai_description: >-
    Deletes specific inbox rules from Microsoft Exchange mailboxes using Exchange
    Web Services (EWS). This action is designed to remove rules that may have been
    created for malicious purposes (e.g., data exfiltration or hiding emails) or to
    clean up automated rules created during a security incident. It supports deleting
    individual rules by name or bulk-deleting predefined sets of rules related to
    senders and domains. The action runs asynchronously to handle large environments
    by processing mailboxes in configurable batches.


    ### Parameters

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Rule Name To Delete | String | Yes | The specific name of the inbox rule to
    delete. It also supports special values: 'All available Exchange-Siemplify Senders
    Rules', 'All available Exchange-Siemplify Domains Rules', or 'All available Exchange-Siemplify
    Rules'. |

    | Perform action in all mailboxes | Boolean | No | If enabled, the action will
    attempt to find and delete the rule in all mailboxes accessible via the configured
    integration permissions (Impersonation or Delegated access). |

    | How many mailboxes to process in a single batch | Integer | No | Controls the
    number of mailboxes processed in a single execution cycle. Default is 50. Adjust
    this to manage performance and avoid timeouts. |


    ### Additional Notes

    - This action requires appropriate EWS permissions (e.g., Application Impersonation
    or specific mailbox access).

    - Because the action is asynchronous, it will continue running across multiple
    iterations until all identified mailboxes are processed.


    ### Flow Description

    1. **Initialization:** The action initializes the Exchange manager using the integration's
    configuration (Server Address, Credentials, etc.).

    2. **Mailbox Discovery:** On the first run, it identifies the list of target mailboxes
    based on the 'Perform action in all mailboxes' parameter.

    3. **Rule Identification:** For each mailbox in the current batch, the action
    retrieves the list of existing inbox rules.

    4. **Deletion:** It matches the retrieved rules against the 'Rule Name To Delete'
    parameter. If a match is found, it sends a deletion request to the Exchange server.

    5. **State Management:** The action tracks processed, failed, and remaining mailboxes.
    If more mailboxes remain after a batch, it saves its state and triggers another
    iteration.

    6. **Completion:** Once all mailboxes are processed, it provides a summary of
    successful deletions and any mailboxes that failed to process.
