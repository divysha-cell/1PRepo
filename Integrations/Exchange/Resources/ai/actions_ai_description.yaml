Move Mail To Folder:
  ai_description: >-
    Moves one or multiple emails from a source folder to a destination folder within
    Microsoft Exchange mailboxes. This action is useful for remediation (e.g., moving
    malicious emails to a 'Quarantine' or 'Junk' folder) or organizational tasks.
    It supports filtering emails by Message IDs, Subject, read status, and a specific
    time frame. The action can operate on specific mailboxes or across all mailboxes
    accessible via impersonation/delegation. It runs asynchronously to handle large
    batches of mailboxes efficiently.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Source Folder Name | String | Yes | The folder to search for emails (e.g., 'Inbox').
    Supports subfolders using '/' (e.g., 'Inbox/Subfolder'). |

    | Destination Folder Name | String | Yes | The folder where matching emails will
    be moved. |

    | Source Mailbox | String | No | Comma-separated list of mailboxes to search.
    If empty, defaults to the configured integration mailbox. |

    | Destination Mailbox | String | No | The mailbox containing the destination folder.
    |

    | Message IDs | String | No | Comma-separated list of specific Message IDs to
    move. If provided, the Subject Filter is ignored. |

    | Subject Filter | String | No | Case-insensitive string to match in the email
    subject. |

    | Only Unread | Boolean | No | If true, only unread emails will be processed.
    Default is false. |

    | Move in all mailboxes | Boolean | No | If true, searches all accessible mailboxes.
    Ignored if Source/Destination Mailbox is explicitly provided. |

    | How many mailboxes to process in a single batch | Integer | No | Number of mailboxes
    to process per execution cycle (default 25). |

    | Time Frame (minutes) | Integer | No | Lookback period in minutes for finding
    emails. |

    | Limit the Amount of Information Returned in the JSON Result | Boolean | No |
    If true, returns only key email fields in the output. Default is true. |

    | Disable the Action JSON Result | Boolean | No | If true, suppresses the JSON
    output. Default is false. |


    ### Additional Notes

    - **Impersonation:** To move emails across different user mailboxes, the integration
    must be configured with appropriate Exchange Impersonation or Delegation permissions.

    - **Async Execution:** The action processes mailboxes in batches. If many mailboxes
    are involved, the action will remain 'In Progress' until all batches are complete.

    - **Logic Priority:** If `Message IDs` are provided, the `Subject Filter` is bypassed.


    ### Flow Description

    1. **Initialization:** Connects to the Exchange server using the provided credentials
    and configuration.

    2. **Mailbox Identification:** Determines the list of target mailboxes based on
    the 'Source Mailbox' parameter or the 'Move in all mailboxes' flag.

    3. **Validation:** Checks if the source and destination folders exist within the
    target mailboxes.

    4. **Search:** Queries the source folder for emails matching the specified filters
    (Message IDs, Subject, Time Frame, Unread status).

    5. **Mutation:** Moves the identified emails to the destination folder in the
    target mailbox.

    6. **Batching:** If multiple mailboxes are being processed, it handles them in
    batches defined by the batch size parameter.

    7. **Completion:** Returns a summary of successfully moved emails and any failed
    mailboxes.
