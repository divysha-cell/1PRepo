Wait for mail from user:
  ai_description: "### General Description\nThis action is an asynchronous polling\
    \ mechanism designed to wait for email replies from specific recipients in Microsoft\
    \ Exchange. It is typically used in a playbook following a 'Send Email' action\
    \ to capture user feedback, approvals, or additional information. The action monitors\
    \ specified mailbox folders for emails that are in reply to a specific `message_id`\
    \ and evaluates whether the response criteria (e.g., waiting for all recipients\
    \ or just the first) have been met.\n\n### Parameters Description\n| Parameter\
    \ | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n| Mail message_id\
    \ | String | Yes | The `message_id` of the original email sent. This is used to\
    \ identify replies via the `In-Reply-To` or `References` headers. |\n| Mail Date\
    \ | Integer | Yes | The Unix timestamp (in milliseconds) of when the original\
    \ email was sent. Used to calculate the timeout period. |\n| Mail Recipients |\
    \ String | Yes | A comma-separated list of email addresses from which the action\
    \ expects a reply. |\n| How long to wait for recipient reply (minutes) | Integer\
    \ | Yes | The maximum duration to wait for replies before the action times out.\
    \ Default is 1440 minutes (24 hours). |\n| Wait for All Recipients to Reply? |\
    \ Boolean | No | If true, the action stays in progress until every recipient in\
    \ the list has replied. If false, it completes after the first valid reply. Default\
    \ is true. |\n| Wait Stage Exclude pattern | String | No | A regular expression\
    \ used to ignore specific replies (e.g., 'Out of Office' or automated 'Read' receipts)\
    \ based on the email body. |\n| Folder to Check for Reply | String | No | The\
    \ mailbox folder(s) to monitor for replies. Supports comma-separated lists and\
    \ subfolders (e.g., 'Inbox/Subfolder'). Default is 'Inbox'. |\n| Fetch Response\
    \ Attachments | Boolean | No | If enabled, any attachments found in the user's\
    \ reply will be downloaded and attached directly to the SOAR case. |\n\n### Additional\
    \ Notes\n- **Async Execution:** This action runs in 'QueryState' mode, meaning\
    \ it will periodically poll the Exchange server until the condition is met or\
    \ it times out.\n- **Timeout Alignment:** Ensure the 'How long to wait' parameter\
    \ does not exceed the global Google SecOps action timeout settings.\n- **Internal\
    \ Mutation:** This action can modify the SOAR case by adding file attachments\
    \ if `Fetch Response Attachments` is set to true.\n\n### Flow Description\n1.\
    \ **Initialization:** The action initializes the Exchange manager using the integration's\
    \ configuration (Server Address, Credentials, etc.).\n2. **Search:** It searches\
    \ the specified folders for emails where the `In-Reply-To` header matches the\
    \ provided `Mail message_id`.\n3. **Filtering:** For each found email, it verifies\
    \ if the sender is among the expected `Mail Recipients` and checks the body against\
    \ the `Wait Stage Exclude pattern`.\n4. **Attachment Processing:** If a valid\
    \ reply is found and `Fetch Response Attachments` is true, it extracts attachments\
    \ from the reply and adds them to the SOAR case.\n5. **State Evaluation:** \n\
    \    - If the reply conditions (All vs. First) are met, the action completes successfully.\n\
    \    - If the timeout is reached, the action finishes with a 'Timed Out' status.\n\
    \    - Otherwise, it remains 'In Progress' and waits for the next polling interval."
