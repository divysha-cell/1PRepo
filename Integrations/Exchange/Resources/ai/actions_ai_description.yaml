Send Mail:
  ai_description: >-
    Sends an email from a specific Microsoft Exchange mailbox to a list of recipients.
    This action is primarily used for notification purposes, such as informing users
    about security alerts or sharing the results of automated playbooks. It supports
    standard HTML emails, encrypted emails (S/MIME), and digitally signed emails.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Subject | String | Yes | The subject line of the email. |

    | Send to | String | Yes | A comma-separated list of recipient email addresses.
    |

    | CC | String | No | A comma-separated list of email addresses for the CC field.
    |

    | BCC | String | No | A comma-separated list of email addresses for the BCC field.
    |

    | Attachments Paths | String | No | A comma-separated list of absolute file paths
    on the server to be attached to the email. |

    | Mail content | String | Yes | The body of the email. Supports HTML content.
    |

    | Reply-To Recipients | String | No | A comma-separated list of recipients for
    the 'Reply-To' header. |

    | Base64 Encoded Certificate | String | No | A base64 encoded certificate used
    for encryption or signing. |

    | Base64 Encoded Signature | String | No | A base64 encoded private key/signature
    used for signing (requires the certificate parameter). |


    ### Flow Description


    1.  **Parameter Extraction:** The action retrieves all input parameters, including
    recipients, subject, body, and security certificates.

    2.  **Manager Initialization:** It initializes the Exchange Manager using the
    integration's configuration (Server Address, Credentials, etc.).

    3.  **RTL Handling:** The script checks if the email body contains Right-to-Left
    (RTL) characters (e.g., Hebrew or Arabic) and wraps the content in appropriate
    HTML divs if necessary.

    4.  **Security Logic:**
        *   If both a certificate and a signature are provided, it sends a **signed**
    email.
        *   If only a certificate is provided, it sends an **encrypted** email.
        *   Otherwise, it sends a standard **HTML** email.
    5.  **Attachment Processing:** If file paths are provided, the action reads the
    files from the server and attaches them to the outgoing message.

    6.  **Execution:** The email is sent via Exchange Web Services (EWS). For Exchange
    Server 2013 and above, the action retrieves and returns the sent message details
    as JSON.


    ### Additional Notes


    *   This action does not run on specific entities; it uses the provided parameters
    to define the email's scope.

    *   The 'Attachments Paths' must refer to files already present on the local file
    system where the SOAR agent is running.
