"Add Domains to Exchange-Siemplify Inbox Rules":
  ai_description: >-
    ### General Description

    The **Add Domains to Exchange-Siemplify Inbox Rules** action allows administrators
    to programmatically manage Microsoft Exchange inbox rules by adding specific domains
    to a filter list. This is primarily used for automated threat containment, such
    as moving emails from known malicious domains to the Junk folder or deleting them
    entirely across multiple mailboxes.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Domains | String | No | A comma-separated list of domains to be added to the
    rule. |

    | Rule to add Domains to | Dropdown | Yes | The specific rule action to perform.
    Options include: 'Siemplify - Domains List - Move To Junk', 'Siemplify - Domains
    List - Delete', or 'Siemplify - Domains List - Permanently Delete'. |

    | Perform action in all mailboxes | Boolean | No | If enabled, the action attempts
    to update rules across all mailboxes accessible via the configured integration
    permissions. |

    | How many mailboxes to process in a single batch | Integer | No | Controls the
    number of mailboxes processed per execution cycle (default is 50) to manage performance
    and avoid timeouts. |


    ### Flow Description

    1. **Initialization**: The action connects to the Microsoft Exchange server using
    the provided integration credentials (supporting both Basic and OAuth2 authentication).

    2. **Mailbox Discovery**: If 'Perform action in all mailboxes' is selected, the
    action retrieves a list of all searchable mailboxes; otherwise, it targets the
    primary mailbox defined in the integration.

    3. **Rule Retrieval**: For each mailbox in the current batch, the action checks
    for the existence of the specified Siemplify rule using Exchange Web Services
    (EWS).

    4. **Domain Merging**: It retrieves existing domains from the rule (if it exists)
    and merges them with the new domains provided in the parameters to ensure a comprehensive
    and deduplicated list.

    5. **Rule Update/Creation**: The action uses EWS to either update the existing
    rule with the new domain list or create a new rule if one does not exist for that
    specific mailbox.

    6. **Async Handling**: Because processing many mailboxes can be time-consuming,
    the action runs asynchronously, processing mailboxes in batches and maintaining
    state between iterations until all mailboxes are updated.


    ### Additional Notes

    - This action requires the service account to have appropriate EWS permissions,
    such as Application Impersonation or Delegated Access.

    - Either the 'Domains' parameter must be filled, or the action will fail with
    an 'Incomplete Information' error.
