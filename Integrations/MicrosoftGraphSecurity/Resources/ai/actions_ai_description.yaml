Kill User Session:
  ai_description: >-
    ### General Description

    The **Kill User Session** action is designed to immediately invalidate all active
    refresh tokens issued to applications for a specific user within Microsoft Entra
    ID (formerly Azure AD). By calling the Microsoft Graph API's `revokeSignInSessions`
    endpoint, the action resets the `signInSessionsValidFromDateTime` property to
    the current time. This effectively forces the user to re-authenticate across all
    devices and applications, providing a critical containment capability during account
    compromise or suspicious activity.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **userPrincipalName \| ID** | String | Yes | The unique identifier for the user.
    This can be either their User Principal Name (e.g., user@domain.com) or their
    unique Azure AD Object ID (GUID). |


    ### Additional Notes

    - This action does not target SecOps entities directly; it requires the user identifier
    to be provided as a manual input or mapped from a previous playbook step.

    - The action performs a state-changing operation in the external Microsoft environment.


    ### Flow Description

    1. **Initialization**: The action initializes the Microsoft Graph Security Manager
    using the provided integration configuration (Client ID, Tenant, and Secret or
    Certificate).

    2. **Parameter Extraction**: It retrieves the `userPrincipalName | ID` from the
    action parameters.

    3. **API Execution**: It sends a POST request to the `revokeSignInSessions` endpoint
    for the specified user.

    4. **Validation**: The manager validates the response from Microsoft Graph to
    ensure the session revocation was successful.

    5. **Completion**: The action reports a successful status if the tokens were invalidated
    or a failure status if an error occurred (e.g., user not found or insufficient
    permissions).
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Invalidates all refresh tokens for a user in Microsoft Entra ID, effectively
      signing them out of all active application sessions.
    fetches_data: false
    internal_data_mutation_explanation: null
