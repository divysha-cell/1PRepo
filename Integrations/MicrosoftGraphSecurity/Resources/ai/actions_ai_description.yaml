List Alerts:
  ai_description: >-
    ### General Description

    The **List Alerts** action retrieves a collection of alert objects from Microsoft
    Graph Security. It allows users to query for security alerts across various providers
    integrated with the Microsoft Graph Security API. The action supports filtering
    by specific keys and logic, returning results in both a structured data table
    and a raw JSON format for downstream processing.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Filter Key** | String | Yes | Specify the alert attribute to filter by (e.g.,
    'Category', 'Title'). Note: 'Title' is not supported when using the V2 API. |

    | **Filter Logic** | String | Yes | Specify the filtering logic to apply (e.g.,
    'Equal', 'Contains'). |

    | **Filter Value** | String | No | The value to be used in the filter. If provided,
    the action searches for results matching the Key and Logic. |

    | **Max Records To Return** | Integer | No | The maximum number of alert records
    to retrieve. Defaults to 50 if not specified. |


    ### Additional Notes

    - This action supports both V1 and V2 of the Microsoft Graph Security API based
    on the integration configuration.

    - Although 'Filter Key' and 'Filter Logic' are mandatory parameters, they include
    a 'Not Specified' option to bypass filtering if a 'Filter Value' is not provided.

    - If a 'Filter Value' is provided, valid selections for 'Filter Key' and 'Filter
    Logic' are required to avoid validation errors.


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves configuration settings (credentials,
    API version) and user-defined filter parameters.

    2. **Validation**: It ensures 'Max Records To Return' is a positive integer and
    checks for logical consistency between the filter key, logic, and value.

    3. **Connection**: Initializes the Microsoft Graph Security Manager using OAuth2
    authentication (via Client Secret or Certificate).

    4. **Data Retrieval**: Performs a paginated GET request to the Microsoft Graph
    Security alerts endpoint, applying OData filters based on the input parameters.

    5. **Output Generation**: Formats the retrieved alerts into a CSV data table named
    'Alerts' and attaches the raw JSON data to the action results.
