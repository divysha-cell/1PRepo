    \ states, network connections, and malware information, which is then presented\
    \ in a structured format within the case.\n\n### Parameters Description\n| Parameter\
    \ | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n| **Alert\
    \ ID** | String | Yes | The unique identifier of the alert to retrieve from Microsoft\
    \ Graph Security. |\n\n### Flow Description\n1. **Authentication**: The action\
    \ authenticates with the Microsoft Graph API using the configured Client ID and\
    \ either a Secret ID or a Certificate.\n2. **API Version Selection**: Depending\
    \ on the \"Use V2 API\" configuration, the action initializes either the standard\
    \ or V2 version of the Microsoft Graph Security Manager.\n3. **Data Retrieval**:\
    \ The action executes a GET request to the Microsoft Graph Security endpoint to\
