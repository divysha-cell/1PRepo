List Incidents:
  ai_description: >-
    ### General Description

    This action retrieves a list of security incidents from Microsoft Graph Security
    based on user-defined filtering criteria. It is designed to provide visibility
    into security incidents managed within the Microsoft ecosystem, allowing analysts
    to search for specific incidents by ID or severity and view their details directly
    within Google SecOps.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Filter Key** | String (Dropdown) | No | Specifies the field to filter by.
    Options include `Id` and `severity`. |

    | **Filter Logic** | String (Dropdown) | No | Specifies the comparison logic.
    Options include `Equal` and `Contains`. |

    | **Filter Value** | String | No | The specific value to search for based on the
    selected key and logic. |

    | **Max Records To Return** | Integer | No | Limits the number of incidents returned.
    Defaults to 50. Must be at least 1. |


    ### Additional Notes

    - If a **Filter Value** is provided, both **Filter Key** and **Filter Logic**
    must also be configured; otherwise, the action will fail validation.

    - The `Contains` logic is not supported when filtering by the `severity` key.

    - Results are returned as a JSON object and also rendered as a data table on the
    case wall.


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves integration configuration (credentials,
    tenant) and user-provided filter parameters.

    2. **Validation**: It validates that the filter parameters are logically consistent
    (e.g., if a value is provided, the key and logic must also exist) and ensures
    the record limit is valid.

    3. **API Interaction**: The action constructs an OData filter query and sends
    a GET request to the Microsoft Graph `/security/incidents` endpoint.

    4. **Pagination**: If the number of results exceeds the API's single-page limit
    but is less than the requested maximum, the action paginates through the results.

    5. **Output Generation**: The retrieved incidents are processed into a JSON result
    and a CSV-formatted data table, which is then attached to the case wall.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      The action adds a data table named 'Incidents' to the case wall containing the
