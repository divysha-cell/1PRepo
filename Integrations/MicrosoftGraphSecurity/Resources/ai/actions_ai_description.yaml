Update Alert:
  ai_description: >-
    ### General Description

    Updates editable properties of an alert in Microsoft Graph Security to keep alert
    status and assignments in sync across solutions. This action supports both the
    V1 and V2 versions of the Microsoft Graph Security API, allowing for updates to
    status, assignment, feedback, and comments.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Alert ID** | String | Yes | The unique identifier of the alert to update in
    Microsoft Graph Security. |

    | **Assigned To** | String | No | Name of the analyst the alert is assigned to
    for triage, investigation, or remediation. |

    | **Closed Date Time** | String | No | Time at which the alert was closed (ISO
    8601 format, e.g., '2014-01-01T00:00:00Z'). **Note:** This parameter is not supported
    when using the V2 API. |

    | **Comments** | String | No | Analyst comments. In V1, these are comma-separated
    and restricted to specific values like 'Closed in IPC' or 'Closed in MCAS'. In
    V2, this is a free-text string added as a new comment to the alert. |

    | **Feedback** | String | No | Analyst feedback or classification. For V1, valid
    values include: `unknown`, `truePositive`, `falsePositive`, `benignPositive`.
    For V2, valid values include: `unknown`, `falsePositive`, `truePositive`, `informationalExpectedActivity`,
    `unknownFutureValue`. |

    | **Status** | String | No | Alert lifecycle status. Possible values are: `unknown`,
    `newAlert`, `inProgress`, `resolved`. |

    | **Tags** | String | No | Comma-separated user-definable labels applied to the
    alert. **Note:** This parameter is not supported when using the V2 API. |


    ### Additional Notes

    - The action's logic and supported parameters vary based on the "Use V2 API" configuration
    setting.

    - In V1 mode, the action performs an initial GET request to retrieve alert details
    (specifically vendor information) before applying the update.

    - In V2 mode, comments are handled via a separate POST request to the Microsoft
    Graph Security comments endpoint.


    ### Flow Description

    1. **Initialization**: Establishes a connection to Microsoft Graph Security using
    the configured authentication method (Client Secret or Certificate).

    2. **Validation**: Checks the provided `Status` and `Feedback` parameters against
    the allowed values defined for the active API version (V1 or V2).

    3. **Data Preparation**:
        - **V1 Flow**: Fetches the current alert details to obtain mandatory vendor
    information and processes comma-separated tags and comments.
        - **V2 Flow**: Maps the `Status` and `Feedback` (classification) to the V2-specific
    schema.
    4. **Execution**:
        - **V2 Flow**: If a comment is provided, it is posted to the alert's comment
    endpoint first.
        - Sends a PATCH request to the Microsoft Graph Security API (v1.0/security/alerts
    or v1.0/security/alerts_v2) with the updated fields.
    5. **Completion**: Evaluates the API response and returns a success or failure
    status to the Google SecOps platform.
