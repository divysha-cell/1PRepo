Add Alert Comment:
  ai_description: >-
    ### General Description

    Adds a comment to a specific alert in Microsoft Graph Security. This action allows
    analysts to document findings or updates directly within the Microsoft Graph Security
    platform from Google SecOps.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Alert ID** | String | Yes | Specify the unique identifier of the alert in
    Microsoft Graph that needs to be updated. |

    | **Comment** | String | Yes | Specify the text content of the comment for the
    alert. |


    ### Additional Notes

    - The comment length is strictly limited to 1000 characters as per the Microsoft
    Graph API limitations.

    - This action specifically targets the `alerts_v2` endpoint in Microsoft Graph
    Security.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the Alert ID and the Comment
    text from the input parameters.

    2. **Validation:** It checks the length of the provided comment to ensure it does
    not exceed the 1000-character limit.

    3. **API Initialization:** It initializes the Microsoft Graph Security Manager
    using the provided integration configuration (Client ID, Secret/Certificate, and
    Tenant).

    4. **Execution:** It performs a POST request to the Microsoft Graph Security API
    to append the comment to the specified alert. If the alert is not found, an error
    is raised.
