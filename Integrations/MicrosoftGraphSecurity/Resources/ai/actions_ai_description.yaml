Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic utility designed to verify the connectivity
    and authentication configuration between Google SecOps and Microsoft Graph Security.
    Its primary purpose is to ensure that the integration can successfully communicate
    with the Microsoft Graph API using the provided credentials (Client ID, Secret,
    or Certificate) and Tenant information.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Client ID** | String | Yes | The Application (client) ID assigned to the app
    registration in the Azure portal. |

    | **Secret ID** | String | No | The client secret generated for the application.
    Required if certificate-based authentication is not used. |

    | **Certificate Path** | String | No | The local file path to the PFX certificate
    on the SecOps server for certificate-based authentication. |

    | **Certificate Password** | String | No | The password required to access the
    PFX certificate file. |

    | **Tenant** | String | Yes | The Azure Active Directory tenant ID or domain name
    (e.g., contoso.onmicrosoft.com). |

    | **Use V2 API** | Boolean | No | Determines whether to initialize the manager
    using the Microsoft Graph Security V2 API endpoints. Defaults to `False`. |

    | **Verify SSL** | Boolean | No | Specifies whether to verify the SSL certificate
    of the API endpoints. Defaults to `False`. |


    ### Additional Notes

    - **Authentication Requirement:** The action requires either a `Secret ID` or
    a valid `Certificate Path` (and password) to successfully authenticate. If both
    are missing or incorrect, the connectivity test will fail.

    - **No Entity Interaction:** This action does not interact with or process any
    entities within a case.


    ### Flow Description

    1. **Initialization:** The action extracts all configuration parameters from the
    integration settings.

    2. **Configuration Setup:** It constructs a configuration object containing the
    credentials and connection settings.

    3. **Connection Test:** It attempts to initialize the `MicrosoftGraphSecurityManager`.
    During initialization, the manager performs an OAuth2 handshake with the Microsoft
    identity platform to retrieve an access token.

    4. **Validation:** If the token is successfully retrieved, the connection is validated
    as established. If an error occurs (e.g., 401 Unauthorized, network timeout),
    the action captures the exception and reports a failure.
