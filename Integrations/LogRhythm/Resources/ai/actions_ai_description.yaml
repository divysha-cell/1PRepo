Add Alarm To Case:
  ai_description: >-
    ### General Description

    This action allows users to associate one or more LogRhythm alarms with a specific
    LogRhythm case by adding them as evidence. It is primarily used to centralize
    related security events within the LogRhythm platform for better investigation
    and tracking.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Case ID | String | Yes | The unique identifier of the LogRhythm case to which
    the alarms will be added. |

    | Alarm IDs | String | Yes | A comma-separated list of LogRhythm alarm IDs that
    should be linked to the specified case. |


    ### Flow Description

    1. **Initialization**: The action retrieves connection details (API Root, Token,
    SSL verification) and the input parameters (Case ID and Alarm IDs).

    2. **Data Parsing**: The comma-separated string of Alarm IDs is converted into
    a list of integers.

    3. **API Interaction**: The action calls the LogRhythm REST API using a POST request
    to the `/lr-case-api/cases/{case_id}/evidence/alarms` endpoint with the list of
    alarm numbers.

    4. **Result Processing**: The action captures the response from LogRhythm, which
    includes details of the linked alarms. If the alarms were already part of the
    case, a specific message is generated. The resulting data is then returned as
    a JSON result in Google SecOps.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds specific LogRhythm alarms as evidence to an existing LogRhythm case via
      a POST request to the LogRhythm API.
    fetches_data: false
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
