Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic tool used to verify the connectivity between
    the Google SecOps platform and the LogRhythm server. It validates the integration
    configuration by attempting to establish a connection using the provided API credentials
    and endpoint.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API Root | String | Yes | The base URL of the LogRhythm API instance. |

    | API Token | String | Yes | The API key or token used for authentication with
    the LogRhythm server. |

    | Verify SSL | Boolean | No | Determines whether to verify the SSL certificate
    of the LogRhythm server. Defaults to `False`. |


    ### Additional Notes

    This action does not interact with any entities or modify any data. It is strictly
    used for testing the communication path and credential validity during the integration
    setup or troubleshooting. There are no input parameters required beyond the integration's
    global configuration.


    ### Flow Description

    1. **Configuration Extraction:** The action retrieves the `API Root`, `API Token`,
    and `Verify SSL` settings from the LogRhythm integration configuration.

    2. **Manager Initialization:** It initializes the `LogRhythmRESTManager` with
    the extracted parameters.

    3. **Connectivity Test:** The manager triggers a connectivity check by performing
    a `GET` request to the LogRhythm `/lr-admin-api/lists/` endpoint.

    4. **Status Evaluation:** If the API call returns a successful response, the action
    completes with a success message. If an exception occurs (e.g., network timeout,
    401 Unauthorized), the action catches the error and reports a failure.
