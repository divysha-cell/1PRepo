Create Case:
  ai_description: >-
    Creates a new case in LogRhythm. This action allows for the programmatic generation
    of cases within the LogRhythm SIEM, enabling automated incident response workflows
    to document findings externally. It supports setting the case name, priority,
    due date, and a detailed summary.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Name | String | Yes | Specify the name for the case. |

    | Priority | Integer | Yes | Specify the priority for the case (Options: 1, 2,
    3, 4, 5). Default is 1. |

    | Due Date | String | No | Specify the due date for the case in ISO 8601 format
    (e.g., 2021-04-23T12:38Z). |

    | Description | String | No | Specify a detailed description or summary for the
    case. |


    ### Flow Description

    1. **Initialization:** The action retrieves the LogRhythm API credentials (API
    Root and Token) and connection settings from the integration configuration.

    2. **Parameter Extraction:** It extracts the case details provided in the action
    parameters, including the mandatory Name and Priority.

    3. **API Request:** The action uses the `LogRhythmRESTManager` to send a POST
    request to the LogRhythm Case API endpoint (`/lr-case-api/cases/`) with the provided
    case metadata.

    4. **Output Generation:** If successful, the action retrieves the created case
    object from the response, adds the full case details to the JSON results, and
    returns a success message containing the new LogRhythm case number.
