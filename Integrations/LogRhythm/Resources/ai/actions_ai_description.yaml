Add Note To Case:
  ai_description: >-
    ### General Description

    Adds a note to a specific case in LogRhythm. This action allows users to append
    text-based information or updates to an existing LogRhythm case, facilitating
    better documentation and collaboration within the LogRhythm platform directly
    from Google SecOps.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Case ID | String | Yes | Specify the unique identifier (ID) of the case in LogRhythm
    to which the note will be added. |

    | Note | String | Yes | The text content of the note that should be appended to
    the case. |


    ### Additional Notes

    * This action does not process or require any entities (e.g., IP, Hostname) from
    the Google SecOps environment. It relies entirely on the provided `Case ID` and
    `Note` parameters.

    * The action returns the JSON representation of the created note object upon success.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the LogRhythm API configuration
    (API Root, Token, SSL verification) and the specific action parameters (`Case
    ID` and `Note`).

    2. **Manager Initialization:** It initializes the `LogRhythmRESTManager` to handle
    communication with the LogRhythm API.

    3. **API Interaction:** The action calls the `add_note_to_case` method, which
    sends a POST request to the LogRhythm `/lr-case-api/cases/{case_id}/evidence/note`
    endpoint.

    4. **Result Handling:** If the note is successfully added, the resulting note
    data is captured and added to the action's JSON results. The action then completes
    with a success message.
