Add Comment To Alarm:
  ai_description: >-
    ### General Description

    Adds a comment to a specific alarm in LogRhythm. This action allows security analysts
    to push notes or investigation updates from Google SecOps directly into the LogRhythm
    console, ensuring that the external system of record remains synchronized with
    the investigation progress.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Alarm ID | String | Yes | The unique identifier of the alarm in LogRhythm to
    which the comment will be added. |

    | Comment | String | Yes | The text content of the comment to be added to the
    alarm. |


    ### Flow Description

    1. **Initialization**: The action initializes the LogRhythm REST Manager using
    the provided API Root and API Token.

    2. **Parameter Extraction**: It extracts the mandatory `Alarm ID` and the `Comment`
    text from the action input.

    3. **API Request**: The action sends a POST request to the LogRhythm Alarm API
    endpoint (`/lr-alarm-api/alarms/{alarm_id}/comment`) containing the comment payload.

    4. **Completion**: If the request is successful, it returns a success message.
    If the API returns an error (e.g., alarm not found), the action fails and reports
    the reason.
