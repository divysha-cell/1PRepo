List Entity Events:
  ai_description: >-
    ### General Description

    Retrieves historical event logs from LogRhythm for specific entities within a
    Google SecOps case. This action provides supplemental context by querying LogRhythm
    for events associated with Hostnames, IP Addresses, URLs, File Hashes, Users,
    and CVEs. The results are presented as data tables attached to the entities and
    as a raw JSON result for further processing.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Time Frame | Dropdown | No | Specifies the lookback period for the search (e.g.,
    Last Hour, Last 24 Hours). Defaults to 'Last Hour'. If 'Custom' is selected, 'Start
    Time' must be provided. |

    | Start Time | String | No | The start time for the search in ISO 8601 format
    (e.g., 2021-04-23T12:38Z). Mandatory if 'Time Frame' is set to 'Custom'. |

    | End Time | String | No | The end time for the search in ISO 8601 format. If
    omitted and 'Time Frame' is 'Custom', the current time is used. |

    | Sort Order | Dropdown | No | Determines the sorting logic for the retrieved
    events (e.g., Datetime ASC, Risk DESC). Defaults to 'Datetime ASC'. |

    | Max Events To Return | Integer | No | Limits the number of events returned per
    entity. Defaults to 50. |


    ### Additional Notes

    - **Asynchronous Execution:** This action runs asynchronously. It initiates search
    tasks in LogRhythm and then polls for their completion. Ensure the action timeout
    in the IDE is adjusted to accommodate long-running queries.

    - **Custom Time Frame:** When using the 'Custom' time frame, ensure the 'Start
    Time' is provided and is earlier than the 'End Time'.


    ### Flow Description

    1. **Initialization:** Validates input parameters and establishes a connection
    to the LogRhythm REST API.

    2. **Entity Filtering:** Identifies supported entities (ADDRESS, HOSTNAME, DestinationURL,
    FILEHASH, USERUNIQNAME, CVE) from the case's target entities.

    3. **Search Initiation:** For each supported entity, the action initiates an asynchronous
    search task in LogRhythm using the specified time criteria and filters.

    4. **Status Polling:** The action enters a polling phase, checking the status
    of each search task until they are completed, failed, or the global timeout is
    approached.

    5. **Data Retrieval:** Once tasks are completed, the action retrieves the raw
    event data from LogRhythm.

    6. **Output Generation:** Parses the event data and enriches the case by adding
    detailed data tables to each entity and a comprehensive JSON result to the action
    output.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      The action enriches entities by adding data tables and JSON results containing
      event logs retrieved from LogRhythm.
  categories:
    enrichment: true
  entity_usage:
    entity_types:
