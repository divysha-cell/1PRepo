List Case Evidence:
  ai_description: >-
    Lists evidence associated with a specific case in LogRhythm. This action retrieves
    a list of evidence items (such as alarms, logs, notes, or files) linked to a LogRhythm
    case ID, allowing for filtering by status and type. The results are presented
    as a data table within the Google SecOps case and as a raw JSON output.


    ### Flow Description:

    1. **Parameter Extraction:** Retrieves the mandatory 'Case ID' and optional filters
    ('Status Filter', 'Type Filter', 'Max Evidences To Return') from the action input.

    2. **Validation:** Validates that the 'Max Evidences To Return' is a positive
    integer and that the provided filters match allowed LogRhythm values (e.g., pending,
    completed, failed for status; alarm, log, file, etc., for type).

    3. **Data Retrieval:** Connects to the LogRhythm API and performs a GET request
    to fetch the evidence list for the specified case.

    4. **Processing:** Sorts the retrieved evidence by creation date (newest first)
    and applies the specified limit.

    5. **Output Generation:** Constructs a CSV-formatted table of the evidence and
    attaches it to the case. It also provides the full evidence details in JSON format
    for downstream use.


    ### Parameters Description:

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Case ID | String | Yes | The unique identifier of the LogRhythm case to query.
    |

    | Status Filter | String | No | A comma-separated list of statuses to filter evidence
    (e.g., 'pending, completed, failed'). If empty, all statuses are returned. |

    | Type Filter | String | No | A comma-separated list of evidence types to filter
    (e.g., 'alarm, log, note, file'). If empty, all types are returned. |

    | Max Evidences To Return | Integer | No | The maximum number of evidence items
    to retrieve. Defaults to 50. |
  capabilities:
