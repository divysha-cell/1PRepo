Attach File To Case:
  ai_description: >-
    Attaches one or more files to a specific case in LogRhythm as evidence. This action
    supports asynchronous execution to handle large file uploads or API processing
    times. It allows users to specify multiple file paths and an optional note to
    be associated with the uploaded evidence.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Case ID | String | Yes | Specify the ID of the case in LogRhythm to which you
    want to attach files. |

    | File Paths | String | Yes | Specify a comma-separated list of absolute file
    paths on the local system to be uploaded. |

    | Note | String | No | Specify a note that should be added to the case alongside
    the file evidence. |


    ### Flow Description

    1. **Initialization:** Retrieves API credentials (API Root, Token) and action
    parameters (Case ID, File Paths, Note).

    2. **Validation:** Validates that the provided file paths are accessible on the
    local filesystem.

    3. **Upload Initiation:** Iterates through the file list and initiates a POST
    request to the LogRhythm API to attach each file to the specified case.

    4. **Async Tracking:** If the upload is not immediately completed, the action
    stores the evidence IDs and enters an 'In Progress' state.

    5. **Status Polling:** In subsequent runs (async cycles), the action polls the
    LogRhythm API to check the status of the pending file uploads.

    6. **Completion:** Once all files are processed or a timeout is approached, the
    action aggregates the results, adds the evidence details to the result JSON, and
    completes the execution.


    ### Additional Notes

    - This action is asynchronous. Ensure the script timeout in the Google SecOps
    IDE is adjusted appropriately for large files.

    - If a timeout occurs before all files are processed, the action will raise an
    exception listing the files still in progress.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Uploads files and creates new evidence entries within a specific case in the
      LogRhythm platform.
    fetches_data: true
    internal_data_mutation_explanation: null
