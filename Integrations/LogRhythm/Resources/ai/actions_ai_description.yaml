Get Alarm Details:
  ai_description: >-
    ### General Description

    The **Get Alarm Details** action retrieves comprehensive information for one or
    more specific alarms from LogRhythm. It is designed to provide analysts with deep
    context by fetching alarm metadata, associated events, and drill-down summaries
    directly into the Google SecOps platform.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Alarm IDs** | String | Yes | A comma-separated list of LogRhythm alarm IDs
    for which details need to be retrieved. |

    | **Max Events To Fetch** | Integer | No | Specifies the maximum number of events
    to return for each alarm. Default is 50. Must be a positive integer. |


    ### Flow Description

    1. **Initialization**: The action extracts the provided Alarm IDs and validates
    that the 'Max Events To Fetch' parameter is a positive integer.

    2. **Iterative Processing**: The action iterates through each provided Alarm ID,
    checking for execution timeouts at each step.

    3. **Data Retrieval**: For each ID, the action calls the LogRhythm API to fetch:
        - Core alarm details (e.g., status, rule name, entity name).
        - Associated alarm events (up to the specified limit).
        - Alarm drill-down data for deeper technical context.
    4. **Internal Mutation**: If events are successfully retrieved, the action constructs
    a CSV-formatted data table and attaches it to the case wall for each specific
    alarm.

    5. **Finalization**: The action aggregates all retrieved data into a JSON result
    and provides a summary message detailing which alarms were successfully processed
    and which were not found.


    ### Additional Notes

    - This action does not operate on entities; it relies solely on the input 'Alarm
    IDs' parameter.

    - The action is read-only regarding the external LogRhythm system but modifies
    internal case data by adding data tables.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      The action adds data tables to the case wall containing event details for each
      processed alarm.
