Update Case:
  ai_description: "Updates an existing case in LogRhythm with new information. This\
    \ action allows for the modification of various case attributes including its\
    \ name, priority, status, due date, description, and resolution details.\n\n###\
    \ Flow Description:\n1. **Parameter Extraction:** The action retrieves the mandatory\
    \ Case ID and optional update parameters (Name, Priority, Due Date, Description,\
    \ Resolution, and Status) from the input.\n2. **Mapping:** It maps the human-readable\
    \ 'Priority' and 'Status' inputs to their corresponding numeric identifiers required\
    \ by the LogRhythm API using internal mapping constants.\n3. **Validation:** It\
    \ checks if at least one update parameter has been provided. If only the Case\
    \ ID is provided without any changes, the action will fail.\n4. **API Interaction:**\
    \ \n    - If a new status is provided, it calls the LogRhythm API to update the\
    \ case status.\n    - If any other attributes (Name, Priority, Due Date, Description,\
    \ or Resolution) are provided, it calls the LogRhythm API to update those specific\
    \ fields.\n5. **Result Processing:** The action retrieves the updated case object\
    \ from LogRhythm and attaches it as a JSON result to the action output.\n\n###\
    \ Parameters Description:\n| Parameter | Type | Mandatory | Description |\n| :---\
    \ | :--- | :--- | :--- |\n| Case ID | String | Yes | The unique identifier of\
    \ the LogRhythm case that needs to be updated. |\n| Name | String | No | A new\
    \ name to assign to the case. |\n| Priority | Enum | No | A new priority level\
    \ for the case. Options are 1, 2, 3, 4, or 5. |\n| Due Date | String | No | A\
    \ new due date for the case in ISO 8601 format (e.g., 2021-04-23T12:38Z). |\n\
    | Description | String | No | A new summary or description for the case. |\n|\
    \ Resolution | String | No | Text describing how the case was resolved. |\n| Status\
    \ | Enum | No | The new status for the case. Options include Created, Completed,\
    \ Incident, Mitigated, or Resolved. |\n\n### Additional Notes:\n- At least one\
    \ of the optional parameters (Name, Priority, Due Date, Description, Resolution,\
    \ or Status) must be configured for the action to run successfully."
