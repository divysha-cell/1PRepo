Download Case Files:
  ai_description: >-
    ### General Description

    Downloads file evidence associated with a specific LogRhythm case to a designated
    local directory on the execution machine. This action is useful for retrieving
    forensic artifacts or documents attached to a case for further local analysis
    or archival.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Case ID** | String | Yes | The unique identifier of the LogRhythm case from
    which to download files. |

    | **Download Folder Path** | String | Yes | The local filesystem path where the
    downloaded files will be stored. The path must be writable by the execution environment.
    |

    | **Overwrite** | Boolean | Yes | If set to `True`, the action will overwrite
    existing files in the destination folder that share the same name. If `False`,
    the action will fail if a filename collision is detected. |


    ### Additional Notes

    - The action specifically filters for evidence items that are of type 'file' and
    have a 'completed' status in LogRhythm.

    - Filenames are automatically constructed using the original filename and the
    file size to ensure uniqueness.

    - This action requires the execution environment to have write access to the specified
    `Download Folder Path`.


    ### Flow Description

    1. **Path Validation**: The action first checks if the provided `Download Folder
    Path` is writable by attempting to create and delete a temporary file.

    2. **Evidence Retrieval**: It connects to the LogRhythm API to fetch a list of
    all 'file' type evidence associated with the provided `Case ID` that are in a
    'completed' state.

    3. **Collision Check**: If the `Overwrite` parameter is `False`, the action scans
    the local directory for existing files that match the constructed filenames and
    raises an error if any are found.

    4. **File Download**: For each identified evidence item, the action downloads
    the raw file content from LogRhythm.

    5. **Local Storage**: The downloaded content is saved to the local filesystem
    at the specified path.

    6. **Result Reporting**: The action returns a list of absolute file paths for
    all successfully downloaded files in the JSON result.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
