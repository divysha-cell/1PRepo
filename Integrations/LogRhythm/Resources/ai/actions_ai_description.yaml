    \ include: New, Open, Working, Escalated, Closed, False Alarm, Resolved, Unresolved,\
    \ Reported, and Monitor. |\n| Risk Score | Integer | No | A new risk score for\
    \ the alarm, ranging from 0 to 100. |\n\n### Additional Notes\n* At least one\
    \ of the optional parameters ('Status' or 'Risk Score') must be provided for the\
    \ action to execute successfully.\n* The action uses a PATCH request to update\
