    in the map. |


    ### Additional Notes

    This action does not operate on entities. It performs a direct lookup based on
    the provided parameters. If the value is found, the action returns the specific
    data associated with that value in the JSON result. If the Reference Map of Sets
    is not found, the action will report a failure.


    ### Flow Description

    1. **Parameter Extraction**: Retrieves the Reference Map name and the target value
    from the action input parameters.

    2. **API Connection**: Establishes a connection to the QRadar API using the integration's
    configuration (API Root, Token, and Version).

    3. **Data Retrieval**: Calls the QRadar API to fetch the entire content of the
    specified Reference Map of Sets.

    4. **Value Search**: Searches through the retrieved data structure using a utility
    function to find the target `Value` within any of the sets (lists) associated
    with the map's keys.

    5. **Output Generation**: If a match is found, the matching data is added to the
    action's JSON results, and the action completes with a success message. If no
    match is found, it reports that the value was not located.
