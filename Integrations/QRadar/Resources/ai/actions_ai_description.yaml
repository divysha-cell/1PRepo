Get Rule MITRE Coverage:
  ai_description: "Retrieves MITRE ATT&CK mapping details for specific QRadar rules\
    \ using the QRadar Use Case Manager application. This action helps security analysts\
    \ understand the defensive coverage provided by their QRadar environment by identifying\
    \ the tactics and techniques associated with specific detection rules.\n\n###\
    \ Parameters\n| Parameter | Type | Mandatory | Description |\n| :--- | :--- |\
    \ :--- | :--- |\n| Rule Names | String | Yes | A comma-separated list of QRadar\
    \ rule names for which the action should return MITRE details. |\n| Create Insight\
    \ | Boolean | No | If enabled (default is true), the action will create a formatted\
    \ Case Insight containing information about the MITRE coverage (Tactics, Techniques,\
    \ and Confidence levels) of the rules. |\n\n### Flow Description\n1. **Initialization:**\
    \ The action extracts connection details (API Root, Token) and user parameters\
    \ (Rule Names, Insight preference).\n2. **Data Fetching:** It communicates with\
    \ the QRadar Use Case Manager service via the `/console/plugins/app_proxy:UseCaseManager_Service/api/mappings`\
    \ endpoint to retrieve all available rule-to-MITRE mappings.\n3. **Filtering:**\
    \ The script processes the provided list of rule names and matches them against\
    \ the retrieved mappings from QRadar.\n4. **Reporting:** \n    * Successfully\
    \ matched rules are added to the action's JSON result.\n    * A data table titled\
    \ 'MITRE Coverage' is added to the case, summarizing the rule names and their\
    \ associated tactics.\n    * If 'Create Insight' is true, a detailed HTML insight\
    \ is generated, displaying Tactics, Techniques, and color-coded confidence levels\
    \ (High: Red, Medium: Orange, Low: Green).\n5. **Completion:** The action provides\
    \ a summary message indicating which rules were found and which (if any) were\
    \ missing from the Use Case Manager."
