List Reference Maps of Sets:
  ai_description: >-
    Lists reference maps of sets available in IBM QRadar. This action allows users
    to retrieve metadata about the collection of reference maps of sets, which are
    data structures used in QRadar to store multi-dimensional data. Users can filter
    the results based on specific conditions and limit the number of returned elements.


    ### Parameters

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Fields To Return | String | No | Specify which fields should be returned by
    the action (e.g., 'name, element_type'). If left empty, all available fields are
    returned. |

    | Filter Condition | String | No | Specify a filter condition to return only specific
    elements (e.g., 'element_type = ALN'). |

    | Number Of Elements To Return | Integer | Yes | Specify the maximum number of
    elements to return. Default is 25. If a negative value is provided, the default
    limit is used. |


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the API configuration (Root,
    Token, Version) and the user-provided parameters (Fields, Filter, Limit).

    2. **Limit Validation:** If the 'Number Of Elements To Return' is less than zero,
    it defaults to 25.

    3. **API Interaction:** The action initializes the QRadar Manager and calls the
    `get_reference_maps_of_sets` method, which sends a GET request to the `/api/reference_data/map_of_sets`
    endpoint.

    4. **Data Processing:** The manager applies the requested fields and filter conditions
    via query parameters and handles pagination using the 'Range' header.

    5. **Result Output:** The retrieved reference maps are converted to JSON and added
    to the action's result. If no data is found, a success message indicating no data
    is returned.
