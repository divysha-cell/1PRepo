List Reference Tables:
  ai_description: >-
    ### General Description

    Lists the reference tables available in IBM QRadar. This utility action allows
    security analysts to discover and retrieve metadata about reference tables stored
    in the QRadar reference data collection, which are often used for storing mapping
    data, blacklists, or other stateful information.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Fields To Return | String | No | A comma-separated list of specific fields to
    be returned for each table. If left empty, all available fields are returned by
    default. |

    | Filter Condition | String | No | A QRadar-compliant filter expression used to
    narrow down the results (e.g., `element_type = 'IP'`). |

    | Number Of Elements To Return | Integer | Yes | The maximum number of reference
    table records to retrieve. If a negative value is provided, the action defaults
    to 25. |


    ### Additional Notes

    - This action does not require any entities to run.

    - The results are returned as a JSON array containing the raw metadata for each
    reference table found.


    ### Flow Description

    1. **Initialization**: The action initializes the QRadar API manager using the
    configured API Root, Token, and Version.

    2. **Parameter Extraction**: It extracts the user-provided fields, filter conditions,
    and the result limit.

    3. **Request Construction**: It constructs a GET request targeting the QRadar
    Reference Data API endpoint for tables (`/api/reference_data/tables`).

    4. **Pagination Handling**: The action applies the result limit by setting the
    `Range` header in the HTTP request.

    5. **Data Retrieval**: It executes the request and parses the response into a
    list of reference table objects.

    6. **Output**: The retrieved data is added to the action's JSON results and the
    execution is completed.
