QRadar Simple AQL Search:
  ai_description: >-
    ### General Description

    The **QRadar Simple AQL Search** action allows users to execute custom Ariel Query
    Language (AQL) queries against IBM QRadar's Events or Flows tables. It provides
    a simplified interface to build queries by specifying fields, filters, timeframes,
    and sorting options without needing to write the full AQL syntax manually. This
    action is designed to retrieve log or network flow data for investigation and
    visibility.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Table Name** | String (Dropdown) | Yes | Specifies whether to query the 'Events'
    or 'Flows' table. |

    | **Fields To Return** | String | No | A comma-separated list of fields to retrieve.
    Defaults to '*' (all fields). |

    | **Where Filter** | String | No | The SQL-like WHERE clause for filtering results
    (e.g., `severity > 5`). Do not include the 'WHERE' keyword. |

    | **Time Frame** | String (Dropdown) | No | Predefined time ranges (e.g., 'Last
    Hour', 'Last Week') or 'Custom'. |

    | **Start Time** | String | No | Mandatory if 'Time Frame' is set to 'Custom'.
    Expected format: ISO-8601. |

    | **End Time** | String | No | Optional end time for 'Custom' time frames. Defaults
    to current time if omitted. |

    | **Sort Field** | String | No | The field name used to sort the results. |

    | **Sort Order** | String (Dropdown) | No | Specifies 'ASC' (Ascending) or 'DESC'
    (Descending) order. Requires 'Sort Field' to be provided. |

    | **Max Results To Return** | Integer | No | Limits the number of records returned.
    Default is 50. |


    ### Flow Description

    1. **Query Construction**: The action extracts the input parameters and assembles
    a valid AQL query string. It handles logic for timeframes, mapping predefined
    selections (like 'Last Hour') to AQL syntax or using custom timestamps.

    2. **Search Initiation**: It submits the generated query to the QRadar Ariel API
    and retrieves a unique search ID.

    3. **Asynchronous Polling**: Since the action is asynchronous, it enters a polling
    state, periodically checking the status of the search ID until the state reaches
    'COMPLETED'.

    4. **Data Retrieval**: Once the search is finished, the action fetches the result
    set from QRadar and deletes the search ID from the remote system to clean up.

    5. **Output Generation**: The results are attached to the action as a raw JSON
    object and displayed in the Google SecOps UI as a formatted 'Results' data table.


    ### Additional Notes

    - If 'Custom' is selected for the **Time Frame**, the **Start Time** parameter
    must be provided, otherwise the action will fail.

    - The action automatically handles the 'START', 'STOP', or 'LAST' clauses in the
    AQL query based on the timeframe configuration.
