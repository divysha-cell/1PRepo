  ai_description: >-
    ### General Description

    Checks if a specific value exists within a QRadar Reference Map of Sets. This
    action is used to verify if a data point is present in complex QRadar reference
    structures where keys map to sets of values. It is particularly useful for checking
    if an indicator or identifier belongs to a specific group or category maintained
    in QRadar, such as a list of authorized users or known malicious assets.


