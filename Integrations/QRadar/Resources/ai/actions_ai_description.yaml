List Reference Maps:
  ai_description: >-
    ### General Description

    This action lists the reference maps available in IBM QRadar. Reference maps are
    collection data structures in QRadar that store data in a key-value format. This
    action is primarily used for administrative visibility or to identify available
    data collections that can be used in subsequent playbook steps for lookups or
    data manipulation.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Fields To Return | String | No | A comma-separated list of specific fields to
    be returned for each reference map (e.g., 'name, element_type'). If left empty,
    all available fields are returned by default. |

    | Filter Condition | String | No | A QRadar-compliant filter string used to narrow
    down the results (e.g., `element_type = 'ALNIC'`). |

    | Number Of Elements To Return | Integer | Yes | The maximum number of reference
    map records to retrieve. Defaults to 25. If a negative value is provided, the
    action defaults to 25. |


    ### Additional Notes

    - This action uses the QRadar REST API `/api/reference_data/maps` endpoint.

    - It utilizes the 'Range' header to handle pagination based on the 'Number Of
    Elements To Return' parameter.


    ### Flow Description

    1. **Initialization**: The action initializes the QRadar manager using the provided
    API Root, Token, and Version.

    2. **Parameter Processing**: It extracts the user-provided fields, filter conditions,
    and result limits. It validates that the limit is a positive integer.

    3. **API Request**: The action sends a GET request to the QRadar reference data
    API, applying the specified filters and field selections.

    4. **Data Parsing**: The raw JSON response is parsed into internal data models
    representing QRadar Reference Maps.

    5. **Output**: The list of reference maps is returned as a JSON object to the
    Google SecOps platform for use in playbooks.
