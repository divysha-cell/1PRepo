Add Offense Note:
  ai_description: >-
    Adds a note to a specific IBM QRadar offense. This action allows security analysts
    to document findings or provide updates directly within the QRadar platform from
    Google SecOps.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Offense ID | Integer | Yes | The unique identifier of the QRadar offense to
    which the note will be added. |

    | Note Text | String | Yes | The actual text content of the note to be appended
    to the offense. |


    ### Flow Description


    1. **Parameter Extraction:** The action retrieves the QRadar API configuration
    (Root URL, Token, and Version) and the specific action parameters (Offense ID
    and Note Text).

    2. **Manager Initialization:** It initializes the QRadar communication manager
    using the provided credentials.

    3. **API Interaction:** The action sends a POST request to the QRadar API endpoint
    `/api/siem/offenses/{offense_id}/notes` containing the note text.

    4. **Error Handling:** It specifically checks for 'Not Found' errors (if the offense
    ID does not exist) and general execution errors, reporting the status back to
    the SOAR.

    5. **Completion:** The action concludes by returning a success or failure status
    based on the API response.
