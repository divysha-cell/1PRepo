    ### General Description

    The **Similar Flows Query** action executes a predefined Ariel Query Language
    (AQL) search in IBM QRadar to identify network flows associated with specific
    IP Address entities. This action is designed to help investigators find related
    network activity for a suspicious IP within a specific timeframe by querying the
    QRadar flows database.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Time Delta In Minutes** | Integer | No | Specifies the lookback window (in
    minutes) from the current time to search for flows. Defaults to 10 if not provided.
    |

    | **Flows Limit To Fetch** | Integer | Yes | The maximum number of flow records
    to retrieve from QRadar for each entity. Defaults to 25. |

    | **Fields To Display** | String | No | A comma-separated list of additional AQL
    fields to include in the results beyond the default set. |

    | **Source IP Address Field Name** | String | No | Allows overriding the default
    AQL field name used for the source IP address (default is 'sourceip'). |

    | **Destination IP Address Field Name** | String | No | Allows overriding the
    default AQL field name used for the destination IP address (default is 'destinationip').
    |


    ### Flow Description

    1. **Entity Filtering**: The action identifies all `ADDRESS` entities in the current
    scope.

    2. **Search Initiation**: For each entity, it constructs an AQL query targeting
    the `flows` table and initiates an asynchronous search task in QRadar via a POST
    request.

    3. **Status Polling**: Because the action is asynchronous, it enters an 'In Progress'
    state, periodically checking the status of the search IDs in QRadar.

    4. **Data Retrieval**: Once the searches are marked as completed in QRadar, the
    action fetches the flow records.

    5. **Output Generation**: The retrieved flows are formatted into CSV-style data
    tables and attached to the case wall for each entity. The raw data is also provided
    in the action's JSON results.


    ### Additional Notes

    - This action is asynchronous and may take several seconds to complete depending
    on the volume of data in QRadar and the specified time delta.
