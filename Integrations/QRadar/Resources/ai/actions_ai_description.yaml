Update Offense:
  ai_description: >-
    Updates a specific IBM QRadar offense with new status, assignment, and metadata.
    This action allows security analysts to programmatically manage the lifecycle
    of an offense within QRadar directly from Google SecOps.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Offense ID | Integer | Yes | The unique identifier of the QRadar offense to
    be updated. |

    | Assigned To | String | No | The username of the QRadar user to whom the offense
    should be assigned. |

    | Status | String | Yes | The new status for the offense. Options include 'Don't
    change', 'Closed', or 'Hidden'. |

    | Closing Reason | String | No | The text description of the closing reason. This
    is required by QRadar logic if the 'Status' is set to 'Closed'. |

    | Follow Up | Boolean | No | If set to true, marks the offense for follow-up in
    QRadar. |

    | Protected | Boolean | No | If set to true, marks the offense as protected to
    prevent it from being removed by QRadar's data retention policies. |


    ### Additional Notes

    - If the 'Status' is set to 'Closed', the action will first attempt to resolve
    the 'Closing Reason' string into its corresponding internal QRadar ID before submitting
    the update.

    - If 'Status' is set to 'Don't change', the status field will not be included
    in the update request.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the API configuration and the
    specific update parameters (ID, Status, Assignee, etc.).

    2. **Closing Reason Resolution:** If the user intends to close the offense, the
    action queries the QRadar API to find the internal ID associated with the provided
    'Closing Reason' text.

    3. **External Update:** The action performs a POST request to the QRadar `/api/siem/offenses/{offense_id}`
    endpoint, passing the modified attributes.

    4. **Result Processing:** Upon a successful update, the action retrieves the updated
    offense object and attaches it as a JSON result to the action execution.
