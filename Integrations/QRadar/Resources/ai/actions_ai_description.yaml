List Reference Sets:
  ai_description: >-
    Lists reference sets available in IBM QRadar. This action interacts with the QRadar
    Reference Data API to retrieve metadata about configured reference sets, such
    as their names, element types, and creation times. It allows for filtering results
    based on specific conditions and selecting which fields to include in the output.


