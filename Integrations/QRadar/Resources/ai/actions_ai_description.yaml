    provided API Root, Token, and Version.

    2. **Parameter Extraction**: It retrieves the user-defined parameters for fields,
    filters, and result limits.

    3. **API Request**: It sends a GET request to the `/api/reference_data/sets` endpoint,
    applying the `Range` header for pagination based on the requested limit.

    4. **Data Processing**: The response is parsed into a list of reference set objects.

    5. **Output**: The retrieved data is attached to the action's result as a JSON
    object, and the action completes with a success message.
