Similar Events Query:
  ai_description: >-
    ### General Description

    The **Similar Events Query** action executes an asynchronous AQL (Ariel Query
    Language) search in IBM QRadar to identify events related to specific entities
    (Address, Hostname, or User) within a Google SecOps case. This action helps analysts
    find historical context and identify patterns of activity associated with indicators
    by retrieving event details such as source/destination IPs, usernames, event names,
    and magnitudes.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Time Delta In Minutes** | Integer | No | Defines the lookback period (in minutes)
    for the AQL query. Defaults to 10 minutes if not specified. |

    | **Events Limit To Fetch** | Integer | Yes | The maximum number of event records
    to retrieve from QRadar for each entity. Defaults to 25. |

    | **Fields To Display** | String | No | A comma-separated list of additional QRadar
    event fields to include in the results beyond the default set. |

    | **Hostname Field Name** | String | No | The specific AQL field name in QRadar
    to use when searching for Hostname entities. |

    | **Source IP Address Field Name** | String | No | The specific AQL field name
    in QRadar to use when searching for the source IP of Address entities. |

    | **Destination IP Address Field Name** | String | No | The specific AQL field
    name in QRadar to use when searching for the destination IP of Address entities.
    |

    | **Username Field Name** | String | No | The specific AQL field name in QRadar
    to use when searching for Username entities. |


    ### Flow Description

    1. **Entity Filtering:** The action identifies all Address, Hostname, and User
    entities in the current context.

    2. **Query Construction:** For each entity, it constructs a specialized AQL query
    using the provided field names and time constraints.

    3. **Search Initiation:** It sends the queries to the QRadar Ariel API and receives
    unique search IDs.

    4. **Asynchronous Polling:** The action enters an 'In Progress' state, periodically
    checking the status of each search ID in QRadar.

    5. **Data Retrieval:** Once a search completes, the action fetches the resulting
    event data.

    6. **Output Generation:** The retrieved events are formatted into data tables
    (one per entity) and a comprehensive JSON result is attached to the action output.


    ### Additional Notes

    - This action is asynchronous and may take some time to complete depending on
    the volume of data in QRadar and the specified time delta.

    - If no specific field names (e.g., Hostname Field Name) are provided, the action
    uses default QRadar field mappings (e.g., hostname, sourceip, destinationip, Username).
