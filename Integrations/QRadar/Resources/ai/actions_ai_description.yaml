    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the `API Root`, `API Token`,
    and `API Version` from the integration configuration.

    2. **Manager Initialization:** It initializes the `QRadarManager` with the provided
    credentials.

    3. **Connectivity Test:** The manager executes a `test_connectivity` call, which
    performs a `GET` request to the QRadar API's version endpoint (`/api/help/versions`).

    4. **Result Handling:** If the request is successful, the action completes with
    a success status. If a connection error or API error occurs, it catches the exception,
    logs the error, and returns a failure status.
