Lookup for a Key in Reference Map:
  ai_description: >-
    ### General Description

    This action checks if a specific key exists within a designated QRadar Reference
    Map. It is used to retrieve the associated metadata or values stored in QRadar's
    reference data structures based on a provided key identifier. This is a read-only
    operation that does not modify the reference map or any external system state.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Name | String | Yes | The name of the QRadar Reference Map to search within.
    |

    | Key | String | Yes | The specific key identifier to look for in the reference
    map. The search is case-insensitive. |


    ### Flow Description

    1. **Initialization**: The action initializes the QRadar manager using the provided
    API Root, Token, and Version.

    2. **Data Retrieval**: It makes a GET request to the QRadar API to fetch the full
    content of the Reference Map specified by the `Name` parameter.

    3. **Key Search**: The action processes the retrieved map data using a utility
    function that iterates through the map's dictionary to find a match for the provided
    `Key` (case-insensitive).

    4. **Result Processing**: If a match is found, the associated data (including
    the key and its values) is added to the action's JSON results.

    5. **Completion**: The action concludes by reporting whether the key was found
    and providing the retrieved data if applicable.


    ### Additional Notes

    - This action does not operate on SOAR entities (IPs, Hostnames, etc.) automatically.
    It performs a direct lookup based on the string values provided in the parameters.

    - If the Reference Map does not exist or the key is not found, the action will
    complete successfully but return a `false` result value.
