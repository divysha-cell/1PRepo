QRadar AQL Search:
  ai_description: >-
    ### General Description

    The **QRadar AQL Search** action enables users to execute arbitrary Ariel Query
    Language (AQL) queries against a QRadar instance. This action is designed for
    flexible data retrieval, allowing security analysts to perform complex searches
    for events or flows directly from Google SecOps. The results are returned as a
    raw JSON object and are also formatted into a CSV data table for easy viewing
    within the case wall.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Query Format | String | Yes | The AQL query string to execute. Example: `SELECT
    * FROM events LIMIT 10 LAST 10 MINUTES`. |


    ### Flow Description

    1. **Initialization**: The action retrieves the AQL query from the input parameters
    and initializes the QRadar manager using the provided configuration (API Root,
    Token, and Version).

    2. **Query Execution (First Run)**: If it is the first time the action is running
    for a specific task, it submits the AQL query to the QRadar Ariel API. QRadar
    returns a unique `search_id` for the job.

    3. **Asynchronous Polling**: The action is asynchronous. In subsequent runs, it
    uses the `search_id` to poll the QRadar API and check if the search status is
    'COMPLETED'.

    4. **Data Retrieval**: Once the search job is finished, the action fetches the
    complete result set from QRadar.

    5. **Result Processing**: The action parses the results, adds the raw data as
    a JSON result, and converts the data into a CSV format to populate a data table
    in the SOAR interface.

    6. **Cleanup**: After successfully retrieving the data, the action sends a request
    to QRadar to delete the search job, ensuring efficient resource management on
    the QRadar appliance.


    ### Additional Notes

    - This action runs asynchronously to handle potentially long-running queries without
    blocking the playbook execution.

    - The action performs a cleanup step by deleting the search job in QRadar after
    completion; this is a standard API lifecycle management step and does not affect
    security data.
