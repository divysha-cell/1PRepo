    (Root, Token, Version) and the action-specific parameters ('Name' and 'Value').

    2. **API Interaction**: It connects to the QRadar API and performs a GET request
    to the reference data maps endpoint, applying a filter to search for the specific
    value.

    3. **Data Processing**: The QRadar manager parses the response. If the map exists
    and contains the value, it extracts the relevant data.

    4. **Result Reporting**: If found, the action adds the retrieved data to the execution
    results as a JSON object and sets the action status to successful. If not found,
