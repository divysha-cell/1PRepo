    | Fields To Return | String | No | A comma-separated list of specific fields to
    be returned for each reference set. If left empty, all available fields are returned
    by default. |

    | Filter Condition | String | No | An AQL-style filter string used to narrow down
    the results (e.g., `element_type = 'IP'`). |

    | Number Of Elements To Return | Integer | Yes | The maximum number of reference
    sets to retrieve in a single execution. Defaults to 25. If a negative value is
    provided, the action uses the default limit of 25. |


    ### Additional Notes

    - This action does not operate on specific entities; it performs a global listing
    of reference sets within the QRadar environment.

    - The results are returned as a JSON array in the action's output.


