Lookup for a Value in Reference Tables:
  ai_description: >-
    ### General Description

    The **Lookup for a Value in Reference Tables** action is designed to check if
    a specific value exists within a designated QRadar reference table. This utility
    action is primarily used to validate data against QRadar's internal reference
    collections, such as watchlists or mapping tables, without requiring the data
    to be associated with a specific entity in the Google SecOps environment.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Name | String | Yes | The name of the QRadar reference table to query. |

    | Value | String | Yes | The specific value to search for within the reference
    table. |


    ### Flow Description

    1. **Connection Setup**: The action establishes a connection to the QRadar API
    using the provided API Root and Token.

    2. **Data Retrieval**: It fetches the complete content of the reference table
    specified by the 'Name' parameter via a GET request to the QRadar reference data
    API.

    3. **Recursive Search**: The action processes the retrieved table data using a
    utility function that recursively traverses the dictionary structure to find any
    matches for the 'Value' parameter.

    4. **Result Output**: If the value is found, the action returns the matching data
    objects (including inner and outer keys) as a JSON result and sets the action
    status to success. If no match is found, it informs the user accordingly.


    ### Additional Notes

    - This action does not iterate over entities; it operates strictly on the provided
    'Value' parameter.

    - The search logic is designed to handle nested data structures common in QRadar
    reference tables.
