Create OU:
  ai_description: >-
    ### General Description

    Creates a new organizational unit (OU) within a GSuite account using the Google
    Admin SDK. This action allows administrators to programmatically structure their
    directory by defining the OU's name, description, and its position within the
    organizational hierarchy via a parent path.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Customer ID | String | Yes | The unique ID for the customer's G Suite account.
    The alias 'my_customer' can be used to represent the account associated with the
    credentials. |

    | Name | String | No | The display name of the new organizational unit. |

    | Description | String | No | A brief description explaining the purpose of the
    new organizational unit. |

    | Parent OU Path | String | Yes | The full path to the organizational unit's parent
    (e.g., '/' for root or '/Departments'). |


    ### Additional Notes

    - This action does not operate on SecOps entities; it is a standalone management
    task.

    - The 'Parent OU Path' must exist in the GSuite directory for the action to succeed.


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the Customer ID, Name, Description,
    and Parent OU Path from the input settings.

    2. **API Initialization**: Authenticates with GSuite using the provided service
    account credentials and prepares an authorized session.

    3. **OU Creation**: Executes a POST request to the GSuite Admin Directory API
    endpoint (`/admin/directory/v1/customer/{customer_id}/orgunits`) with the specified
    OU details.

    4. **Result Processing**: If successful, the details of the newly created organizational
    unit are returned as a JSON object and the action status is set to completed.
