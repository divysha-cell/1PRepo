Remove Extension:
  ai_description: >-
    The 'Remove Extension' action allows administrators to uninstall a specific Chrome
    extension from all browsers registered within a designated Organizational Unit
    (OU) in Google Workspace. Unlike simply blocking an extension, this action explicitly
    sets the installation policy to 'REMOVE', which triggers the actual uninstallation
    of the extension from the users' Chrome browsers.


    ### Parameters Description


    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Organization Unit Name | String | Yes | The display name of the organizational
    unit from which the extension should be removed. The action will look up the internal
    ID for this OU automatically. |

    | Extension ID | String | Yes | The unique 32-character identifier of the Chrome
    extension (e.g., 'aapocclcgogkmnckokdopfmhonfmgoek'). It must consist of letters
    'a' through 'p'. |


    ### Flow Description


    1.  **Validation**: The action first validates the provided 'Extension ID' against
    a specific regex to ensure it is a valid 32-character Chrome extension identifier.

    2.  **OU Lookup**: It retrieves a list of all Organizational Units from Google
    Workspace and searches for the one matching the provided 'Organization Unit Name'
    to obtain its unique ID.

    3.  **Policy Update**: It sends a request to the Google Chrome Policy API to modify
    the 'appInstallType' for the specified extension within the target OU, setting
    it to 'REMOVE'.

    4.  **Verification**: The action then resolves the effective policy for that extension
    and OU to verify that the change was successfully applied and that the installation
    type is indeed 'REMOVE'.

    5.  **Result Reporting**: If the verification succeeds, it returns a success status
    and populates the action results with the ID of the removed extension.
