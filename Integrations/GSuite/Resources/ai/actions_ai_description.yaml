Get Extension Details:
  ai_description: >-
    ### General Description

    Retrieves comprehensive details for one or more Chrome Extensions from Google
    Workspace. This action is designed to provide security analysts with visibility
    into extension metadata, as well as the specific users and devices that have requested
    the extension's installation within the organization. Note that a Chrome Enterprise
    license is required to use this action.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Extension ID | String | Yes | A comma-separated list of unique Chrome Extension
    IDs (e.g., 'aapocclcgogkgnckpjfdaamobnennebh') to enrich. |

    | Max Requesting Users To Return | Integer | Yes | The maximum number of users
    to return who requested the extension installation. The value must be between
    1 and 1000. Default is 100. |

    | Max Requesting Devices To Return | Integer | Yes | The maximum number of devices
    to return where the extension installation was requested. The value must be between
    1 and 1000. Default is 100. |


    ### Additional Notes

    - This action does not process entities from the Google SecOps case; it operates
    strictly on the Extension IDs provided in the input parameters.

    - The action performs multiple API calls per extension (details, users, and devices)
    and aggregates them into a single JSON result per ID.


    ### Flow Description

    1. **Authentication**: Initializes the GSuite API client using the configured
    Service Account or Workload Identity credentials.

    2. **Parameter Parsing**: Extracts the list of Extension IDs and validates that
