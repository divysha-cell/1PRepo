Update OU:
  ai_description: >-
    ### General Description

    Updates an existing organizational unit (OU) within a G Suite account. This action
    allows administrators to modify the display name and description of an OU identified
    by its full path.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Customer ID** | String | Yes | The unique ID for the customer's G Suite account.
    The alias 'my_customer' can be used to represent the account associated with the
    credentials. |

    | **OU Path** | String | Yes | The full path to the organizational unit (e.g.,
    `/corp/sales`). If the OU is at the root, provide just the name. |

    | **Name** | String | No | The new display name for the organizational unit. |

    | **Description** | String | No | The new description for the organizational unit.
    |


    ### Flow Description

    1. **Parameter Extraction:** Retrieves the Customer ID, OU Path, and optional
    Name/Description from the action input.

    2. **API Initialization:** Sets up the G Suite Directory API client using provided
    credentials.

    3. **Update Execution:** Executes a `PUT` request to the G Suite endpoint to update
    the specified organizational unit's metadata.

    4. **Result Handling:** Captures the API response containing the updated OU details
    and provides it as a JSON result.


    ### Additional Notes

    This action does not run on entities and requires manual input of the OU path.
