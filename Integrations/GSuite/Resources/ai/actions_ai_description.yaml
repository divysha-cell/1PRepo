Update User:
  ai_description: >-
    Updates user profile information and account status in the Google Workspace (GSuite)
    Directory. This action allows for bulk updates of multiple users identified by
    their primary email addresses. It can modify personal details, organizational
    information, security settings like password requirements, and the account's suspension
    status.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Email Address | String | Yes | A comma-separated list of primary email addresses
    used to identify the users to be updated. |

    | Given Name | String | No | The user's first name. |

    | Family Name | String | No | The user's last name. |

    | Password | String | No | The new password for the user. Must be at least 8 characters.
    |

    | Phone | String | No | The user's phone number. |

    | Gender | String | No | The gender of the user (female, male, other, unknown).
    |

    | Department | String | No | The name of the user's department. |

    | Organization | String | No | The name of the user's organization. |

    | Change Password At Next Login | Boolean | Yes | If true, forces the user to
    change their password upon their next login. |

    | User Status | Dropdown | No | Specifies if the user should be 'Blocked' (suspended),
    'Unblocked' (active), or 'Not Changed'. |


    ### Flow Description

    1. **Initialization**: The action initializes the GSuite API client using provided
    service account credentials.

    2. **Parameter Parsing**: It extracts the list of email addresses and the various
    optional profile fields from the action parameters.

    3. **User Iteration**: The script iterates through each provided email address.

    4. **API Request**: For each user, it constructs a payload with the updated fields
    and sends a PUT request to the Google Directory API's `update` endpoint.

    5. **Status Management**: If the 'User Status' parameter is set, it specifically
    modifies the `suspended` attribute of the user account.

    6. **Result Collection**: It tracks successful updates and failures (e.g., user
    not found), returning the updated user data in JSON format for successful operations.
