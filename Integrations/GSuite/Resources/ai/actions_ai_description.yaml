Delete Extension:
  ai_description: >-
    ### General Description

    Deletes a specified Chrome extension policy from a Google Workspace Organizational
    Unit (OU). This action effectively removes the extension from a blocklist or allowlist
    by reverting the OU's policy to its inherited state from the parent organizational
    unit. Note that a Chrome Enterprise license is required for this operation.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Organization Unit Name | String | Yes | The name of the organizational unit
    from which to delete the extension policy. |

    | Extension ID | String | Yes | The unique 32-character ID of the Chrome extension
    to delete (e.g., 'aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa'). |


    ### Flow Description

    1. **Validation**: The action validates the provided Extension ID against a regex
    pattern (32 characters using letters 'a' through 'p').

    2. **OU Identification**: It fetches the list of all organizational units from
    Google Workspace to find the internal ID corresponding to the provided 'Organization
    Unit Name'.

    3. **Policy Deletion**: It sends a request to the Google Chrome Policy API to
    'batch-inherit' the policy for the specified extension and OU, which removes the
    local policy override.

    4. **Verification**: The action performs a follow-up check by resolving the effective
    policy for the OU to ensure the extension policy is no longer directly applied.
    If the policy persists, an error is raised.

    5. **Result Reporting**: Upon successful verification, it returns a success message
    and the ID of the deleted extension in the result JSON.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Deletes a Chrome extension policy for a specific organizational unit by reverting
      it to the inherited policy in Google Workspace.
    fetches_data: true
    internal_data_mutation_explanation: null
