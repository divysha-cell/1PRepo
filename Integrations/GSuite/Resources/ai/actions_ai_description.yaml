Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches **User** entities with detailed profile information from Google Workspace
    (GSuite). This action helps security analysts understand the context of a user
    involved in an alert by providing data such as their full name, administrative
    privileges, account status (suspended/archived), and last login activity.


    ### Parameters

    There are no parameters for this action.


    ### Flow Description

    1. **Initialization**: Establishes a connection to the Google Workspace Admin
    SDK using service account credentials.

    2. **Entity Filtering**: Identifies all **User** entities within the current context.

    3. **Data Retrieval**: For each valid user entity, the action queries the Google
    Workspace Directory API using the user's primary email address.

    4. **Enrichment**:
        *   Flattens the retrieved JSON data.
        *   Updates the entity's `additional_properties` with the flattened data (prefixed
    with 'GSuite').
        *   Sets the entity's `is_enriched` flag to `True`.
    5. **Finalization**: Updates the entities in the Google SecOps platform and provides
    a summary of successful and failed enrichments.


    ### Additional Notes

    *   The action requires the Google Workspace integration to be properly configured
    with a Service Account that has the necessary Directory API scopes.

    *   Only entities of type **USERUNIQNAME** are processed.
