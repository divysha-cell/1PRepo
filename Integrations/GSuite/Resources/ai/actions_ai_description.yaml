    \ within the account. |\n| Manager Email | String | No | Filters users by the\
    \ email address of their direct manager. |\n| Return only Admin Accounts? | Boolean\
    \ | No | If true, only returns users with administrator privileges. Default is\
    \ false. |\n| Return only Delegated Admin Accounts? | Boolean | No | If true,\
    \ only returns users with delegated administrator privileges. Default is false.\
    \ |\n| Return only Suspended Users? | Boolean | No | If true, only returns accounts\
    \ that are currently suspended. Default is false. |\n| Org Unit Path | String\
    \ | No | Filters users by their organizational unit path (e.g., '/Sales'). |\n\
    | Department | String | No | Filters users by their department name. |\n| Record\
    \ Limit | Integer | No | The maximum number of user records to return. Default\
    \ is 20. Ignored if 'Email Addresses' is provided. |\n| Custom Query Parameter\
    \ | String | No | Allows for advanced filtering using Google's search query syntax\
