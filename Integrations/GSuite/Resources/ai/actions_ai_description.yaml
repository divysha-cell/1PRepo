Block Extension:
  ai_description: >-
    ### General Description

    The **Block Extension** action allows administrators to block a specific Chrome
    extension within a designated Google Workspace Organizational Unit (OU). This
    action is primarily used for security containment, preventing the installation
    or execution of potentially malicious or unauthorized browser extensions across
    a subset of the organization. Note that a Chrome Enterprise license is required
    for this functionality.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Organization Unit Name | String | Yes | The display name of the organizational
    unit where the extension block will be applied. |

    | Extension ID | String | Yes | The unique 32-character identifier (composed of
    letters 'a' through 'p') of the Chrome extension to be blocked. |


    ### Flow Description

    1. **Initialization**: The action initializes the GSuite API client using provided
    service account credentials.

    2. **Parameter Extraction & Validation**: It retrieves the OU name and Extension
    ID from the input. The Extension ID is validated against a specific regex pattern
    to ensure it is a valid 32-character Chrome extension identifier.

    3. **OU Identification**: The action fetches all organizational units from the
    GSuite environment and searches for the one matching the provided name to retrieve
    its unique ID.

    4. **Policy Mutation**: It sends a request to the Google Chrome Policy API (`batchModify`)
    to set the `appInstallType` of the specified extension to `BLOCKED` for the target
    OU.

    5. **Verification**: After the update, the action calls the `resolve` policy endpoint
    to verify that the effective policy for that extension in the target OU is indeed
    set to `BLOCKED`.

    6. **Result Reporting**: The action outputs the resolved policy details as JSON
    and provides a success message if the block was successfully verified.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Updates the Google Chrome Policy for a specific Organizational Unit to set a
      Chrome extension's installation type to 'BLOCKED'.
    fetches_data: true
    internal_data_mutation_explanation: null
