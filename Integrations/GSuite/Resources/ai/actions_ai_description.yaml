Remove Members From Group:
  ai_description: >-
    ### General Description

    Removes members from a specified GSuite group. This action is designed to manage
    group memberships by targeting specific user email addresses, either provided
    manually as a parameter or identified as User entities within the Google SecOps
    case context.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Group Email Address | String | Yes | The primary email address of the GSuite
    group from which members will be removed. |

    | User Email Addresses | String | No | A comma-separated list of user email addresses
    to be removed from the group. These values are processed alongside any User entities
    found in the case. |


    ### Additional Notes

    - The action is case-insensitive regarding email addresses.

    - It gracefully handles cases where a user is not a member of the group or the
    group does not exist by reporting them as 'not found' rather than failing the
    entire action.

    - If no User entities are present and the 'User Email Addresses' parameter is
    empty, the action will complete without performing any removals.


    ### Flow Description

    1. **Initialization**: The action retrieves the mandatory `Group Email Address`
    and the optional `User Email Addresses` list from the input parameters.

    2. **API Client Setup**: Authenticates with GSuite using the configured service
    account or workload identity to establish a management session.

    3. **Target Identification**: Collects all `USER` entities from the current case
    and merges them with the list provided in the `User Email Addresses` parameter
    to form a unique set of target emails.

    4. **Execution**: Iterates through the target list, calling the GSuite Directory
    API to remove each member from the specified group.

    5. **Error Handling**: Specifically catches 'Not Found' or 'Validation' errors
    from GSuite to identify users or groups that do not exist.

    6. **Reporting**: Compiles a summary of successful removals, users not found in
    the group, and any technical failures, then returns this status to the Google
    SecOps platform.
