List User Privileges:
  ai_description: >-
    Retrieves and lists roles and privileges for specific users in Google Workspace.
    This action allows security analysts to audit user permissions by fetching role
    assignments and their associated privileges directly from the Google Directory
    API.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **User Email Addresses** | String | No | A comma-separated list of user emails
    to process in addition to any User entities in the scope. |

    | **Check Roles** | String | No | A comma-separated list of specific roles to
    look for. If provided, the action only returns these roles. |

    | **Check Privileges** | String | No | A comma-separated list of specific permissions
    to look for. Requires 'Expand Privileges' to be enabled. |

    | **Include Inherited Roles** | Boolean | No | If true, retrieves roles the user
    inherited from group memberships. Default is true. |

    | **Expand Privileges** | Boolean | No | If true, the action extracts and returns
    unique privileges associated with the user's roles. |

    | **Max Roles To Return** | Integer | Yes | Limits the number of roles returned
    per user. Default is 100. |

    | **Max Privileges To Return** | Integer | Yes | Limits the number of unique privileges
    returned per user. Default is 100. |


    ### Flow Description


    1.  **Identity Extraction**: The action identifies target users from both the
    provided 'User Email Addresses' parameter and the 'USER' entities present in the
    current alert context.

    2.  **Validation**: It validates that 'Expand Privileges' is enabled if 'Check
    Privileges' is specified, and ensures limit parameters are positive integers.

    3.  **Data Retrieval**: For each user, it queries the Google Workspace API to
    list role assignments (optionally including indirect/inherited ones).

    4.  **Role Resolution**: It fetches the full details for each assigned role to
    identify the specific privileges (permissions) granted by that role.

    5.  **Filtering and Truncation**: The retrieved roles and privileges are filtered
    against the 'Check Roles' and 'Check Privileges' parameters and truncated based
    on the 'Max' limit parameters.

    6.  **Enrichment**: The action updates the User entities in Google SecOps with
    a comma-separated list of their roles and attaches a detailed JSON result containing
    the full roles and privileges breakdown.
