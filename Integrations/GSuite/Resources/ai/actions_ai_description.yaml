    This action retrieves and lists the roles and unique privileges associated with
    specific Google Workspace groups. It allows security analysts to audit group permissions
    by fetching role assignments and expanding them into granular privileges. The
    action supports filtering by specific roles or privileges and provides a structured
    JSON output of the findings.


