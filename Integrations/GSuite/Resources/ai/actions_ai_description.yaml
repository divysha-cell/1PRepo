    per group (Default: 100). |

    | Max Privileges To Return | Integer | Yes | The maximum number of privileges
    to return per group (Default: 100). |


    ### Additional Notes

    - The 'Expand Privileges' parameter must be set to 'True' if any values are provided
    in the 'Check Privileges' parameter; otherwise, the action will fail validation.

    - If 'Check Roles' is populated, the action will only evaluate privileges belonging
    to those specific roles.


