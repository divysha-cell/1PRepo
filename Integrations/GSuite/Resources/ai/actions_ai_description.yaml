Create User:
  ai_description: >-
    ### General Description

    Creates a new user account in GSuite (Google Workspace) using the Directory API.
    This action allows administrators to programmatically provision users by providing
    essential details such as names, email addresses, and initial security settings
    like password requirements.


    ### Parameters Description

    | Parameter | Description | Type | Mandatory |

    | :--- | :--- | :--- | :--- |

    | Given Name | The user's first name. | String | Yes |

    | Family Name | The user's last name. | String | Yes |

    | Password | The password for the new user account. | Password | Yes |

    | Email Address | The user's primary email address. Must be unique within the
    domain. | String | Yes |

    | Phone | The phone number associated with the user. | String | No |

    | Gender | The gender of the user. Valid values: female, male, other, unknown.
    | String | No |

    | Department | The department the user belongs to. | String | No |

    | Organization | The organization the user belongs to. | String | No |

    | Change Password At Next Login | If set to true, the user will be forced to change
    their password upon their first login. | Boolean | Yes |


    ### Additional Notes

    * This action does not process or iterate over Google SecOps entities; it relies
    entirely on the provided input parameters.

    * The password provided is hashed using SHA256 before being sent to the GSuite
    API for security.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves user details (names, email,
    password, etc.) from the input parameters.

    2. **API Initialization:** It establishes a connection to the GSuite Directory
    API using the configured service account or workload identity.

    3. **Data Preparation:** The user's password is encrypted/hashed using SHA256,
    and the payload is constructed with the provided organizational and personal details.

    4. **User Creation:** A POST request is sent to the GSuite `/admin/directory/v1/users`
    endpoint to create the account.

    5. **Result Handling:** The action captures the API response, adds the created
    user's metadata to the action results, and reports the success or failure of the
    operation.
