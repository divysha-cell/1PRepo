Add Members To Group:
  ai_description: >-
    ### General Description

    Adds members to a specified Google Workspace (GSuite) group. This action allows
    administrators to manage group memberships by processing both User entities present
    in the Google SecOps case and additional email addresses provided as input parameters.
    It interacts with the Google Directory API to perform the additions.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Group Email Address | String | Yes | The primary email address of the Google
    Workspace group to which members will be added. |

    | User Email Addresses | String | No | A comma-separated list of user email addresses
    to be added to the group. These are processed in addition to any User entities
    identified in the case. |


    ### Additional Notes

    - The action is case-insensitive regarding email addresses; all identifiers are
    converted to lowercase before processing.

    - If a user is already a member of the group, the action will identify this and
    continue processing other users without failing the entire action.

    - The action specifically targets `USERUNIQNAME` entities.


    ### Flow Description

    1. **Parameter Extraction**: Retrieves the target group email and the optional
    list of additional user emails from the action configuration.

    2. **Entity Filtering**: Identifies all `USERUNIQNAME` entities within the current
    Google SecOps context.

    3. **Consolidation**: Combines the email addresses from the entities and the 'User
    Email Addresses' parameter into a unique set of target members.

    4. **API Interaction**: For each target member, the action calls the Google Directory
    API's 'members.insert' endpoint.

    5. **Result Handling**: Tracks which users were successfully added, which already
    existed in the group, and which failed due to errors.

    6. **Output**: Generates a summary message detailing the outcome for each user
    and provides the raw JSON response from the GSuite API for successful additions.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
