Revoke User Session:
  ai_description: >-
    ### General Description

    Revokes user web and device sessions and resets sign-in cookies for specified
    users using Google Workspace. This action is primarily used for containment or
    security response when a user account is suspected of being compromised, ensuring
    that all active sessions are terminated across all devices.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | User Email Addresses | String (CSV) | No | A comma-separated list of user email
    addresses to sign out. The action will process these in addition to any User entities
    identified in the scope. |


    ### Additional Notes

    - The action targets both explicitly provided email addresses and `USERUNIQNAME`
    entities present in the Google SecOps case.

    - If no users are found or provided, the action will return a 'None of the provided
    users were found' message.


    ### Flow Description

    1. **Parameter Extraction**: Retrieves the 'User Email Addresses' from the action
    configuration.

    2. **Entity Filtering**: Identifies all `USERUNIQNAME` entities within the current
    Google SecOps context.

    3. **Validation**: Validates the format of all collected email addresses (from
    both parameters and entities).

    4. **API Interaction**: For each unique email address, it calls the Google Workspace
    Admin SDK's `signOut` endpoint via a POST request.

    5. **Result Processing**: Tracks successful sign-outs and failures (e.g., user
    not found). It then generates a summary message and populates the JSON results
    with the status of each processed user.
