Search User Activity Events:
  ai_description: >-
    Retrieves activity events from Google Workspace applications for specified users.
    This action queries the Google Reports API to gather logs related to user actions
    in applications like Google Drive, Admin, Login, and Chrome. It allows for filtering
    by specific event types and time frames, providing a detailed audit trail of user
    behavior within the Workspace environment.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | User Email Addresses | String | No | A comma-separated list of additional user
    email addresses to process alongside any User entities in the scope. |

    | Application Names | List | Yes | A list of Google Workspace applications to
    query (e.g., 'Drive', 'Admin', 'Login'). Use 'ALL' to query all supported apps.
    |

    | Event Type Filter | String | No | A comma-separated list of specific event names
    to filter the results (e.g., 'download', 'login_failure'). |

    | Time Frame | Enum | No | The relative time range for the search (e.g., 'Last
    Hour', 'Last 24 Hours'). Defaults to 'Last Hour'. |

    | Start Time | String | No | The start of the time range in ISO 8601 format. Required
    only if 'Time Frame' is set to 'Custom'. |

    | End Time | String | No | The end of the time range in ISO 8601 format. Optional
    when 'Time Frame' is 'Custom'; defaults to current time. |

    | Max Events To Return | Integer | No | The maximum number of events to retrieve
    per user. Default is 200, maximum is 1000. |


    ### Additional Notes

    - If 'Time Frame' is set to 'Custom', the 'Start Time' parameter must be provided.

    - The action processes both the 'User Email Addresses' parameter and any 'USER'
    entities present in the current Google SecOps context.


    ### Flow Description

    1. **Initialization**: Authenticates with Google Workspace using service account
    credentials and initializes the GSuite manager.

    2. **Target Identification**: Aggregates user emails from the action parameters
    and the 'USER' entities in the current scope.

    3. **Time Range Calculation**: Determines the ISO 8601 start and end timestamps
    based on the selected 'Time Frame' or 'Custom' parameters.

    4. **Data Retrieval**: Iterates through each target user and application, calling
    the Google Reports API to fetch activity logs.

    5. **Filtering and Deduplication**: Filters the retrieved events based on the
    'Event Type Filter' and removes duplicate event records.

    6. **Result Compilation**: Aggregates the unique events into a JSON result set,
    categorized by user, and returns the data to the SOAR platform.
