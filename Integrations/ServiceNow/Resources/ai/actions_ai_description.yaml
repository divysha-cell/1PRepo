Add Comment To Record:
  ai_description: "### General Description\nAdds a comment or a work note to a specific\
    \ record in a ServiceNow table (e.g., incident, change_request). This action allows\
    \ for automated communication within ServiceNow tickets directly from Google SecOps.\
    \ It supports an asynchronous mode where it can wait for a reply to the posted\
    \ comment before finalizing the action execution.\n\n### Parameters Description\n\
    | Parameter | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n\
    | Table Name | String | Yes | Specify the name of the ServiceNow table where the\
    \ record resides (e.g., 'incident'). |\n| Type | String | Yes | Choose whether\
    \ to add a 'Comment' (public) or a 'Work Note' (internal). |\n| Record Sys ID\
    \ | String | Yes | The unique system identifier (Sys ID) of the record to be updated.\
    \ |\n| Text | String | Yes | The actual content of the comment or work note to\
    \ be added. |\n| Wait For Reply | Boolean | Yes | If set to true, the action will\
    \ remain in an 'In Progress' state and periodically poll ServiceNow until a new\
    \ comment/reply is detected on the record. |\n\n### Additional Notes\n- When 'Wait\
    \ For Reply' is enabled, the action uses the 'QueryState' mechanism to check for\
    \ new entries in the `sys_journal_field` table that are newer than the comment\
    \ just posted.\n- Ensure the script timeout in the IDE is adjusted if 'Wait For\
    \ Reply' is used, as the polling might take significant time.\n\n### Flow Description\n\
    1. **Initialization**: The action initializes the ServiceNow manager using provided\
    \ credentials and configuration.\n2. **Comment Submission**: It performs a PUT\
    \ request to the ServiceNow Table API to append the provided text to the specified\
    \ record's comments or work notes field.\n3. **Async Handling**: \n    - If 'Wait\
    \ For Reply' is **False**, the action completes immediately with a success message.\n\
    \    - If 'Wait For Reply' is **True**, the action transitions to an 'In Progress'\
    \ state.\n4. **Polling (Async Mode)**: In subsequent runs, the action queries\
    \ ServiceNow for all comments associated with the record. It identifies the index\
    \ of the original comment posted by the action and checks if any newer comments\
    \ exist.\n5. **Completion**: Once a newer comment (reply) is found, it is added\
    \ to the action's JSON results, and the action state is set to 'Completed'."
