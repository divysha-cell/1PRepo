Ping:
  ai_description: >-
    ### General Description

    Tests the connectivity between Google SecOps and the ServiceNow instance. This
    action validates the provided credentials (either Basic Authentication or OAuth)
    and ensures that the API endpoint is reachable by performing a lightweight GET
    request to a specified ServiceNow table.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Api Root | String | Yes | The base URL of the ServiceNow instance (e.g., https://instance.service-now.com).
    |

    | Username | String | No | The username for basic authentication. Required if
    'Use Oauth Authentication' is disabled. |

    | Password | String | No | The password for basic authentication. Required if
    'Use Oauth Authentication' is disabled. |

    | Incident Table | String | No | The ServiceNow table used to test connectivity.
    Defaults to 'incident'. |

    | Verify SSL | Boolean | No | If enabled, verifies the SSL certificate of the
    ServiceNow instance. Defaults to True. |

    | Use Oauth Authentication | Boolean | No | If enabled, the integration uses OAuth
    2.0 for authentication. |

    | Client ID | String | No | The Client ID for OAuth authentication. Required if
    'Use Oauth Authentication' is enabled. |

    | Client Secret | String | No | The Client Secret for OAuth authentication. Required
    if 'Use Oauth Authentication' is enabled. |

    | Refresh Token | String | No | The Refresh Token for OAuth authentication. Required
    if 'Use Oauth Authentication' is enabled. |


    ### Additional Notes

    - Either Basic Authentication (Username/Password) or OAuth (Client ID/Client Secret/Refresh
    Token) must be correctly configured for the action to succeed.

    - This action does not process any entities and is used strictly for health checks.


    ### Flow Description

    1. **Configuration Extraction:** Retrieves the API root, authentication credentials,
    and connection settings from the integration configuration.

    2. **Manager Initialization:** Initializes the ServiceNow API manager, handling
    authentication logic for either Basic Auth or OAuth.

    3. **Connectivity Test:** Executes a `test_connectivity` call, which sends a GET
    request to the configured ServiceNow table with a limit of 1 record to minimize
    data transfer.

    4. **Result Reporting:** Returns a success status if the API responds correctly,
    or a failure status with the specific error message if the connection fails.
