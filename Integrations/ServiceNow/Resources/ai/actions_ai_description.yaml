Download Attachments:
  ai_description: >-
    ### General Description

    Downloads all attachments associated with a specific record in a ServiceNow table
    and saves them to a designated local directory on the Google SecOps server. This
    action is useful for retrieving evidence or documentation attached to ServiceNow
    incidents, change requests, or other table records for local processing or archival.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Table Name | String | Yes | The name of the ServiceNow table where the record
    is located (e.g., 'incident', 'change_request'). |

    | Record Sys ID | String | Yes | The unique system identifier (sys_id) of the
    record containing the attachments. |

    | Download Folder Path | String | Yes | The absolute folder path on the local
    filesystem where the attachments should be stored. Must start with a forward slash
    (/). |

    | Overwrite | Boolean | Yes | If set to true, the action will overwrite any existing
    files in the destination folder that have the same name as the attachments being
    downloaded. |


    ### Additional Notes

    - This action does not operate on SecOps entities; it requires manual input of
    the Table Name and Record Sys ID.

    - The execution environment must have the necessary permissions to write to the
    specified 'Download Folder Path'.

    - If 'Overwrite' is false and a file with the same name exists, the action will
    fail to prevent data loss.


