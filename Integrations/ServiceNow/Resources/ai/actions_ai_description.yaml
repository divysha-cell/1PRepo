    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      This action performs a PUT request to the ServiceNow Table API to update the
      'comments' field of an incident record, thereby changing the state of data in
      the external ServiceNow system.
