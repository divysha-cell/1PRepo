Wait For Comments:
  ai_description: "### General Description\nWaits for new comments or work notes to\
    \ be added to a specific record in a ServiceNow table. This is an asynchronous\
    \ action designed to pause playbook execution until a specific communication event\
    \ occurs in ServiceNow, such as a user reply or a specific status update provided\
    \ via comments.\n\n### Parameters Description\n| Parameter | Type | Mandatory\
    \ | Description |\n| :--- | :--- | :--- | :--- |\n| Table Name | String | Yes\
    \ | The name of the ServiceNow table containing the record (e.g., 'incident',\
    \ 'change_request'). |\n| Record Sys ID | String | Yes | The unique system identifier\
    \ (sys_id) of the specific record to monitor. |\n| Type | Enum | Yes | Specifies\
    \ whether to monitor for 'Comment' (public) or 'Work Note' (internal) entries.\
    \ |\n| Wait Mode | Enum | Yes | Defines the completion criteria: <br>1. **Until\
    \ Timeout**: Waits until the action's global timeout is reached and returns all\
    \ comments found during that period. <br>2. **Until First Message**: Completes\
    \ as soon as any new comment/work note is detected. <br>3. **Until Specific Text**:\
    \ Completes only when a new comment/work note matches the string provided in the\
    \ 'Text' parameter. |\n| Text | String | No | The specific string to look for\
    \ when 'Wait Mode' is set to 'Until Specific Text'. This parameter is mandatory\
    \ if that mode is selected. |\n\n### Additional Notes\n- This action is **asynchronous**\
    \ and will poll ServiceNow periodically until the specified condition is met or\
    \ the SOAR action timeout is reached.\n- It uses a time filter to ensure only\
    \ comments created *after* the action was initially triggered are processed.\n\
    \n### Flow Description\n1. **Initialization**: The action extracts ServiceNow\
    \ credentials and connection settings.\n2. **Validation (First Run)**: On the\
    \ first execution, it verifies that the record specified by 'Record Sys ID' exists\
    \ in the target table.\n3. **Polling**: In subsequent async cycles, the action\
    \ queries the `sys_journal_field` table in ServiceNow to retrieve comments or\
    \ work notes associated with the record.\n4. **Filtering**: It filters the retrieved\
    \ entries to include only those created after the action's start time (or the\
    \ last check).\n5. **Condition Evaluation**: \n    - If 'Until First Message'\
    \ is selected, it completes if any new entries are found.\n    - If 'Until Specific\
    \ Text' is selected, it completes if an entry matches the 'Text' parameter.\n\
    \    - If 'Until Timeout' is selected, it continues polling until the global timeout\
    \ is approaching, then returns all accumulated entries.\n6. **Completion**: Once\
    \ the condition is met, the action returns the detected comments as a JSON result\
    \ and finishes."
