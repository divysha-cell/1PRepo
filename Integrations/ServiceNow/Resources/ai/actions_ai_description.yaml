Create Incident:
  ai_description: >-
    Creates a new incident in the ServiceNow system. This action allows users to programmatically
    generate tickets with specific attributes like priority, category, and assignments.
    It also supports passing custom fields for advanced configurations.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Short Description | String | Yes | A brief summary of the incident. |

    | Impact | String | Yes | The measure of the effect of an incident (1: High, 2:
    Medium, 3: Low). |

    | Urgency | String | Yes | The measure of how quickly the business needs the incident
    resolved (1: High, 2: Medium, 3: Low). |

    | Category | String | No | The category the incident belongs to (e.g., network,
    software). |

    | Assignment group ID | String | No | The full name of the group to assign the
    incident to. |

    | Assigned User ID | String | No | The full name or username of the user to assign
    the incident to. |

    | Description | String | No | A detailed description of the incident. |

    | Custom Fields | String | No | A JSON object or comma-separated list (field:value)
    of additional fields to set. |


    ### Flow Description

    1. **Parameter Extraction:** Retrieves incident details and authentication configuration.

    2. **Custom Field Parsing:** Processes the 'Custom Fields' parameter into a dictionary.

    3. **Identity Resolution:** If an assigned user is specified, the action queries
    ServiceNow to resolve the user's full name and ID.

    4. **Incident Creation:** Sends a POST request to the ServiceNow Table API to
    create the incident record.

    5. **Context Update:** Upon success, the action adds a 'ServiceNow' tag to the
    alert and stores the incident number in the 'TICKET_ID' alert context property.


    ### Additional Notes

    The 'Assigned User ID' parameter accepts the user's full name or username, which
    the action attempts to resolve automatically.
