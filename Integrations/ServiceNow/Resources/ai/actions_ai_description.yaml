Wait For Status Update:
  ai_description: >-
    ### General Description

    The **Wait For Status Update** action is a flow-control utility designed to pause
    playbook execution until a specific ServiceNow incident reaches one of the user-defined
    statuses. It is an asynchronous action that polls the ServiceNow API at intervals
    to check the current state of a ticket, enabling synchronization between ServiceNow
    workflows and Google SecOps playbooks.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Incident Number** | String | Yes | The unique identifier of the ServiceNow
    incident to monitor (e.g., `INC0010001`). |

    | **Statuses** | String | Yes | A comma-separated list of target statuses that
    will trigger the completion of the action (e.g., `In Progress, Resolved`). |


    ### Flow Description

    1. **Initialization**: The action establishes a connection to the ServiceNow instance
    using the configured API root and credentials (Basic Auth or OAuth).

    2. **Data Retrieval**: It performs a lookup for the incident specified by the
    `Incident Number` parameter to retrieve its current metadata.

    3. **Status Evaluation**: The action extracts the current `state` of the incident
    and compares it against the list of target `Statuses` provided by the user (performing
    a case-insensitive match).

    4. **Execution State Management**:
       - **Match Found**: If the incident's status matches any of the target statuses,
    the action sets its state to `COMPLETED`, returns the incident details as a JSON
    result, and allows the playbook to proceed.
       - **No Match**: If the status does not match, the action sets its state to
    `IN_PROGRESS`, which signals the SOAR platform to reschedule the action for another
    check later.
    5. **Error Handling**: If the incident number is invalid or cannot be found, the
    action terminates with a failure message.


    ### Additional Notes

    - This action is **Asynchronous** and is intended to be used when a playbook needs
    to wait for manual or external intervention in ServiceNow before continuing.

    - It does not process or filter SecOps entities; it operates exclusively based
    on the provided incident identifier.
