Add Comment And Wait For Reply:
  ai_description: >-
    ### General Description

    This action adds a comment to a specific ServiceNow incident and then enters an
    asynchronous waiting state to detect a reply. It is designed for workflows where
    a SOAR analyst or automated process needs to prompt a ServiceNow user for information
    and capture their response as the action's output.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Incident Number | String | Yes | The unique identifier of the ServiceNow incident
    (e.g., INC0000001). |

    | Comment | String | Yes | The text content of the comment to be posted to the
    ServiceNow incident. |


    ### Flow Description

    1. **Initialization**: The action initializes the ServiceNow manager using the
    provided integration configuration (API Root, Credentials, etc.).

    2. **Post Comment**: It calls the ServiceNow API to add the specified `Comment`
    to the incident identified by `Incident Number`.

    3. **Timestamp Capture**: After posting, the action retrieves the incident's comment
    history to find the exact creation timestamp (`sys_created_on`) of the comment
    it just added.

    4. **Asynchronous Wait**: The action transitions to an 'In Progress' state, storing
    the incident ID and the timestamp as state data.

    5. **Polling (Query Job)**: In subsequent execution cycles, the action polls ServiceNow
    for any new comments on the same incident that have a creation timestamp later
    than the captured one.

    6. **Completion**: Once a new comment (the reply) is detected, the action captures
    the text of the reply, sets the execution state to 'Completed', and returns the
    reply content as the result.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
