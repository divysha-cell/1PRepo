Add Parent Incident:
  ai_description: >-
    Links multiple child incidents to a single parent incident in ServiceNow. This
    action establishes a hierarchical relationship between tickets by updating the
    'parent_incident' field of the specified child incidents to point to the provided
    parent incident. It is primarily used for incident management and grouping related
    tickets.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Parent Incident Number | String | Yes | The incident number (e.g., INC0000001)
    that will serve as the parent. |

    | Child Incident Numbers | String | Yes | A comma-separated list of incident numbers
    (e.g., INC0000002, INC0000003) to be linked to the parent. |


    ### Flow Description

    1. **Validate Parent:** The action queries ServiceNow to verify that the specified
    Parent Incident Number exists and retrieves its unique System ID (sys_id).

    2. **Validate Children:** The action queries ServiceNow for all incident numbers
    provided in the 'Child Incident Numbers' list to ensure they exist and to retrieve
    their respective sys_ids.

    3. **Link Incidents:** For each found child incident, the action performs a PUT
    request to the ServiceNow Incident table, updating the 'parent_incident' field
    with the sys_id of the parent incident.

    4. **Output Results:** The action returns a success message and a JSON array containing
    the updated details of the child incidents.


    ### Additional Notes

    - The action will raise an error and stop execution if the parent incident or
    any of the specified child incidents cannot be found in ServiceNow.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Updates the 'parent_incident' field of existing incident records in ServiceNow
      to establish a parent-child relationship.
    fetches_data: true
