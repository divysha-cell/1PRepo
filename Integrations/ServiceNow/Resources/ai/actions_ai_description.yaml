    1. **Initialization**: The action initializes the ServiceNow manager using the
    provided API root and credentials (supporting both Basic and OAuth authentication).

    2. **Parent Incident Verification**: It first retrieves the details of the specified
    parent incident to verify its existence and check the count of associated child
    incidents.

    3. **Child Incident Retrieval**: If child incidents are present, the action queries
    the ServiceNow `incident` table for all records where the `parent_incident` field
    matches the System ID of the parent incident, applying the user-defined limit.

    4. **Data Processing**: The retrieved child incidents are processed into a structured
    format, including fields such as System ID, Incident Number, Short Description,
    and Creation Time.

    5. **Output Generation**: The results are added to the Google SecOps case as a
    data table titled "Child Incident Details" and also provided as a raw JSON object
    for downstream playbook logic.


