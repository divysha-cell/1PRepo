Create Record:
  ai_description: >-
    Creates a new record in a specified ServiceNow table. This action allows for the
    creation of various record types (e.g., incidents, change requests, or custom
    table entries) by providing the table name and the record data in JSON format.
    It automatically handles the resolution of 'assignment_group' and 'assigned_to'
    names to their corresponding ServiceNow Sys IDs if they are included in the input
    data.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Table Name | String | No | The name of the ServiceNow table where the record
    will be created. If not provided, it defaults to the 'Incident Table' specified
    in the integration configuration. |

    | Object Json Data | String | No | A JSON-formatted string containing the field
    names and values for the new record. If the JSON is invalid or not provided, an
    empty record will be attempted. |


    ### Flow Description

    1. **Parameter Extraction**: Retrieves the API connection details from the configuration
    and the target table name and record data from the action parameters.

    2. **JSON Validation**: Attempts to parse the 'Object Json Data'. If parsing fails,
    it logs an info message and proceeds with an empty data set.

    3. **Identity Resolution**: If the input data contains 'assignment_group' or 'assigned_to',
    the action queries ServiceNow to resolve these names into their internal Sys IDs.

    4. **Record Creation**: Executes a POST request to the ServiceNow Table API to
    create the record in the specified table.

    5. **Result Processing**: Captures the Sys ID of the newly created record and
    retrieves the full record details. It also identifies any fields provided in the
    input that were not successfully processed or updated in the resulting ServiceNow
    record.

    6. **Output**: Returns the Sys ID as the main result and attaches the full record
    JSON to the action results.
