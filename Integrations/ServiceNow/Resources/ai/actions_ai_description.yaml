Get Child Incident Details:
  ai_description: >-
    ### General Description

    The **Get Child Incident Details** action retrieves comprehensive information
    about child incidents associated with a specific parent incident in ServiceNow.
    This action is primarily used to gain visibility into related sub-tasks or linked
    issues within the ServiceNow platform, providing a structured view of the incident
    hierarchy.


