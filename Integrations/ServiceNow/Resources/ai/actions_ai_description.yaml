List Records Related To User:
  ai_description: >-
    ### General Description

    The **List Records Related To User** action retrieves records from a specified
    ServiceNow table (such as 'incident') that are associated with a list of provided
    usernames. This action is designed to gather historical context or audit user
    activity by fetching records created within a specific timeframe. It outputs the
    results as individual data tables for each user and provides a comprehensive JSON
    result.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Table Name** | String | Yes | The name of the ServiceNow table to search (e.g.,
    `incident`, `change_request`). |

    | **Usernames** | String | Yes | A comma-separated list of ServiceNow usernames
    for which you want to retrieve related records. |

    | **Max Days Backwards** | Integer | Yes | Specifies how many days back from the
    current time to fetch related records. Default is 1. |

    | **Max Records To Return** | Integer | No | Specifies the maximum number of records
    to return per user. Default is 50. |


    ### Flow Description

    1. **Authentication**: Establishes a connection to ServiceNow using either Basic
    or OAuth authentication based on the integration configuration.

    2. **User Resolution**: Resolves the provided comma-separated usernames into ServiceNow
    system identifiers (sys_ids) and emails.

    3. **Record Querying**: For each successfully resolved user, the action queries
    the specified ServiceNow table for records where the user is the opener (`opened_by`)
    and the record was created within the 'Max Days Backwards' window.

    4. **Data Processing**: Formats the retrieved records into a tabular structure
    and a JSON object.

    5. **Output**: Adds a data table to the case wall for each user found and attaches
