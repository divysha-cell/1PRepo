Close Incident:
  ai_description: >-
    ### General Description

    The **Close Incident** action allows users to programmatically close a specific
    incident in ServiceNow. It updates the incident's state to 'Closed' and attaches
    necessary resolution metadata such as the reason, resolution code, and closing
    notes. This is typically used at the end of a response workflow to synchronize
    the status of a ServiceNow ticket with the resolution of a security case.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Incident Number** | String | Yes | The unique identifier of the ServiceNow
    incident to be closed (e.g., INC0010001). |

    | **Close Reason** | String | Yes | A brief explanation or comment describing
    why the incident is being closed. This is added as a comment to the ticket. |

    | **Resolution Code** | String | Yes | A predefined category for the resolution.
    Options include: Duplicate, Known error, No resolution provided, Resolved by caller,
    Resolved by change, Resolved by problem, Resolved by request, Solution provided,
    Workaround provided, User error. |

    | **Close Notes** | String | Yes | Detailed technical or administrative notes
    regarding the final resolution of the incident. |


    ### Flow Description

    1. **Initialization**: The action extracts connection details (API Root, credentials)
    and the specific incident parameters provided by the user.

    2. **ID Retrieval**: The action first queries ServiceNow to find the internal
    system ID (`sys_id`) associated with the provided **Incident Number**.

    3. **Payload Construction**: It constructs a data payload that sets the incident
    state to 'Closed' (ID 7) and maps the provided **Close Reason**, **Resolution
    Code**, and **Close Notes** to their respective ServiceNow fields.

    4. **Update Execution**: A PUT request is sent to the ServiceNow Table API to
    update the record.

    5. **Validation**: The action verifies if the update was successful and returns
    a confirmation message to the Google SecOps platform.
