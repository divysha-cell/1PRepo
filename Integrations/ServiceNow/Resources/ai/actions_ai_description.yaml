    1. **Initialization**: The action extracts configuration parameters and initializes
    the ServiceNow API manager.

    2. **Validation**: It verifies that the provided download path is absolute and
    checks if the specified record exists in the target ServiceNow table.

    3. **Metadata Retrieval**: It fetches metadata for all attachments linked to the
    record, including filenames and download URLs.

    4. **Conflict Check**: If 'Overwrite' is disabled, the action checks the local
    filesystem for existing files that match the attachment names.

    5. **Download and Storage**: The action iterates through the attachments, downloads
    the binary content for each, and saves it to the specified local path.

    6. **Reporting**: It compiles a list of successfully downloaded files and any
    failures, providing a summary message and a JSON result containing the absolute
    paths of the saved files.
