Update Incident:
  ai_description: >-
    Updates an existing incident in ServiceNow with new information. This action allows
    for the modification of various incident fields including its state, description,
    priority (impact/urgency), and assignment details. It also supports updating custom
    fields via a JSON object or a comma-separated string.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Incident Number | String | Yes | The unique identifier of the incident to update
    (e.g., INC0010041). |

    | Short Description | String | No | A brief summary of the incident. |

    | Impact | String | No | The measure of the effect of the incident (1: High, 2:
    Medium, 3: Low). |

    | Urgency | String | No | The measure of how quickly the incident needs resolution
    (1: High, 2: Medium, 3: Low). |

    | Category | String | No | The classification category of the incident. |

    | Assignment group ID | String | No | The name of the group to which the incident
    should be assigned. |

    | Assigned User ID | String | No | The email or username of the specific user
    to assign the incident to. |

    | Description | String | No | Detailed information about the incident. |

    | Incident State | String | No | The new status of the incident (e.g., 'New',
    'In Progress', 'Resolved'). |

    | Custom Fields | String | No | A JSON object or comma-separated list (field:value)
    of additional fields to update. This parameter takes priority over others if overlapping.
    |


    ### Flow Description


    1.  **Initialization**: The action initializes the ServiceNow manager using provided
    credentials and configuration (API Root, Authentication method).

    2.  **Parameter Parsing**: It extracts the incident number and all optional update
    fields. If 'Custom Fields' are provided, they are parsed into a dictionary.

    3.  **Identity Resolution**: If an 'Assigned User ID' is provided, the action
    attempts to resolve the user's full name via the ServiceNow API.

    4.  **Update Execution**: The action calls the ServiceNow API (PUT request) to
    update the incident record identified by the 'Incident Number'.

    5.  **Result Handling**: The action retrieves the updated incident data, adds
    it to the execution results as JSON, and reports success or failure based on the
    API response.
