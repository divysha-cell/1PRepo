Add Comment:
  ai_description: >-
    ### General Description

    Adds a comment to a specific ServiceNow incident. This action allows security
    analysts to document findings, provide updates, or communicate within a ServiceNow
    ticket directly from Google SecOps. It targets a specific incident identified
    by its number and appends the provided text to the incident's activity log.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Incident Number | String | Yes | The unique identifier of the ServiceNow incident
    (e.g., INC0000001). The action will resolve this number to an internal system
    ID before posting the comment. |

    | Comment | String | Yes | The text content to be added to the ServiceNow incident.
    |


    ### Flow Description

    1. **Initialization**: The action retrieves ServiceNow connection settings (API
    Root, credentials, and default table) from the integration configuration.

    2. **Parameter Extraction**: It extracts the `Incident Number` and the `Comment`
    text provided by the user.

    3. **ID Resolution**: The action communicates with ServiceNow to find the internal
    `sys_id` associated with the provided `Incident Number`.

    4. **Mutation**: It performs a `PUT` request to the ServiceNow Table API, updating
    the `comments` field of the identified record with the new text.

    5. **Completion**: The action reports a success message to the SOAR case wall
    upon a successful API response or fails if the incident is not found or the API
    returns an error.
