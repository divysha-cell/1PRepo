Wait For Field Update:
  ai_description: "### General Description\n'Wait For Field Update' is an asynchronous\
    \ polling action designed to monitor a specific field within a ServiceNow record.\
    \ It continuously checks the value of a designated column until it matches one\
    \ of the user-specified target values or until the record reaches a terminal state\
    \ (Resolved, Closed, or Canceled). This is primarily used in playbooks to pause\
    \ execution until an external manual or automated process in ServiceNow has reached\
    \ a specific milestone.\n\n### Parameters Description\n| Parameter | Type | Mandatory\
    \ | Description |\n| :--- | :--- | :--- | :--- |\n| Table Name | String | Yes\
    \ | The technical name of the ServiceNow table where the record resides (e.g.,\
    \ 'incident', 'change_request', 'task'). |\n| Record Sys ID | String | Yes | The\
    \ unique 32-character GUID (Sys ID) of the specific record to monitor. |\n| Field\
    \ - Column name | String | Yes | The technical name of the field/column to check\
    \ (e.g., 'state', 'u_custom_status', 'assigned_to'). |\n| Field - Values | String\
    \ | Yes | A comma-separated list of values (case-insensitive) that the action\
    \ is waiting for. If the field matches any of these, the action completes. |\n\
    \n### Flow Description\n1. **Initialization**: The action initializes the ServiceNow\
    \ manager using the provided integration configuration (API Root, Credentials,\
    \ etc.).\n2. **Data Retrieval**: It fetches the current state of the record identified\
    \ by the 'Record Sys ID' from the specified 'Table Name'.\n3. **State Verification**:\
    \ \n    * If the record is found and its current state is 'Open' (not Resolved,\
    \ Closed, or Canceled), it proceeds to check the specific field.\n    * If the\
    \ record is already in a terminal state (Resolved, Closed, or Canceled), the action\
    \ stops waiting and completes, regardless of whether the field value matched.\n\
    4. **Value Comparison**: The action compares the current value of the 'Field -\
    \ Column name' against the list provided in 'Field - Values'.\n5. **Execution\
    \ State Determination**:\n    * **Completed**: If a match is found, the action\
    \ finishes successfully and returns the full record data in JSON format.\n   \
    \ * **In Progress**: If no match is found and the record is still open, the action\
    \ remains in an 'In Progress' state, triggering a retry after the platform's polling\
    \ interval.\n    * **Failed**: If the record or table cannot be found, or if an\
    \ API error occurs, the action fails."
