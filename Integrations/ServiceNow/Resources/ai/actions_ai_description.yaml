Update Record:
  ai_description: >-
    Updates an existing record in a specified ServiceNow table. This action allows
    for granular updates to any field within a ServiceNow record by providing the
    record's unique System ID (Sys ID) and a JSON object containing the fields to
    be modified.


    ### Flow Description:

    1. **Parameter Extraction:** The action retrieves connection details (API Root,
    credentials) and action-specific parameters: `Table Name`, `Record Sys ID`, and
    `Object Json Data`.

    2. **JSON Validation:** It validates that the `Object Json Data` provided by the
    user is a valid JSON string.

    3. **ServiceNow Interaction:** It initializes the `ServiceNowManager` and executes
    a `PUT` request to the ServiceNow Table API for the specified table and Sys ID.

    4. **Field Verification:** After the update, the action compares the requested
    fields with the returned record data to identify any fields that were not processed
    by ServiceNow (e.g., due to incorrect field names or permissions).

    5. **Result Handling:** The action outputs the full updated record as a JSON result
    and returns the Sys ID of the updated record.


    ### Parameters Description:

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Table Name** | String | No | The name of the ServiceNow table where the record
    resides (e.g., `incident`, `change_request`). If not provided, it defaults to
    the 'Incident Table' defined in the integration configuration. |

    | **Object Json Data** | String (JSON) | Yes | A JSON-formatted string representing
    the fields and values to update (e.g., `{"short_description": "Updated Title",
    "state": "2"}`). |

    | **Record Sys ID** | String | Yes | The unique 32-character alphanumeric identifier
    (Sys ID) of the record to be updated. |


    ### Additional Notes:

    - This action does not run on entities; it targets a specific record via its Sys
    ID.

    - If the provided JSON contains fields that do not exist in the target table,
    ServiceNow typically ignores them, and the action will list these unprocessed
    fields in the output message.
