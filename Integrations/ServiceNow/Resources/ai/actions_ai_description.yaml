Create Alert Incident:
  ai_description: >-
    ### General Description

    The **Create Alert Incident** action creates a new incident in ServiceNow for each alert in the current scope. It supports both Alert and Case execution scopes. It maps alert details to ServiceNow incident fields, allowing for seamless escalation and tracking of security events within the IT Service Management (ITSM) platform.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Impact** | String | Yes | Specifies the impact of the incident (1: High, 2: Medium, 3: Low). |

    | **Urgency** | String | Yes | Specifies the urgency of the incident (1: High, 2: Medium, 3: Low). |

    | **Category** | String | No | The category of the incident (e.g., Inquiry, Software, Hardware). |

    | **Assignment group ID** | String | No | The full name of the group to which the incident should be assigned. |

    | **Assigned User ID** | String | No | The full name of the user to whom the incident should be assigned. |

    | **Description** | String | No | A detailed description of the incident. |


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves configuration settings (API credentials, table names) and user-provided parameters (Impact, Urgency, etc.).

    2. **Alert Context Retrieval:** It fetches the `external_id` of the current alert to use as the incident's `short_description`.

    3. **Incident Creation:** It interacts with the ServiceNow API to create a new record in the specified incident table (defaulting to `incident`).

    4. **Internal Updates:** Upon successful creation, the action:
        * Adds the `ServiceNow` tag to the alert.
        * Sets the `TICKET_ID` context property for the alert.
        * Updates the alert's additional data with the new ServiceNow incident number.

    5. **Result Reporting:** Returns the incident number or a comma-separated list of incident numbers as the action result and adds the full incident JSON to the action results.


    ### Additional Notes

    * The action uses the `Incident Table` defined in the integration configuration.

    * The `short_description` in ServiceNow is automatically populated with the Google SecOps Alert External ID.

    * For Case scope, the action returns a comma-separated list of created incident numbers in the result value.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: true
    can_mutate_external_data: true
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates a new incident record in the ServiceNow 'incident' table (or the table
      specified in the configuration).
    fetches_data: false
    internal_data_mutation_explanation: >-
      Adds a 'ServiceNow' tag to the alert, sets the 'TICKET_ID' alert context property,
