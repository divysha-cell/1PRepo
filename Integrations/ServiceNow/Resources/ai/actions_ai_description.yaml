Get Oauth Token:
  ai_description: "### General Description\nThe **Get Oauth Token** action is a utility\
    \ task designed to facilitate the initial OAuth2 authentication setup for the\
    \ ServiceNow integration. It retrieves an OAuth refresh token and access token\
    \ from ServiceNow using the Resource Owner Password Credentials grant type. This\
    \ action is typically run once during the initial configuration phase to obtain\
    \ a long-lived refresh token, which is then manually saved into the integration's\
    \ configuration to allow for seamless, password-less authentication in subsequent\
    \ actions.\n\n### Parameters Description\nThis action does not have action-specific\
    \ parameters. Instead, it relies entirely on the **Integration Configuration**\
    \ parameters provided in the ServiceNow integration settings:\n\n| Parameter |\
    \ Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n| Api Root\
    \ | String | Yes | The base URL of the ServiceNow instance (e.g., https://instance.service-now.com).\
    \ |\n| Username | String | Yes | The ServiceNow username used to request the token.\
    \ |\n| Password | String | Yes | The ServiceNow password used to request the token.\
    \ |\n| Client ID | String | Yes | The Client ID generated in ServiceNow's Application\
    \ Registry. |\n| Client Secret | String | Yes | The Client Secret generated in\
    \ ServiceNow's Application Registry. |\n| Verify SSL | Boolean | No | If enabled,\
    \ the action verifies the SSL certificate of the ServiceNow instance. Default\
    \ is True. |\n\n### Flow Description\n1. **Configuration Extraction:** The action\
    \ retrieves the API root, credentials (Username/Password), and OAuth application\
    \ details (Client ID/Secret) from the integration's global configuration.\n2.\
    \ **Validation:** It verifies that all four mandatory authentication components\
    \ (Client ID, Client Secret, Username, and Password) are present.\n3. **Token\
    \ Request:** The action initializes the `ServiceNowManager` and executes a POST\
    \ request to the ServiceNow OAuth endpoint (`oauth_token.do`) using the `password`\
    \ grant type.\n4. **Result Processing:** Upon a successful response, the action\
    \ captures the JSON payload containing the `access_token` and `refresh_token`.\n\
    5. **Output:** The retrieved JSON is attached to the action results, and a success\
    \ message is displayed providing instructions on how to use the `refresh_token`\
    \ to finalize the integration setup.\n\n### Additional Notes\n* This action is\
    \ a prerequisite for using OAuth authentication in the ServiceNow integration.\
    \ \n* Once the `refresh_token` is obtained and saved in the integration settings,\
    \ the `Username` and `Password` fields in the configuration can be cleared for\
    \ improved security."
