Add Attachment:
  ai_description: >-
    ### General Description

    The **Add Attachment** action allows users to upload one or more files from the
    local environment to a specific record within a ServiceNow table. This is useful
    for attaching evidence, logs, or reports directly to ServiceNow incidents, change
    requests, or other table-based records.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Table Name** | String | Yes | The name of the ServiceNow table where the target
    record is located (e.g., 'incident', 'change_request'). |

    | **Record Sys ID** | String | Yes | The unique system identifier (sys_id) of
    the record to which the files will be attached. |

    | **File Path** | String | Yes | A comma-separated list of absolute file paths
    on the local system that need to be uploaded. |

    | **Mode** | String | No | Defines the upload behavior. 'Add New Attachment' (default)
    adds the file regardless of existing names. 'Overwrite Existing Attachment' will
    first delete any existing attachments on that record with the same filename before
    uploading the new one. |


    ### Additional Notes

    - The action first verifies that the record exists in the specified table before
    attempting any uploads.

    - If multiple file paths are provided, the action processes them sequentially
    and reports success or failure for each file.


    ### Flow Description

    1. **Initialization**: The action initializes the ServiceNow manager using provided
    credentials and configuration.

    2. **Record Verification**: It checks if the record specified by `Record Sys ID`
    exists in the `Table Name` provided.

    3. **File Processing**: It splits the `File Path` string into individual paths.

    4. **Mode Handling**: For each file, if 'Overwrite Existing Attachment' is selected,
    the action queries ServiceNow for existing attachments with the same filename
    on that record and deletes them.

    5. **Upload**: The action uploads the file(s) to the ServiceNow record using the
    Attachment API.

    6. **Result Reporting**: It collects the metadata of successful uploads and provides
    a summary message of successes and failures.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      This action uploads files to ServiceNow records. If the 'Overwrite Existing
      Attachment' mode is selected, it also deletes existing attachments with the
      same filename from the target record.
    fetches_data: true
    internal_data_mutation_explanation: null
