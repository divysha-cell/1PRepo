Update Notable Events:
  ai_description: >-
    Updates notable events in Splunk Enterprise Security (ES). This action allows
    analysts to programmatically modify the metadata of specific notable events by
    providing their unique identifiers. It is specifically designed for Splunk ES
    environments.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Notable Event IDs | String | Yes | A comma-separated list of Splunk notable
    event IDs to be updated. Example: `1A082D7B...@@notable@@...` |

    | Status | Dropdown | No | The new status to assign to the notable events (e.g.,
    New, In Progress, Resolved, Closed). |

    | Urgency | Dropdown | No | The new urgency level for the notable events (e.g.,
    Critical, High, Medium, Low, Informational). |

    | New Owner | String | No | The username of the new owner to assign to the notable
    events. |

    | Comment | String | No | A comment to be added to the notable events' history.
    |

    | Disposition | Dropdown | No | The classification for the notable event (e.g.,
    True Positive, False Positive). |


    ### Additional Notes

    - **Requirement:** At least one update parameter (Status, Urgency, New Owner,
    Comment, or Disposition) must be configured for the action to run successfully.

    - This action is only compatible with Splunk Enterprise Security.


    ### Flow Description

    1. **Initialization:** Extracts Splunk configuration (API Root, Credentials) and
    action parameters.

    2. **Validation:** Checks if the `Notable Event IDs` are provided and ensures
    at least one update field (Status, Urgency, etc.) is populated.

    3. **Mapping:** Converts human-readable dropdown selections (like 'Closed' or
    'True Positive') into the numerical or formatted values required by the Splunk
    ES API.

    4. **Execution:** Sends a POST request to the Splunk `/services/notable_update`
    endpoint with the specified IDs and the requested changes.

    5. **Completion:** Reports the number of successfully updated events or handles
    errors if the update fails.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Updates the status, urgency, owner, comment, or disposition of notable events
      within the Splunk Enterprise Security platform.
