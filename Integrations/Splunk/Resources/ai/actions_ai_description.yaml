Ping:
  ai_description: "### General Description\nThe **Ping** action is a utility designed\
    \ to verify the connectivity between Google SecOps and a Splunk instance. It ensures\
    \ that the provided configuration parameters\u2014such as the API Root, authentication\
    \ credentials, and SSL settings\u2014are correct and that the Splunk server is\
    \ reachable over the network.\n\n### Parameters Description\n| Parameter | Type\
    \ | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n| Api Root | String\
    \ | Yes | The base URL of the Splunk server (e.g., `https://splunk-server:8089`).\
    \ |\n| Username | String | No* | The username used for basic authentication. Required\
    \ if an API Token is not provided. |\n| Password | String | No* | The password\
    \ associated with the username. Required if an API Token is not provided. |\n\
    | API Token | String | No* | A Bearer token used for authentication. Required\
    \ if Username and Password are not provided. |\n| Verify SSL | Boolean | No |\
    \ If set to `True`, the action validates the SSL certificate of the Splunk server.\
    \ Defaults to `False`. |\n| CA Certificate File | String | No | A base64-encoded\
    \ CA certificate file used for SSL verification when `Verify SSL` is enabled.\
    \ |\n\n### Additional Notes\n*   **Authentication**: The action requires either\
    \ a valid `Username` and `Password` combination or a valid `API Token`. If neither\
    \ is provided, the action will fail during initialization.\n*   **Connectivity\
    \ Test**: The action performs a lightweight search query (`search index=main |\
    \ head 1`) to confirm that the API is functional and the credentials have sufficient\
    \ permissions to execute searches.\n\n### Flow Description\n1.  **Initialization**:\
    \ The action starts by initializing the Siemplify context and logger.\n2.  **Parameter\
    \ Extraction**: It retrieves the integration configuration parameters, including\
    \ the API endpoint, credentials, and security settings (SSL/CA Certificate).\n\
    3.  **Manager Setup**: It instantiates the `SplunkManager`. During instantiation,\
    \ the manager handles authentication (Basic or Bearer) and configures the request\
    \ session with the appropriate SSL settings.\n4.  **Connectivity Check**: The\
    \ manager executes a `test_connectivity` method, which sends a POST request to\
    \ the Splunk search export endpoint with a minimal query designed to return quickly.\n\
    5.  **Result Handling**: \n    *   If the request is successful, the action returns\
    \ a success message and completes with a `True` result.\n    *   If an exception\
    \ occurs (e.g., authentication failure, network timeout, or SSL error), the action\
    \ logs the error, returns a failure message, and completes with a `False` result."
