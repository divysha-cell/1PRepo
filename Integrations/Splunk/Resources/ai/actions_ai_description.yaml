Execute Entity Query:
  ai_description: >-
    ### General Description

    This action executes a dynamic Splunk search query that is automatically filtered
    based on the entities present in the current Google SecOps context. It allows
    analysts to perform targeted threat hunting or data retrieval by mapping SecOps
    entities (IPs, Hostnames, File Hashes, Users, URLs) to specific Splunk fields.
    The action constructs a Splunk `WHERE` clause using the provided entity keys and
    logical operators, executes the search as an asynchronous job, and returns the
    results as both a data table and raw JSON.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Query** | String | Yes | The base Splunk query to execute (e.g., `index="network"`).
    Do not include the `WHERE` clause here as it is generated automatically from entities.
    |

    | **Search Mode** | String | No | Specifies the Splunk search mode: `Fast`, `Smart`
    (default), or `Verbose`. |

    | **Results count limit** | Integer | No | The maximum number of results to return.
    Appends the `head` command to the query. Default is 100. |

    | **Results from** | String | No | The relative or absolute start time for the
    search (e.g., `-24h`). Default is `-24h`. |

    | **Results To** | String | No | The relative or absolute end time for the search
    (e.g., `now`). Default is `now`. |

    | **Result fields** | String | No | A comma-separated list of specific Splunk
    fields to return in the results. |

    | **IP Entity Key** | String | No | The Splunk field name to map to IP Address
    entities (e.g., `src_ip`). |

    | **Hostname Entity Key** | String | No | The Splunk field name to map to Hostname
    entities (e.g., `dest_host`). |

    | **File Hash Entity Key** | String | No | The Splunk field name to map to File
    Hash entities (e.g., `file_hash`). |

    | **User Entity Key** | String | No | The Splunk field name to map to User entities
    (e.g., `user_name`). |

    | **URL Entity Key** | String | No | The Splunk field name to map to URL entities
    (e.g., `url`). |

    | **Email Address Entity Key** | String | No | The Splunk field name to map to
    Email Address entities. |

    | **Stop If Not Enough Entities** | Boolean | No | If enabled (default), the action
    fails if any specified Entity Key has no corresponding entities in the current
    scope. |

    | **Cross Entity Operator** | String | Yes | The logical operator (`OR` or `AND`)
    used to join conditions between different entity types in the generated `WHERE`
    clause. |


    ### Additional Notes

    - The action requires at least one "Entity Key" parameter to be configured to
    effectively filter the search by entities.

    - If "Stop If Not Enough Entities" is True, the action will abort if a configured
    key (e.g., IP Entity Key) finds no matching entities in the alert scope.


    ### Flow Description

    1. **Entity Identification:** The action scans the alert for entities of types
    ADDRESS, HOSTNAME, FILEHASH, USER, and URL.

    2. **Query Construction:** It maps these entities to the user-defined Splunk field
    keys and builds a `WHERE` clause using the specified `Cross Entity Operator`.

    3. **Job Creation:** A search job is initiated in Splunk using the base query,
    the generated filters, time range, and result limits.

    4. **Polling:** The action polls Splunk until the search job reaches a completed
    state.

    5. **Data Retrieval:** Once finished, the action fetches the results and formats
    them into a data table and a JSON object.

    6. **Cleanup:** The temporary search job is deleted from the Splunk server.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
