Submit Event:
  ai_description: >-
    Submits a raw event string to a designated Splunk index. This action allows for
    the manual or automated injection of log data into Splunk for indexing and subsequent
    searching. It is useful for logging custom events or forwarding specific data
    points from a SOAR workflow into a centralized logging system.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Index | String | Yes | The destination index in Splunk where the event will
    be stored (e.g., 'main'). |

    | Event | String | Yes | The raw log or event data to be submitted. |

    | Host | String | No | The host value to be assigned to the event metadata. |

    | Source | String | No | The source value to be assigned to the event (e.g., a
    filename or service name). |

    | Sourcetype | String | No | The Splunk sourcetype to be assigned to the event
    (e.g., 'access_combined'). |


    ### Flow Description

    1. **Authentication**: Establishes a connection with the Splunk API using the
    configured credentials (Username/Password or API Token) and validates the SSL
    settings.

    2. **Parameter Extraction**: Retrieves the target index, raw event content, and
    optional metadata (host, source, sourcetype) from the action inputs.

    3. **Event Submission**: Executes an HTTP POST request to the Splunk `receivers/simple`
    endpoint, transmitting the raw event data to the specified index.

    4. **Result Processing**: Captures the response from Splunk, which includes metadata
    about the created event (such as bytes written and host), and returns it as a
    JSON result for use in subsequent playbook steps.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates a new event record in the specified Splunk index by submitting raw data
      to the Splunk API.
    fetches_data: false
    internal_data_mutation_explanation: null
