SplunkQuery:
  ai_description: >-
    Executes one or more search queries in Splunk and retrieves the resulting event
    data. This action supports asynchronous execution, meaning it initiates search
    jobs and polls for their completion. It allows for fine-grained control over the
    search timeframe, result limits, and specific fields to be returned. The results
    are presented both as a raw JSON object and a formatted data table within the
    Google SecOps case.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Query | String | Yes | The Splunk search query (SPL) to execute. Can be a single
    string or a JSON-formatted list of strings (e.g., `["query1", "query2"]`) to run
    multiple searches. |

    | Search Mode | Enum | No | Specifies the Splunk search mode: `Smart` (default),
    `Verbose`, or `Fast`. |

    | Results count limit | Integer | No | The maximum number of results to return
    per query. Defaults to 100. |

    | Results From | String | No | The relative or absolute start time for the search
    (e.g., `-24h`, `-1h`). Defaults to `-24h`. |

    | Results To | String | No | The relative or absolute end time for the search.
    Defaults to `now`. |

    | Result fields | String | No | A comma-separated list of specific fields to include
    in the output. If omitted, all fields are returned. |


    ### Additional Notes

    - This action does not operate on specific entities; it executes generic queries
    against the Splunk index.

    - The action automatically appends `head` and `fields` commands to the SPL query
    based on the provided parameters.


    ### Flow Description

    1. **Initialization:** Parses the input query parameter to identify if one or
    multiple queries need to be executed.

    2. **Job Creation:** For each query, the action sends a request to Splunk to create
    an asynchronous search job.

    3. **Polling:** The action enters a polling state, checking the status of the
    search jobs at regular intervals until they are marked as 'Done'.

    4. **Data Retrieval:** Once a job is complete, the action fetches the results
    from Splunk, respecting the defined count limit and field filters.

    5. **Cleanup:** Deletes the search jobs from the Splunk server to free up resources.

    6. **Output:** Aggregates results from all queries and populates the action's
    JSON result and a data table named 'Splunk Query Results'.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
