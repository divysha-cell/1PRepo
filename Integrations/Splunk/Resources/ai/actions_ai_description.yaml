SplunkCsvViewer:
  ai_description: >-
    ### General Description

    The **SplunkCsvViewer** action is a utility designed to transform raw JSON data
    into a structured CSV format and display it as a data table within a Google SecOps
    case. This action is primarily used to visualize results obtained from previous
    Splunk search actions. Note: This action is marked as **Deprecated**.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Results | String | Yes | The raw JSON string representing the data to be converted
    into a CSV table. |


    ### Flow Description

    1. **Configuration Extraction:** The action retrieves Splunk connection details
    (API Root, Credentials, SSL settings) from the integration configuration.

    2. **Input Retrieval:** It extracts the `Results` parameter provided by the user
    or a previous playbook step.

    3. **Data Transformation:** The action parses the `Results` string as JSON and
    utilizes a transformation utility to convert the dictionary/list structure into
    a CSV-formatted string.

    4. **Internal Update:** It attaches the resulting CSV data to the SOAR case as
    a new data table titled "Splunk Query Results".

    5. **Completion:** The action concludes by reporting whether results were successfully
    processed.
