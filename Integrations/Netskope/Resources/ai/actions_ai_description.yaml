  ai_description: "### General Description\nLists events from the Netskope events\
    \ database. This action allows users to retrieve and filter cloud application\
    \ events, page events, audit events, or infrastructure events based on specific\
    \ queries and time-based constraints. It is primarily used for log retrieval and\
    \ auditing within the Netskope environment.\n\n### Parameters Description\n| Parameter\
    \ | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n| Query |\
    \ String | No | A filter string used to search for specific cloud app events in\
    \ the database. |\n| Type | String | No | The category of events to retrieve.\
    \ Valid values are: `page`, `application`, `audit`, or `infrastructure`. |\n|\
    \ Time Period | String | No | A predefined time range in milliseconds to search\
    \ backwards (e.g., `3600` for 1 hour, `86400` for 1 day). |\n| Start Time | String\
    \ | No | The start of the search window in Unix timestamp format. Used if `Time\
    \ Period` is not provided. |\n| End Time | String | No | The end of the search\
    \ window in Unix timestamp format. Used if `Time Period` is not provided. |\n\
    | Limit | Integer | No | The maximum number of event records to return. Defaults\
    \ to 100 if not specified or if a non-positive value is provided. |\n\n### Additional\
    \ Notes\n- If the `Type` parameter is omitted, the action will iterate through\
    \ all supported event types (`page`, `application`, `audit`, and `infrastructure`)\
    \ and aggregate the results up to the specified limit.\n- The action uses the\
    \ Netskope V2 API for event retrieval.\n\n### Flow Description\n1. **Initialization**:\
    \ Extracts the API configuration (Root URL and Keys) and the user-defined search\
    \ parameters.\n2. **Validation**: If a specific `Type` is provided, the action\
    \ validates it against the allowed Netskope event categories.\n3. **Data Retrieval**:\
    \ \n    - If a `Type` is specified, it calls the corresponding Netskope V2 endpoint\
    \ for that category.\n    - If no `Type` is specified, it sequentially queries\
    \ all four event categories and combines the results.\n4. **Pagination**: The\
    \ action handles API pagination internally to ensure the requested `Limit` of\
    \ results is met.\n5. **Output Generation**: The retrieved events are flattened\
    \ and presented in a data table named \"Netskope - Events\". The raw event data\
    \ is also returned as a JSON result for downstream processing."
