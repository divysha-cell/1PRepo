Ping:
  ai_description: >-
    ### General Description\nVerifies connectivity to the Netskope platform using
    the configured API credentials. This action ensures that the SOAR platform can
    successfully communicate with the Netskope API endpoints by performing a lightweight
    request to the service.\n\n### Parameters Description\n| Parameter | Type | Mandatory
    | Description |\n| :--- | :--- | :--- | :--- |\n| Api Root | String | Yes | The
    base URL of the Netskope API instance. |\n| V1 Api Key | String | No | The API
    key used for V1 API requests. |\n| V2 Api Key | String | No | The API key used
    for V2 API requests. |\n| Verify SSL | Boolean | Yes | If enabled, the action
    will verify the SSL certificate of the Netskope server. Default is True. |\n\n###
    Additional Notes\n* At least one API key (either V1 or V2) must be configured
    in the integration settings for this action to execute successfully. If neither
    is provided, the action will fail with a parameter error.\n\n### Flow Description\n1.
    **Parameter Extraction**: Retrieves the API Root, API Keys, and SSL verification
    settings from the integration configuration.\n2. **Validation**: Checks if at
    least one API key (V1 or V2) is provided. If both are missing, the action fails
    immediately.\n3. **Connectivity Test**: \n    * If a V1 API Key is provided, the
    action attempts to fetch a single client record from the `/api/v1/clients` endpoint.\n    *
    If a V2 API Key is provided, the action attempts to fetch a single alert record
    from the `/api/v2/events/data/alert` endpoint.\n4. **Result Reporting**: If the
    API calls are successful, it reports a successful connection. If an error occurs
    (e.g., authentication failure, network timeout), it captures the exception and
    returns a failure status with the error details.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
