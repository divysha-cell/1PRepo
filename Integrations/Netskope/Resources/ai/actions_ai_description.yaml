List Alerts:
  ai_description: >-
    ### General Description

    This action lists alerts from the Netskope platform based on user-defined filters.
    It allows security analysts to retrieve specific alert data using queries, alert
    types, and time-based constraints. The retrieved data is presented as a structured
    data table and a raw JSON result within the Google SecOps case.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Query | String | No | Acts as a filter for cloud app events in the alerts database.
    |

    | Type | String | No | The specific category of alert to filter by. Valid values
    include: `anomaly`, `Compromised Credential`, `policy`, `Legal Hold`, `malsite`,
    `Malware`, `DLP`, `watchlist`, `quarantine`, and `Remediation`. |

    | Time Period | String | No | A lookback window in milliseconds. Valid values:
    `3600`, `86400`, `604800`, `2592000`. |

    | Start Time | String | No | Restricts alerts to those with timestamps greater
    than this Unix timestamp. Used if 'Time Period' is not provided. |

    | End Time | String | No | Restricts alerts to those with timestamps less than
    this Unix timestamp. Used if 'Time Period' is not provided. |

    | Is Acknowledged | Boolean | No | If set to true, retrieves only acknowledged
    alerts. Default is false. |

    | Limit | Integer | No | The maximum number of results to return. Default is 100.
    |


    ### Additional Notes

    - Either the 'Time Period' parameter or the 'Start Time'/'End Time' pair should
    be configured to define the search window effectively.

    - The action utilizes the Netskope V2 API and requires a valid V2 API Key in the
    integration configuration.


    ### Flow Description

    1. **Parameter Validation**: The action validates the 'Type' parameter against
    a list of supported Netskope alert types and ensures the 'Limit' is a positive
    integer.

    2. **API Connection**: It initializes the Netskope Manager using the provided
    API Root and V2 API Key.

    3. **Data Retrieval**: The action sends a GET request to the Netskope V2 events
    endpoint, applying the specified filters (query, type, time range, and acknowledgment
    status).

    4. **Pagination**: If the requested limit exceeds the single-page response, the
    action handles pagination to fetch the required number of alerts.

    5. **Output Generation**: The retrieved alerts are processed into a flat format
    to create a CSV data table and are also attached as a JSON result to the action
    execution.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      The action creates a data table named 'Netskope - Alerts' and populates the
      action's JSON result with the retrieved alert data.
  categories:
    enrichment: false
  entity_usage:
