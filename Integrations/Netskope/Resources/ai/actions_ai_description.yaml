Allow File:
  ai_description: >-
    Allows a quarantined file within the Netskope platform. This action interacts
    with the Netskope API to change the status of a specific file from quarantined
    to allowed, effectively releasing it based on the provided identifiers.


    ### Parameters

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | File ID | String | Yes | The unique identifier of the file that needs to be
    allowed. |

    | Quarantine Profile ID | String | Yes | The unique identifier of the quarantine
    profile associated with the file. |


    ### Flow Description

    1. **Initialization**: The action initializes the Netskope manager using the provided
    API Root and API Key.

    2. **Parameter Extraction**: It retrieves the 'File ID' and 'Quarantine Profile
    ID' from the action input parameters.

    3. **Execution**: It calls the Netskope API's quarantine endpoint with the 'take-action'
    operation and 'allow' action for the specified file and profile.

    4. **Finalization**: The action completes successfully if the API returns a positive
    response, otherwise it logs an error and fails.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Changes the status of a quarantined file to 'allowed' in the Netskope platform,
      effectively releasing the file from quarantine.
    fetches_data: false
    internal_data_mutation_explanation: null
  categories:
