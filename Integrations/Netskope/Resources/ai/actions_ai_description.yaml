    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
List Clients:
  ai_description: >-
    ### General Description

    The **List Clients** action retrieves a list of client devices from the Netskope
    platform. It allows users to search for specific clients using a query and limit
    the number of results returned. The retrieved information includes device IDs,
    operating systems, and associated users.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Query** | String | No | A filter string used to search for specific entries
    in the Netskope database. |

    | **Limit** | Integer | No | The maximum number of client records to return. If
    not specified or if a value less than or equal to zero is provided, it defaults
    to 25. |


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the API configuration (Root
    URL, API Key, SSL verification) and action parameters (Query, Limit).

    2. **API Interaction**: It connects to the Netskope V1 API endpoint `/api/v1/clients`
    using the provided credentials.

    3. **Data Retrieval**: The action fetches client data, applying the query filter
    and limit. It handles pagination internally using the 'skip' parameter.

    4. **Data Transformation**: The raw JSON response is parsed into structured `Client`
    objects via the `NetskopeTransformationalLayer`.

    5. **Result Output**: The action generates a data table named "Netskope - Clients"
    and attaches the full JSON results to the action output.


    ### Additional Notes

    - This action does not require or process any input entities.

    - If the **Limit** parameter is set to 0 or a negative number, the action automatically
    reverts to the default limit of 25.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      The action adds a data table named 'Netskope - Clients' and result JSON containing
      client details to the action results within the case.
  categories:
