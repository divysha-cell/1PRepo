List Quarantined Files:
  ai_description: >-
    ### General Description

    The **List Quarantined Files** action retrieves a list of files currently held
    in quarantine by Netskope. This action provides visibility into isolated files,
    allowing security teams to audit and review items that have been moved to quarantine
    based on organizational policies.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Start Time** | String | No | Restrict results to files with timestamps greater
    than this (Unix time). |

    | **End Time** | String | No | Restrict results to files with timestamps less
    than this (Unix time). |


    ### Additional Notes

    - If no time parameters are provided, the action retrieves all available quarantined
    files.

    - The results are presented as a JSON object and a formatted data table on the
    case wall.


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves API credentials and optional
    time range filters (Start Time and End Time).

    2. **API Request**: It calls the Netskope `get-files` operation via the `/api/v1/quarantine`
    endpoint.

    3. **Data Processing**: The response is parsed to extract individual file details,
    including associated quarantine profile IDs and names.

    4. **Output Generation**: A data table named 'Netskope - Quarantined Files' is
    created and attached to the case wall, and the raw file list is returned as a
    JSON result for downstream use.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
