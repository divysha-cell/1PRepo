Block File:
  ai_description: >-
    ### General Description

    This action blocks a quarantined file within the Netskope platform. It is used
    to transition a file from a quarantined state to a blocked state, preventing further
    access or interaction with the file based on the specified quarantine profile.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | File ID | String | Yes | The unique identifier of the file that needs to be
    blocked. |

    | Quarantine Profile ID | String | Yes | The unique identifier of the quarantine
    profile that the file is currently associated with. |


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the Netskope API configuration
    (API Root, API Key, SSL verification) and the specific action parameters (File
    ID and Quarantine Profile ID).

    2. **Manager Initialization**: It initializes the `NetskopeManager` using the
    provided credentials.

    3. **API Interaction**: The action calls the `block_file` method in the manager,
    which sends a request to the Netskope API's quarantine endpoint with the operation
    `take-action` and the action set to `block`.

    4. **Status Reporting**: If the API call is successful, the action completes with
    a success message and a boolean result of `True`. If an error occurs, it logs
    the exception and fails with an error message.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      This action changes the status of a file in the Netskope quarantine system to
      'blocked', which is a state change in the external Netskope environment.
    fetches_data: false
    internal_data_mutation_explanation: null
