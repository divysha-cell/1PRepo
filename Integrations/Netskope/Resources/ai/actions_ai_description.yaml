Download File:
  ai_description: >-
    ### General Description

    Downloads a file that has been quarantined by Netskope and attaches it to the
    Google SecOps case. This action is used to retrieve suspicious or malicious files
    for further analysis without needing to log into the Netskope console. It requires
    specific identifiers for both the file and the quarantine profile.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | File ID | String | Yes | The unique identifier of the file in the Netskope quarantine.
    |

    | Quarantine Profile ID | String | Yes | The unique identifier of the quarantine
    profile associated with the file. |


    ### Flow Description

    1. **Initialization**: The action extracts the Netskope API configuration and
    the specific File and Quarantine Profile IDs provided as input.

    2. **Metadata Retrieval**: It fetches the list of all quarantined files from Netskope
    to identify the original filename corresponding to the provided File ID.

    3. **File Download**: It requests a download URL from the Netskope API for the
    specified file and profile, then retrieves the raw file content.

    4. **Attachment**: If the file is successfully retrieved, the content is base64-encoded
    and added as an attachment to the current Google SecOps case using the original
    filename.


    ### Additional Notes

    This action does not run on entities. It relies entirely on the manual input of
    the File ID and Quarantine Profile ID. Note that according to security best practices,
    downloading files is not categorized as an enrichment action.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      The action adds the downloaded file as an attachment to the Google SecOps case.
