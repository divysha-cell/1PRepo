Link Issues:
  ai_description: >-
    Links multiple issues in Jira by establishing a relationship between a source
    issue and one or more destination issues. This action is useful for tracking dependencies,
    such as marking one issue as blocking others or relating multiple tasks.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Inward Issue ID | String | Yes | The ID or Key of the source issue (e.g., the
    issue that 'blocks' others). |

    | Outward Issue IDs | String | Yes | A comma-separated list of IDs or Keys for
    the destination issues (e.g., the issues being 'blocked'). |

    | Relation Type | String | Yes | The specific relationship type to use (e.g.,
    'Blocks', 'Relates', 'Duplicate'). Default is 'Blocks'. |


    ### Additional Notes

    - To see a list of available relation types in your Jira instance, you can run
    the 'List Relation Types' action.

    - The action first validates that the source (Inward) issue exists before attempting
    to link the destination (Outward) issues.


    ### Flow Description

    1. **Parameter Extraction:** Retrieves the Jira connection details and the specific
    issue IDs and relation type from the action parameters.

    2. **Input Parsing:** Converts the comma-separated string of Outward Issue IDs
    into a list for processing.

    3. **Connection Initialization:** Establishes a connection to the Jira API using
    either the SDK or REST manager.

    4. **Source Validation:** Checks if the Inward Issue ID exists in Jira; if not,
    the action fails immediately.

    5. **Issue Linking:** Iterates through each Outward Issue ID and attempts to create
    a link to the Inward Issue using the specified Relation Type.

    6. **Result Reporting:** Tracks which links were successfully created and which
    failed (e.g., if a destination issue was not found), providing a summary message
    at the end.
