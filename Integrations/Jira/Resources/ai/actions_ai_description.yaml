Add Comment:
  ai_description: "This action adds a comment to a specific Jira issue. It takes an\
    \ issue key and a comment string as input, processes the comment to ensure it\
    \ is in the correct Jira Wiki Markup format, and then submits it to the Jira instance.\
    \ \n\n### Parameters\n| Parameter | Type | Mandatory | Description |\n| :--- |\
    \ :--- | :--- | :--- |\n| Issue Key | String | Yes | The unique identifier of\
    \ the Jira issue (e.g., 'ABC-123') where the comment will be added. |\n| Comment\
    \ | String | Yes | The content of the comment. The action automatically converts\
    \ HTML formatting into Jira Wiki Markup (JWM) before submission. |\n\n### Additional\
    \ Notes\n- This action does not operate on Google SecOps entities; it requires\
    \ a specific Issue Key provided as a parameter.\n- The action returns the ID of\
    \ the created comment upon success.\n\n### Flow Description\n1. **Initialization**:\
    \ The action retrieves Jira connection details (API Root, Username, API Token)\
    \ and action parameters (Issue Key, Comment).\n2. **Formatting**: The input comment\
    \ is passed through an HTML-to-JWM converter to ensure compatibility with Jira's\
    \ text formatting.\n3. **Execution**: The Jira Manager establishes a connection\
    \ and calls the Jira API to append the comment to the specified issue.\n4. **Completion**:\
    \ If successful, the action returns the new comment ID and completes with a success\
    \ status. If the API call fails, it logs the error and returns a failure status."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds a new comment to an existing issue in the Jira platform.
    fetches_data: false
    internal_data_mutation_explanation: null
