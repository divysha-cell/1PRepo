Search Users:
  ai_description: "### General Description\nThe **Search Users** action allows users\
    \ to search for user accounts within a Jira instance. It supports searching by\
    \ email addresses or display names and can optionally filter results to only include\
    \ users who are assignable to a specific Jira project. This action is useful for\
    \ identifying account details, verifying user existence, or finding potential\
    \ assignees for tickets during an investigation.\n\n### Parameters Description\n\
    | Parameter | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n\
    | **User Email Addresses** | String (CSV) | No* | A comma-separated list of email\
    \ addresses to search for. Providing emails typically yields more accurate results.\
    \ |\n| **User Names** | String (CSV) | No* | A comma-separated list of user display\
    \ names to search for. |\n| **Project** | String | No | The key of a Jira project\
    \ (e.g., 'PROJ'). If provided, the search will only return users who have permission\
    \ to be assigned to that specific project. |\n\n### Additional Notes\n*   **Mandatory\
    \ Requirement:** At least one of the parameters, **User Email Addresses** or **User\
    \ Names**, must be provided for the action to execute.\n*   Invalid email formats\
    \ provided in the input will be logged and skipped during the search process.\n\
    \n### Flow Description\n1.  **Parameter Extraction:** The action retrieves the\
    \ Jira connection details (API Root, Token, etc.) and the search criteria (Emails,\
    \ Names, Project).\n2.  **Validation:** It verifies that at least one search term\
    \ is present and validates the format of the provided email addresses.\n3.  **Manager\
    \ Initialization:** A Jira connection is established using the provided credentials.\n\
    4.  **Search Execution:** \n    *   If a **Project** is specified, the action\
    \ queries Jira for users assignable to that project matching the search terms.\n\
    \    *   If no project is specified, the action performs a global search across\
    \ all Jira users.\n5.  **Result Aggregation:** The action identifies which users\
    \ were successfully found and which were not.\n6.  **Output Generation:** It populates\
    \ the action's output message with a summary of found/not-found users and returns\
    \ detailed user objects (including Account ID, Active status, and Locale) in the\
    \ JSON results."
