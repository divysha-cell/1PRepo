List Issues:
  ai_description: >-
    ### General Description

    The **List Issues** action enables users to search for issues within a Jira instance
    by applying multiple filters. It dynamically constructs a Jira Query Language
    (JQL) query based on the provided parameters and retrieves a list of issue keys
    that match the specified criteria. This action is primarily used for searching
    and auditing existing tickets without modifying them.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Project Names** | String | No | A comma-separated list of project names or
    keys to restrict the search to specific projects. |

    | **Summary** | String | No | Filters issues by searching for specific text within
    the summary field. |

    | **Description** | String | No | Filters issues by searching for specific text
    within the description field. |

    | **Issue Types** | String | No | A comma-separated list of issue types (e.g.,
    Bug, Task, Story). Defaults to 'Bug'. |

    | **Priorities** | String | No | A comma-separated list of priorities (e.g., High,
    Medium, Low) to filter the results. |

    | **Created From** | String | No | The earliest creation date to include in the
    search. Expected format: YYYY/MM/DD. |

    | **Updated From** | String | No | The earliest last-update date to include in
    the search. Expected format: YYYY/MM/DD. |

    | **Assignees** | String | No | A comma-separated list of assignee names or identifiers
    to filter by. |

    | **Reporter** | String | No | A comma-separated list of reporter names or identifiers
    to filter by. |

    | **Statuses** | String | No | A comma-separated list of issue statuses (e.g.,
    Open, In Progress, Done) to filter by. |


    ### Additional Notes

    - This action does not run on specific Google SecOps entities; it performs a global
    search across the Jira instance.

    - If no parameters are provided, the action will attempt to list issues based
    on default settings (e.g., Issue Type 'Bug').

    - The search uses 'AND' logic between different parameters and 'IN' logic for
    comma-separated lists.


    ### Flow Description

    1. **Initialization:** The action initializes the Jira connection using the provided
    API Root, Username, and API Token.

    2. **Parameter Parsing:** It extracts and cleans the user-provided filter parameters,
    converting comma-separated strings into lists and validating date formats.

    3. **Query Construction:** The `JiraManager` builds a JQL query string by aggregating
    all active filters.

    4. **API Execution:** The action executes the search against the Jira API (supporting
    both Cloud and On-Premise versions).

    5. **Result Processing:** The action retrieves the matching issue keys, formats
    them into a JSON array, and returns them as the action result.
  capabilities:
