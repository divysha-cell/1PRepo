Upload Attachment:
  ai_description: >-
    ### General Description

    Uploads one or more files as attachments to a specific Jira issue. This action
    is useful for attaching evidence, logs, or reports directly to a Jira ticket from
    the Google SecOps environment. It supports a 'Mode' parameter to handle how files
    with duplicate names are treated.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Issue Key | String | Yes | The unique identifier of the Jira issue (e.g., 'PROJ-123')
    where the files will be uploaded. |

    | File Paths | String | Yes | A comma-separated list of local file paths to be
    uploaded to the Jira issue. |

    | Mode | String | No | Specifies the upload behavior. 'Add New Attachment' (default)
    adds the file even if a file with the same name exists. 'Overwrite Existing Attachment'
    deletes any existing attachments on the issue that share the same filename before
    uploading the new version. |


    ### Additional Notes

    - The action handles multiple files in a single execution by parsing the 'File
    Paths' string as a CSV.

    - If 'Overwrite Existing Attachment' is selected, the action will perform a lookup
    and deletion of existing files on the Jira issue before the upload occurs.


    ### Flow Description

    1. **Initialization**: Extracts Jira connection settings and action parameters
    (`Issue Key`, `File Paths`, and `Mode`).

    2. **Path Parsing**: Converts the comma-separated `File Paths` string into a list
    of individual file paths.

    3. **Attachment Management**: For each file path:
        - If the mode is set to **Overwrite Existing Attachment**, the action fetches
    the current attachments for the issue, identifies those with matching filenames,
    and deletes them from Jira.
        - The action then uploads the file from the local path to the Jira issue.
    4. **Error Handling**: Specifically catches JIRA-specific errors (such as zero-byte
    file issues) and general exceptions for each file to ensure one failure doesn't
    stop the entire process.

    5. **Reporting**: Compiles a list of successful and failed uploads and returns
    a summary message to the SOAR.
  capabilities:
