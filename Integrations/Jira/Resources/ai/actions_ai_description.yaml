Create Issue:
  ai_description: >-
    ### General Description

    This action creates a new issue in a specified Jira project. It supports setting
    standard fields like summary, description, issue type, components, and labels,
    as well as providing a JSON object for custom fields. The action can also automatically
    assign the issue to a user and add a comment identifying the initiator. Upon successful
    creation, it updates the Google SecOps alert with the Jira issue key and project
    name for tracking.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Project Key | String | Yes | The unique key of the Jira project where the issue
    will be created. |

    | Summary | String | Yes | A brief summary or title for the Jira issue. |

    | Description | String | No | Detailed information describing the issue. |

    | Issue Type | String | Yes | The category of the issue (e.g., 'Task', 'Bug',
    'Story'). |

    | Jira Username | String | No | The username of the person initiating the action.
    If provided, a comment is added to the Jira issue noting the creator. |

    | Assignee | String | No | The user to whom the issue should be assigned. Can
    be an email address or display name. |

    | Components | String | No | A comma-separated list of project components to associate
    with the issue. |

    | Labels | String | No | A comma-separated list of labels to apply to the issue.
    |

    | Custom Fields | JSON String | No | A JSON object containing specific Jira field
    keys and values. This parameter takes priority and can overwrite other fields.
    |


    ### Additional Notes

    - The action supports both Jira Cloud and Jira On-premise environments.

    - If the `Assignee` is provided, the action attempts to resolve the user via email
    or display name before assignment.

    - If `Components` are specified, the action validates them against the project's
    existing components before proceeding.


    ### Flow Description

    1. **Initialization**: Extracts configuration and action parameters, including
    parsing the `Custom Fields` JSON.

    2. **Validation**: If components are provided, it fetches the project's components
    from Jira to ensure they exist.

    3. **User Resolution**: If an assignee is specified, it searches Jira for a matching
    user based on email or display name.

    4. **Issue Creation**: Calls the Jira API to create the issue with the provided
    metadata and custom fields.

    5. **Internal Metadata Update**: Adds a 'Jira' tag to the current SecOps alert
    and sets context properties for `JIRA_ISSUE_KEY` and `JIRA_PROJECT_KEY`.

    6. **Assignment & Commenting**: Assigns the newly created issue to the resolved
    user and adds a comment if a `Jira Username` was provided.

    7. **Result Retrieval**: Fetches the full details of the created issue and returns
    them as the action's result JSON.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: true
    can_mutate_external_data: true
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates a new issue in Jira, assigns it to a user, and adds a comment to the
      issue.
    fetches_data: true
    internal_data_mutation_explanation: >-
      Adds a 'Jira' tag to the alert and sets alert context properties for the Jira
      issue key and project name.
