List Relation Types:
  ai_description: >-
    ### General Description

    The **List Relation Types** action retrieves a list of all available issue link
    types (relation types) configured in the Jira instance. This action is primarily
    used to discover the specific names and directions (Inward/Outward) of relationships
    defined in Jira, such as 'Blocks', 'Cloners', or 'Relates', which are often required
    as input for other actions like *Link Issues*.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Filter Key** | Dropdown | No | Specifies the attribute of the relation type
    to filter by. Options: `Name`, `Inward`, `Outward`. |

    | **Filter Logic** | Dropdown | No | Defines the matching logic: `Equal` (exact
    match) or `Contains` (partial match). |

    | **Filter Value** | String | No | The string value to search for. If left empty,
    filtering is skipped. |

    | **Max Records To Return** | Integer | No | Limits the number of results returned.
    Defaults to 50 if not specified. |


    ### Additional Notes

    - **Dependency**: If a **Filter Logic** is selected, a **Filter Key** must also
    be selected, otherwise the action will fail.

    - **Entity Support**: This action does not run on entities and ignores any entities
    present in the current scope.

    - **GDPR Compliance**: The action includes logic to handle GDPR-related errors
    by falling back to a REST-based retrieval method if the standard SDK call fails.


    ### Flow Description

    1. **Parameter Validation**: The action validates that the `Max Records To Return`
    is a positive integer and ensures that a `Filter Key` is provided if `Filter Logic`
    is used.

    2. **Connection Initialization**: Establishes a connection to the Jira instance
    using the provided API Root and credentials.

    3. **Data Retrieval**: Fetches the complete list of issue link types from the
    Jira API.

    4. **Filtering Logic**: If filtering parameters are provided, the action iterates
    through the retrieved types and keeps only those matching the specified criteria.

    5. **Result Generation**: Formats the filtered list into a data table named "Available
    Relation Types" and attaches the raw data as a JSON result for use in subsequent
    playbook steps.
