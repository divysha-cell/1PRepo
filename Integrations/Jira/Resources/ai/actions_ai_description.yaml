Update Issue:
  ai_description: >-
    Updates an existing Jira issue with new information including status, summary,
    description, and assignments. The action supports both Jira Cloud and On-Premise
    instances.


    ### Flow Description:

    1. **Issue Retrieval:** Fetches the current issue details using the provided 'Issue
    Key' to identify the project context.

    2. **Component Validation:** If 'Components' are provided, the action retrieves
    the project's available components and validates that the specified ones exist.

    3. **Assignee Resolution:** If an 'Assignee' is specified, the action searches
    for assignable users in the project and matches them based on email, display name,
    or username.

    4. **Issue Update:** Updates the issue's core fields (Summary, Description, Issue
    Type, Components, Labels, and Custom Fields) and executes a status transition
    if a 'Status' is provided.

    5. **Assignment:** Assigns the issue to the resolved user if the 'Assignee' parameter
    was used.

    6. **Comment Addition:** Adds a system comment to the Jira issue attributing the
    update to the 'Jira Username' (initiator) if provided.

    7. **Result Capture:** Retrieves the final updated state of the issue and returns
    it as a JSON result.


    ### Parameters Description:

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Issue Key | String | Yes | The unique identifier of the Jira issue to be updated
    (e.g., 'PROJ-123'). |

    | Status | String | No | The name of the transition to move the issue to a new
    status (e.g., 'Done', 'In Progress'). |

    | Summary | String | No | The new summary or title for the issue. |

    | Description | String | No | The new description text for the issue. |

    | Issue Type | String | No | The new issue type (e.g., 'Bug', 'Task', 'Story').
    |

    | Jira Username | String | No | The username of the action initiator. If provided,
    a comment is added to the issue noting the update. |

    | Assignee | String | No | The user to assign the issue to. Can be an email, display
    name, or username. |

    | Components | String | No | Comma-separated list of project components to associate
    with the issue. |

    | Labels | String | No | Comma-separated list of labels to apply to the issue.
    |

    | Custom Fields | JSON | No | A JSON object containing specific Jira field keys
    and values to update. This parameter has priority and can overwrite other field
    updates. |


    ### Additional Notes:

    - The 'Custom Fields' parameter should be a valid JSON string (e.g., `{"customfield_10001":
    "value"}`).

    - If 'Jira Username' is omitted, the action will skip adding an update comment
    to the Jira issue.
