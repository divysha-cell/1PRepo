Assign Issue:
  ai_description: "### General Description\nThe **Assign Issue** action allows users\
    \ to assign a specific Jira issue to a user. It is designed to work with both\
    \ Jira On-Premise and Jira Cloud environments. The action intelligently resolves\
    \ the assignee by searching for matches against email addresses, display names,\
    \ or usernames. If the action is performed against a Jira Cloud instance (which\
    \ is GDPR-compliant), it automatically handles the resolution of the user's unique\
    \ `accountId` to perform the assignment.\n\n### Parameters Description\n\n| Parameter\
    \ | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n| **Issue\
    \ Key** | String | Yes | The unique identifier of the Jira issue (e.g., 'SEC-1234').\
    \ |\n| **Assignee** | String | Yes | The identifier of the user to whom the issue\
    \ should be assigned. This can be a Jira username, an email address, or a display\
    \ name. |\n| **Jira Username** | String | No | The Jira username of the person\
    \ initiating this action. If provided, the action will automatically add a comment\
    \ to the Jira issue stating who assigned the issue and to whom. |\n\n### Additional\
    \ Notes\n- **GDPR Compliance:** For Jira Cloud, the action uses the REST API to\
    \ find the `accountId` because traditional usernames are often restricted for\
    \ privacy.\n- **Comment Logic:** A comment is only added to the Jira issue if\
    \ the `Jira Username` (initiator) parameter is populated.\n\n### Flow Description\n\
    1. **Initialization:** The action initializes the Jira manager using the provided\
    \ API root and credentials.\n2. **User Resolution:** It searches the Jira instance\
    \ for users matching the string provided in the `Assignee` parameter.\n3. **Identity\
    \ Matching:** The logic iterates through the search results to find an exact match\
    \ for the email, display name, or internal name.\n4. **Assignment:** \n    - If\
    \ a match is found, the action calls the Jira API to update the issue's assignee.\n\
    \    - If a GDPR error occurs (common in Cloud), it falls back to a REST-based\
    \ lookup to retrieve the `accountId` and retries the assignment.\n5. **Optional\
    \ Commenting:** If an initiator username is provided, the action posts a comment\
    \ to the Jira issue wall documenting the change."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      This action changes the 'Assignee' field of an issue in Jira and may also add
      a new comment to the issue's comment history.
    fetches_data: true
    internal_data_mutation_explanation: null
