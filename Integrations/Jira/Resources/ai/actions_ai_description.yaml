Download Attachments:
  ai_description: >-
    ### General Description

    Downloads all attachments from a specified Jira issue. This action is designed
    to retrieve files associated with a Jira ticket and can recursively extract nested
    attachments from `.eml` (email) files found within the issue. Users can choose
    to save these files to a local directory on the execution runner and/or upload
    them directly to the Google SecOps case wall for immediate visibility during an
    investigation.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Issue Key** | String | Yes | The unique identifier of the Jira issue (e.g.,
    'PROJ-123') from which to retrieve attachments. |

    | **Download Path** | String | No | The local filesystem path where the attachments
    should be saved. This is optional if 'Download Attachments to the Case Wall' is
    enabled. |

    | **Download Attachments to the Case Wall** | Boolean | No | If enabled, the action
    will upload the retrieved attachments to the current case wall in Google SecOps.
    |


    ### Additional Notes

    - **Size Limits**: The action enforces a size limit (default 3MB) for individual
    files being uploaded to the case wall. Files exceeding this limit will be skipped
    for the case wall upload but still saved to the local path if configured.

    - **Platform Constraints**: Total attachment size for a single case is subject
    to platform limits (typically 5MB total).

    - **Configuration Requirement**: At least one output method (Download Path or
    Case Wall upload) should be configured for the action to provide persistent results.


    ### Flow Description

    1. **Authentication**: Connects to the Jira instance using the configured API
    root and credentials.

    2. **Attachment Retrieval**: Fetches the metadata and content for all attachments
    linked to the provided Jira Issue Key.

    3. **Email Processing**: Identifies `.eml` files among the attachments and extracts
    any files contained within those emails.

    4. **Local Storage**: If a `Download Path` is provided, the action creates the
    directory (if it doesn't exist) and saves all retrieved files.

    5. **Case Wall Upload**: If `Download Attachments to the Case Wall` is True, the
    action iterates through the files, checks them against size limits, and uploads
    valid files to the Google SecOps case wall.

    6. **Result Generation**: Produces a JSON summary containing the download paths
    and metadata for all processed attachments.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Adds downloaded files as attachments to the case wall within the Google SecOps
      platform.
