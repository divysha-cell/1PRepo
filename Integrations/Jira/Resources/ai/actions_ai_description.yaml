Delete Issue:
  ai_description: >-
    Deletes a specific issue in Jira using its unique issue key. This action is primarily
    used for ticket lifecycle management, such as removing duplicate issues or cleaning
    up test data within a Jira project. It interacts directly with the Jira API to
    perform a permanent deletion of the specified resource.


    ### Parameters

    | Parameter | Description | Type | Mandatory |

    | :--- | :--- | :--- | :--- |

    | Issue Key | The unique identifier of the Jira issue to be deleted (e.g., 'PROJ-123').
    | String | Yes |


    ### Flow Description

    1. **Initialization**: The action initializes the Jira manager using the provided
    API root, credentials (username and API token), and SSL verification settings.

    2. **Parameter Retrieval**: It extracts the 'Issue Key' from the action parameters.

    3. **API Interaction**: The action calls the Jira API's delete method for the
    specific issue key.

    4. **Outcome Handling**: If the deletion is successful, it returns a success message
    and sets the execution state to completed. If an error occurs (e.g., the issue
    does not exist or permissions are insufficient), it logs the error and fails the
    action.
