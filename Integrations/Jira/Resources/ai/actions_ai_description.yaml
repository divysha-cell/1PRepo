Ping:
  ai_description: >-
    Tests the connectivity to a Jira instance using the provided configuration parameters.
    This action validates the API Root, credentials (Username and API Token), and
    SSL settings by attempting to authenticate and retrieve the current user's profile
    information from the Jira API.


    ### Parameters

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Api Root | String | Yes | The base URL of the Jira instance (e.g., https://your-domain.atlassian.net).
    |

    | Username | String | No | The username used for basic authentication. If not
    provided, token-based authentication is assumed. |

    | Api Token | String | Yes | The API token or Bearer token used for authentication.
    |

    | Verify SSL | Boolean | No | If enabled, the action will verify the SSL certificate
    of the Jira server. Default is False. |


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the integration configuration
    parameters including the API root, credentials, and SSL verification preference.

    2. **Manager Initialization:** It initializes the `JiraManager` with the provided
    settings.

    3. **Connectivity Test:** The manager attempts to connect to the Jira service
    and calls the `myself` endpoint to verify that the credentials are valid and the
    service is reachable.

    4. **Result Reporting:** If the connection is successful, the action completes
    with a success message. If an error occurs during authentication or connection,
    it catches the exception and reports a failure status with the error details.
