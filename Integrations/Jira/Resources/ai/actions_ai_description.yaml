Get Issues:
  ai_description: "### General Description\nThe **Get Issues** action retrieves comprehensive\
    \ details for one or more Jira issues based on their unique issue keys. It allows\
    \ analysts to pull full issue metadata, including fields, status, and priority,\
    \ directly into Google SecOps for investigation or reporting. The action supports\
    \ fetching multiple issues in a single execution by providing a comma-separated\
    \ list of keys.\n\n### Parameters Description\n| Parameter | Type | Mandatory\
    \ | Description |\n| :--- | :--- | :--- | :--- |\n| **Issue Keys** | String |\
    \ Yes | A comma-separated list of Jira issue identifiers (e.g., `PROJ-123, PROJ-456`)\
    \ to fetch details for. |\n\n### Additional Notes\n- The action requires valid\
    \ Jira integration credentials (API Root, API Token, and optionally Username)\
    \ to be configured in the integration settings.\n- If a specific issue key cannot\
    \ be found or retrieved, the action will log the error for that specific key and\
    \ continue attempting to fetch the remaining keys in the list.\n\n### Flow Description\n\
    1. **Input Parsing**: The action extracts the `Issue Keys` parameter and converts\
    \ the comma-separated string into a list of individual keys.\n2. **Manager Initialization**:\
    \ Initializes the `JiraManager` using the provided API Root and authentication\
    \ credentials.\n3. **Iterative Retrieval**: For each issue key in the list, the\
    \ action calls the Jira API to fetch the full issue object, including all raw\
    \ field data.\n4. **Data Attachment**: \n    - The raw fields for each successfully\
    \ retrieved issue are added to a cumulative JSON result list.\n    - Individual\
    \ issue details are attached to the action's output as separate JSON objects named\
    \ `Issue Details - [Issue Key]`.\n5. **Finalization**: The action concludes by\
    \ providing a summary message indicating which issues were successfully retrieved\
    \ and which (if any) failed, returning the aggregated issue data as the final\
    \ result value."
