Create Alert Issue:
  ai_description: >-
    ### General Description
    The **Create Alert Issue** action allows users to programmatically create a new issue in a Jira project for each alert in the current scope. It supports both Alert and Case execution scopes. This action is specifically designed to bridge the gap between security alerts and task management by automatically linking a Jira issue to a specific alert context. It uses the alert's external ID as the issue description to maintain traceability.

    ### Parameters Description
    | Parameter | Type | Mandatory | Description |
    | :--- | :--- | :--- | :--- |
    | Project Key | String | Yes | The unique identifier (key) of the Jira project where the issue will be created (e.g., 'PROJ'). |
    | Summary | String | Yes | A brief summary or title for the Jira issue. |
    | Issue Type | String | Yes | The category of the issue to be created, such as 'Task', 'Bug', or 'Incident'. |

    ### Additional Notes
    * **Side Effects:** Upon successful creation, the action automatically tags the alert with 'Jira' and populates alert-level context properties with the Jira issue key and project name.
    * **Case Scope Return:** For Case scope, the action returns a comma-separated list of created issue keys in the result value.

    ### Flow Description
    1. **Initialization:** It initializes a connection to the Jira instance using the configured API Root, Username, and API Token.
    2. **Loop over Alerts:** The action iterates over the alerts in the current scope (Alert or Case).
    3. **Issue Creation:** For each alert, a request is sent to Jira to create a new issue using the provided `Project Key`, `Summary`, and `Issue Type`. The `description` field of the Jira issue is automatically populated with the `external_id` of the current SecOps alert.
    4. **Data Retrieval:** If the issue is created successfully, the action fetches the project's full name and the raw details of the newly created issue.
    5. **Internal SOAR Update:** The action updates the SecOps alert by:
        * Adding a 'Jira' tag.
        * Setting context properties for `JIRA_ISSUE_KEY` and `JIRA_PROJECT_KEY`.
        * Updating the alert's additional data with the Jira issue key for persistent reference.
    6. **Completion:** Returns the single issue key or a comma-separated list of issue keys as the action result.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: true
    can_mutate_external_data: true
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates a new issue in the specified Jira project with details derived from
      the SecOps alert.
    fetches_data: true
    internal_data_mutation_explanation: >-
      Adds a 'Jira' tag to the alert, sets alert-level context properties (JIRA_ISSUE_KEY,
      JIRA_PROJECT_KEY), and updates the alert's additional data with the issue key.
